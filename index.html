const pct  = (n,t) => t>0 ? ((n/t)*100).toFixed(1) : "0.0";
const nFmt = n => Number(n).toLocaleString("es-ES");

function applyFiltros(pacs, filtros) {
  return pacs.filter(p => {
    return filtros.every(f => {
      const val = p[f.campo];
      let match = false;
      if (f.tipo==="bool")   match = f.valor ? Boolean(val) : !val;
      else if (f.tipo==="select") match = val===f.valor;
      else if (f.tipo==="range")  match = val>=f.min && val<=f.max;
      else if (f.tipo==="text")   match = String(val||"").toLowerCase().includes(f.valor.toLowerCase());
      return f.logica==="NO" ? !match : match;
    });
  });
}

// ❹  CARGA DE DATOS DESDE SUPABASE

async function cargarTodosPacientes(onProgress) {
  const sb = await getSupabase();
  if (!sb) return [];
  const batchSize = 1000;
  let all = [], offset = 0, hasMore = true;
  while (hasMore) {
    const {data, error} = await sb
      .from("PACIENTES")
      .select('*')
      .range(offset, offset + batchSize - 1);
    if (error || !data) break;
    const norm=data.map(r=>{const o={};Object.keys(r).forEach(k=>{o[k.toLowerCase()]=r[k];});return o;});
    all = [...all, ...norm];
    offset += batchSize;
    onProgress(Math.min(98, Math.round(offset / META.totalBD * 100)));
    hasMore = data.length === batchSize;
  }
  return all;
}

async function cargarCriteriosGrupo(grupo, ids) {
  const sb = await getSupabase();
  if (!sb) return {};
  const keys = grupo.keys.join(",");
  const {data, error} = await sb
    .from("PACIENTES")
    .select('*')
    .in("id", ids.slice(0,1000));
  if (error || !data) return {};
  const map = {};
  data.forEach(row => { const nr={}; Object.keys(row).forEach(k=>{nr[k.toLowerCase()]=row[k];}); map[nr.id] = nr; });
  return map;
}

<body>

<h2>2. Grupo de Población</h2>
<span class="badge" style="font-size:12px;padding:4px 12px;">${pat.pob}</span>

<h2>3. Perfiles Activos</h2>
${ac.length ? ac.map(c=>`<span class="perfil" style="color:${c.c};">${c.l}</span>`).join("") : "<em style='color:#94A3B8'>Sin perfiles activos</em>"}

<h2>4. Criterios Activos por Perfil</h2>
${ac.map(c=>{
  const crits = CRITERIOS_PERFIL[c.k]||[];
  if (!crits.length) return "";
  return `<div style="margin-bottom:10px;">
    <div style="font-size:12px;font-weight:700;color:${c.c};margin-bottom:4px;">${c.l}</div>
    ${crits.map(cr=>{
      if (!criteriosData || !criteriosData[cr.k]) return `<div class="crit nd">⚠ ${cr.l} — No descargado en FILTROS</div>`;
      const val = criteriosData[cr.k][pat.id];
      const activo = val && val[cr.k];
      return `<div class="crit ${activo?"ok":"no"}">${activo?"✓":"○"} ${cr.l}</div>`;
    }).join("")}
  </div>`;
}).join("")||"<em style='color:#94A3B8'>Sin perfiles activos</em>"}

<h2>5. Índices de Complejidad</h2>
<div style="display:flex;gap:12px;flex-wrap:wrap;">
  ${[["COMORBILIDAD",pat.co,7],["HIPERFRECUENT.",pat.fr,13],["COMPLEJIDAD",pat.compl,30]].map(([l,v,m])=>{
    const p=Math.min(v/m*100,100), color=v>m*0.6?"#DC2626":v>m*0.35?"#D97706":"#059669";
    return `<div class="idx" style="background:${color}15;border:1px solid ${color}40;">
      <div style="font-size:9px;font-weight:700;color:${color};text-transform:uppercase;">${l}</div>
      <div style="font-size:18px;font-weight:800;color:${color};">${v}</div>

</div>

<h2>6. Adecuación TOP</h2>
<div style="margin:6px 0;">TOP: <strong>${pat.top_adec}%</strong> (Media OSI: ${OSI_STATS.top_media}% · P75: ${OSI_STATS.top_p75}%)</div>
<div class="bar-wrap"><div class="bar-fill" style="width:${pat.top_adec}%;background:${pat.top_adec>=OSI_STATS.top_p75?"#059669":pat.top_adec>=OSI_STATS.top_media?"#D97706":"#DC2626"};"></div></div>

<div style="margin:6px 0;">Auditoría: <strong>${pat.audit_adec}%</strong> (Media OSI: ${OSI_STATS.audit_media}% · P75: ${OSI_STATS.audit_p75}%)</div>
<div class="bar-wrap"><div class="bar-fill" style="width:${pat.audit_adec}%;background:${pat.audit_adec>=OSI_STATS.audit_p75?"#059669":pat.audit_adec>=OSI_STATS.audit_media?"#D97706":"#DC2626"};"></div></div>
${(pat.audit_pend||[]).length ? `
<div style="margin-top:8px;font-size:11px;font-weight:700;color:#92400E;">⚠️ Elementos pendientes (${(pat.audit_pend||[]).length}):</div>
${(pat.audit_pend||[]).map(e=>`<div class="pend">● ${e}</div>`).join("")}
` : `<div style="margin-top:8px;padding:6px 12px;background:#D1FAE5;border:1px solid #6EE7B7;border-radius:4px;font-size:11px;color:#065F46;">✅ Sin elementos pendientes</div>`}

<div style="margin-top:24px;padding-top:12px;border-top:1px solid #E2E8F0;font-size:9px;color:#94A3B8;">

  ${!canCIC ? " · CIC RESTRINGIDO según perfil de usuario" : ""}
</div>
</body></html>`;

  const w = window.open("","_blank","width=800,height=900");

}

function textoHistoria(pat, canCIC, ac, criteriosData) {
  const cic = canCIC ? pat.cic : "RESTRINGIDO";
  const gip = [pat.gip_ap?"GIP AP":"",pat.gip_hosp?"GIP Hosp.":"",pat.gip_osarean?"GIP OSAREAN":""].filter(Boolean).join(", ")||"Sin programa";
  const lines = [
    "═══ PACIENTE CRÓNICO PCRON ═══",
    `ID: ${pat.id}  ·  CIC: ${cic}`,
    `Sexo: ${pat.sexo==="H"?"Hombre":"Mujer"}  ·  Edad: ${pat.edad} años`,
    `OSI: ${pat.osi}  ·  Centro: ${pat.centro}  ·  Cupo: ${pat.cupo}`,
    `Médico Ref.: ${pat.medico||"—"}  ·  Bloque: ${pat.bloque||"—"}`,
    `Programas GIP: ${gip}`,
    "",
    `GRUPO DE POBLACIÓN: ${pat.pob}`,
    "",
    `PERFILES ACTIVOS: ${ac.length ? ac.map(c=>c.l).join(", ") : "Ninguno"}`,
    "",
  ];
  ac.forEach(c => {
    const crits = CRITERIOS_PERFIL[c.k]||[];
    if (!crits.length) return;
    lines.push(`[${c.l.toUpperCase()}]`);
    crits.forEach(cr => {
      if (!criteriosData || !criteriosData[cr.k]) {
        lines.push(`  ○ ${cr.l} — No descargado`);
      } else {
        const val = criteriosData[cr.k][pat.id];
        const activo = val && val[cr.k];
        lines.push(`  ${activo?"✓":"○"} ${cr.l}`);
      }
    });
    lines.push("");
  });
  lines.push(
    `ÍNDICES: Complejidad=${pat.compl}  ·  Comorbilidad=${pat.co}  ·  Hiperfrecuent.=${pat.fr}`,
    `TOP adecuación: ${pat.top_adec}% (Media OSI: ${OSI_STATS.top_media}%  ·  P75: ${OSI_STATS.top_p75}%)`,
    `Auditoría: ${pat.audit_adec}% (Media OSI: ${OSI_STATS.audit_media}%  ·  P75: ${OSI_STATS.audit_p75}%)`,
    `Pendientes auditoría: ${(pat.audit_pend||[]).length>0 ? (pat.audit_pend||[]).join(", ") : "Ninguno"}`,
    "",
    `Generado: ${new Date().toLocaleString("es-ES")} · VISOR PCRON ${META.version}`,
  );
  return lines.join("\n");
}

function ModalPaciente({pat, canCIC, criteriosData, loadedGrupos, onLoadGrupo, onClose}) {
  const [copied, setCopied] = useState(false);
  const [loadingGrupo, setLoadingGrupo] = useState(null);
  if (!pat) return null;
  const ac = CARACTS_DEF.filter(c=>pat[c.k]);

  const copiar = () => {
    navigator.clipboard.writeText(textoHistoria(pat, canCIC, ac, criteriosData)).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false),2500);
    });
  };
  const exportPDF = () => exportarPacientePDF(pat, canCIC, ac, criteriosData);

  const cargarGrupo = async (grupoId) => {
    setLoadingGrupo(grupoId);
    await onLoadGrupo(grupoId, [pat.id]);
    setLoadingGrupo(null);
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:500,padding:16,overflowY:"auto"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:14,width:"100%",maxWidth:700,margin:"auto",marginTop:20,marginBottom:20,boxShadow:"0 24px 72px rgba(0,0,0,0.5)"}}>

        {/* CABECERA */}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.5}}>PACIENTE · VISOR PCRON</div>
              <div style={{color:"white",fontSize:22,fontWeight:900,fontFamily:"monospace",letterSpacing:-1}}>{pat.id}</div>
              <div style={{color:canCIC?"#94A3B8":"#FCA5A5",fontSize:11,marginBottom:6}}>
                CIC: {canCIC ? pat.cic : <span style={{color:"#FCA5A5"}}>🔒 RESTRINGIDO</span>}
              </div>
              <PobBadge pob={pat.pob}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>
              <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:7,padding:"5px 11px",color:"white",cursor:"pointer",fontSize:16}}>✕</button>
              <button onClick={copiar} style={{background:copied?"#059669":"rgba(255,255,255,0.1)",border:`1px solid ${copied?"#059669":"rgba(255,255,255,0.25)"}`,borderRadius:7,padding:"6px 12px",color:"white",cursor:"pointer",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5,transition:"all .2s",whiteSpace:"nowrap"}}>
                {copied?"✓ Copiado":"📋 Pegar a Historia"}
              </button>
              <button onClick={exportPDF} style={{background:"rgba(59,130,246,0.2)",border:"1px solid rgba(59,130,246,0.5)",borderRadius:7,padding:"6px 12px",color:"#93C5FD",cursor:"pointer",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                📄 Exportar PDF
              </button>
            </div>
          </div>
        </div>

        <div style={{padding:"16px 22px",maxHeight:"75vh",overflowY:"auto"}}>

          {/* 1. DATOS BÁSICOS */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.8,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#3B82F6"}}/>Datos Básicos
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {[
                ["Sexo",    pat.sexo==="H"?"Hombre":"Mujer"],
                ["Edad",    `${pat.edad} años`],
                ["OSI",     pat.osi],
                ["Centro",  pat.centro],
                ["Cupo",    pat.cupo],
                ["Médico Ref.", pat.medico||"—"],
                ["Bloque PCRON",pat.bloque||"—"],
                ["GIP AP",   pat.gip_ap?"Sí":"No"],
                ["GIP Hosp.", pat.gip_hosp?"Sí":"No"],
              ].map(([k,v])=>(
                <div key={k} style={{background:"#F8FAFC",borderRadius:7,padding:"7px 10px"}}>
                  <div style={{fontSize:8,color:"#94A3B8",fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:600,color:"#1E293B",marginTop:1}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* 2. CARACTERÍSTICAS ACTIVAS */}
          <div style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",marginBottom:12}}>
            <div style={{padding:"8px 14px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",fontWeight:700,fontSize:12,color:"#1E293B",display:"flex",alignItems:"center",gap:6}}>

              CARACTERÍSTICAS ACTIVAS

            <div style={{padding:"10px 12px",display:"flex",flexWrap:"wrap",gap:5}}>

          <div style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",marginBottom:12}}>
            <div style={{padding:"8px 14px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",fontWeight:700,fontSize:12,color:"#1E293B",display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#F59E0B"}}/>
              CRITERIOS ACTIVOS POR PERFIL
            </div>
            <div style={{padding:"10px 12px"}}>
              {ac.length===0 ? (
                <span style={{color:"#94A3B8",fontSize:12,fontStyle:"italic"}}>Sin perfiles activos</span>
              ) : ac.map(caract=>{
                const crits = CRITERIOS_PERFIL[caract.k]||[];
                if (!crits.length) return null;
                // Ver qué grupo cubre estos criterios
                const grupoId = GRUPOS_CRITERIOS.find(g=>g.keys.some(k=>crits.some(c=>c.k===k)))?.id;
                const grupoLoaded = grupoId && loadedGrupos.includes(grupoId);
                return (
                  <div key={caract.k} style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:caract.c,marginBottom:5,display:"flex",alignItems:"center",gap:6}}>

                      {caract.l}
                      {!grupoLoaded && grupoId && (

                    </div>
                    {crits.map(cr=>{
                      if (!grupoLoaded) {
                        return (
                          <div key={cr.k} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",borderRadius:5,background:"#F8FAFC",border:"1px solid #E2E8F0",marginBottom:3}}>

                            <span style={{fontSize:11,color:"#94A3B8",fontStyle:"italic"}}>{cr.l}</span>

                          </div>
                        );
                      }
                      const cd = criteriosData?.[cr.k];
                      const patRow = cd?.[pat.id];
                      const activo = patRow && patRow[cr.k];
                      return (
                        <div key={cr.k} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:5,border:"1px solid",marginBottom:3,
                          borderColor:activo?"#6EE7B7":"#FCA5A5",
                          background:activo?"#D1FAE5":"#FEF2F2"}}>
                          <span style={{color:activo?"#059669":"#DC2626",fontSize:12,fontWeight:800}}>{activo?"✓":"○"}</span>
                          <span style={{fontSize:11,color:activo?"#065F46":"#991B1B",fontWeight:activo?600:400}}>{cr.l}</span>
                          {activo && <span style={{marginLeft:"auto",fontSize:9,color:"#059669",fontWeight:700,background:"#D1FAE5",padding:"1px 5px",borderRadius:3}}>ACTIVO</span>}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>

          {/* 4. ÍNDICES */}
          <div style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",marginBottom:12}}>
            <div style={{padding:"8px 14px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",fontWeight:700,fontSize:12,color:"#1E293B",display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#3B82F6"}}/>ÍNDICES DE COMPLEJIDAD
            </div>
            <div style={{padding:"12px 14px",display:"flex",gap:8}}>
              {[["COMORBILIDAD",pat.co,7],["HIPERFRECUENT.",pat.fr,13],["COMPLEJIDAD",pat.compl,30]].map(([lbl,val,max])=>{
                const p=Math.min(val/max*100,100);
                const color=val>max*0.6?"#DC2626":val>max*0.35?"#D97706":"#059669";
                const nivel=val>max*0.6?"Alto":val>max*0.35?"Moderado":"Bajo";
                return (
                  <div key={lbl} style={{flex:1,background:color+"15",border:`1px solid ${color}40`,borderRadius:9,padding:"10px 12px"}}>
                    <div style={{fontSize:9,fontWeight:800,color,letterSpacing:.8,marginBottom:3}}>{lbl}</div>
                    <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:6}}>
                      <span style={{fontSize:20,fontWeight:800,color,lineHeight:1}}>{val}</span>
                      <span style={{background:color+"25",color,padding:"1px 6px",borderRadius:6,fontSize:9,fontWeight:700}}>{nivel}</span>
                    </div>
                    <div style={{height:6,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:p+"%",background:color,borderRadius:3}}/>

              })}
            </div>
          </div>

          {/* 5. TOP + AUDITORÍA */}
          <div style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",marginBottom:12}}>
            <div style={{padding:"8px 14px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",fontWeight:700,fontSize:12,color:"#1E293B"}}>
              ⭐ PERFILES TOP — Adecuación

            <div style={{padding:"12px 14px"}}>
              <IndexBar label="% Adecuación TOP" value={pat.top_adec} max={100} osi_media={OSI_STATS.top_media} osi_p75={OSI_STATS.top_p75} color="#6366F1"/>
            </div>
          </div>
          <div style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden"}}>
            <div style={{padding:"8px 14px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",fontWeight:700,fontSize:12,color:"#1E293B"}}>

            </div>
            <div style={{padding:"12px 14px"}}>
              <IndexBar label="% Adecuación Auditoría" value={pat.audit_adec} max={100} osi_media={OSI_STATS.audit_media} osi_p75={OSI_STATS.audit_p75} color="#0891B2"/>
              {(pat.audit_pend||[]).length>0 ? (
                <div style={{marginTop:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#92400E",marginBottom:5}}>⚠️ ELEMENTOS PENDIENTES ({(pat.audit_pend||[]).length})</div>
                  {(pat.audit_pend||[]).map(e=>(
                    <div key={e} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:5,marginBottom:3}}>
                      <span style={{color:"#D97706",fontSize:10}}>●</span>
                      <span style={{fontSize:11,color:"#92400E",fontWeight:500}}>{e}</span>
                    </div>
                  ))}

              )}
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

function TabEstadisticas({pacientes}) {
  const N=pacientes.length;
  if (!N) return <div style={{textAlign:"center",padding:40,color:"#94A3B8"}}>Sin datos</div>;
  const hombres=pacientes.filter(p=>p.sexo==="H").length;
  const mujeres=N-hombres;
  const rangosEdad=[
    {label:"< 65",  n:pacientes.filter(p=>p.edad<65).length},
    {label:"65–74", n:pacientes.filter(p=>p.edad>=65&&p.edad<=74).length},
    {label:"75–84", n:pacientes.filter(p=>p.edad>=75&&p.edad<=84).length},
    {label:"85–94", n:pacientes.filter(p=>p.edad>=85&&p.edad<=94).length},
    {label:"≥ 95",  n:pacientes.filter(p=>p.edad>=95).length},
  ];
  const top_media_pac=Math.round(pacientes.reduce((s,p)=>s+(p.top_adec||0),0)/N);
  const audit_media_pac=Math.round(pacientes.reduce((s,p)=>s+(p.audit_adec||0),0)/N);
  const conPend=pacientes.filter(p=>(p.audit_pend||[]).length>0).length;
  const Box=({children,style={}})=>(
    <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",...style}}>{children}</div>
  );
  const ST=({icon,title,sub})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:8,borderBottom:"2px solid #E2E8F0"}}>
      <span style={{fontSize:18}}>{icon}</span>
      <div>
        <div style={{fontSize:14,fontWeight:800,color:"#1E293B"}}>{title}</div>
        {sub&&<div style={{fontSize:11,color:"#94A3B8"}}>{sub}</div>}
      </div>
    </div>
  );
  const unique=(arr,k)=>[...new Set(arr.map(p=>p[k]))].sort();

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Box>
        <ST icon="📊" title="Básicos" sub={`N=${nFmt(N)} pacientes`}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Sexo</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {[{l:"Hombres",n:hombres,c:"#3B82F6"},{l:"Mujeres",n:mujeres,c:"#EC4899"}].map(s=>(
                <div key={s.l} style={{flex:1,padding:"10px",background:s.c+"10",border:`1px solid ${s.c}30`,borderRadius:8,textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:800,color:s.c}}>{nFmt(s.n)}</div>
                  <div style={{fontSize:10,color:s.c,fontWeight:700}}>{pct(s.n,N)}%</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex"}}>
              <div style={{flex:hombres,background:"#3B82F6"}}/><div style={{flex:mujeres,background:"#EC4899"}}/>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Edad (rangos)</div>
            {rangosEdad.map(r=><BarRow key={r.label} label={r.label} n={r.n} total={N} color="#6366F1"/>)}
          </div>
        </div>
      </Box>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <Box>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>OSI</div>
          {unique(pacientes,"osi").map(osi=><BarRow key={osi} label={osi} n={pacientes.filter(p=>p.osi===osi).length} total={N} color="#0891B2"/>)}
        </Box>
        <Box>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Centros</div>
          {unique(pacientes,"centro").map(c=><BarRow key={c} label={c} n={pacientes.filter(p=>p.centro===c).length} total={N} color="#0284C7"/>)}
        </Box>
        <Box>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Médico Referencia</div>
          {unique(pacientes,"medico").filter(Boolean).slice(0,8).map(m=><BarRow key={m} label={m} n={pacientes.filter(p=>p.medico===m).length} total={N} color="#7C3AED"/>)}
        </Box>
      </div>

      <Box>
        <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Programas de Seguimiento (GIP)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
          {[
            {l:"GIP AP",    n:pacientes.filter(p=>p.gip_ap).length,  c:"#0891B2"},
            {l:"GIP Hosp.", n:pacientes.filter(p=>p.gip_hosp).length, c:"#7C3AED"},
            {l:"GIP OSAREAN",n:pacientes.filter(p=>p.gip_osarean).length,c:"#059669"},
            {l:"Sin programa",n:pacientes.filter(p=>!p.gip_ap&&!p.gip_hosp&&!p.gip_osarean).length,c:"#94A3B8"},
          ].map(g=>(
            <div key={g.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:g.c+"10",border:`1px solid ${g.c}30`,borderRadius:8}}>
              <span style={{fontSize:12,color:g.c,fontWeight:600}}>{g.l}</span>
              <div style={{textAlign:"right"}}>
                <span style={{fontWeight:700,color:"#1E293B",fontSize:14,marginRight:4}}>{nFmt(g.n)}</span>
                <span style={{color:"#94A3B8",fontSize:10}}>{pct(g.n,N)}%</span>
              </div>
            </div>
          ))}
        </div>
      </Box>

      <Box>
        <ST icon="👥" title="Grupos de Población" sub="N y % por grupo"/>
        {Object.entries(POB_DEF).map(([pob,c])=>{
          const n=pacientes.filter(p=>p.pob===pob).length;
          return (
            <div key={pob} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{width:160,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:10,height:10,borderRadius:2,background:c.bg,flexShrink:0}}/>
                <span style={{fontSize:11,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pob}</span>
              </div>
              <div style={{flex:1,height:14,background:"#F1F5F9",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct(n,N)+"%",background:c.bg,borderRadius:4,transition:"width .4s"}}/>
              </div>
              <div style={{width:40,fontWeight:700,color:"#1E293B",fontSize:13,textAlign:"right"}}>{nFmt(n)}</div>
              <div style={{width:44,color:"#94A3B8",fontSize:11,textAlign:"right"}}>{pct(n,N)}%</div>
            </div>
          );
        })}
      </Box>

      <Box>
        <ST icon="🏷️" title="Características / Perfiles"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6}}>
          {CARACTS_DEF.map(c=>{
            const n=pacientes.filter(p=>p[c.k]).length;
            return (
              <div key={c.k} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:c.c+"08",border:`1px solid ${c.c}25`,borderRadius:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:c.c}}/>
                <span style={{fontSize:12,color:c.c,fontWeight:600,flex:1}}>{c.l}</span>
                <span style={{fontWeight:800,color:"#1E293B",fontSize:13}}>{nFmt(n)}</span>
                <span style={{color:"#94A3B8",fontSize:10}}>{pct(n,N)}%</span>
              </div>
            );
          })}
        </div>
      </Box>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Box>
          <ST icon="⭐" title="TOP" sub="% adecuación vs OSI"/>
          <div style={{padding:"8px 12px",background:"#F8FAFC",borderRadius:8,marginBottom:10,display:"flex",gap:16,alignItems:"center"}}>
            <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:700}}>MEDIA PACIENTES</div>
              <div style={{fontSize:22,fontWeight:800,color:"#1E293B"}}>{top_media_pac}%</div></div>
            <div style={{width:1,height:40,background:"#E2E8F0"}}/>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI MEDIA</div><div style={{fontWeight:700,color:"#64748B"}}>{OSI_STATS.top_media}%</div></div>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI P75</div><div style={{fontWeight:700,color:"#1D4ED8"}}>{OSI_STATS.top_p75}%</div></div>
            </div>
          </div>
          <IndexBar label="Adecuación TOP media" value={top_media_pac} max={100} osi_media={OSI_STATS.top_media} osi_p75={OSI_STATS.top_p75} color="#6366F1"/>
        </Box>
        <Box>
          <ST icon="🔍" title="Auditoría" sub="% adecuación y pendientes"/>
          <div style={{padding:"8px 12px",background:"#F8FAFC",borderRadius:8,marginBottom:8,display:"flex",gap:16,alignItems:"center"}}>
            <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:700}}>MEDIA PACIENTES</div>
              <div style={{fontSize:22,fontWeight:800,color:"#1E293B"}}>{audit_media_pac}%</div></div>
            <div style={{width:1,height:40,background:"#E2E8F0"}}/>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI MEDIA</div><div style={{fontWeight:700,color:"#64748B"}}>{OSI_STATS.audit_media}%</div></div>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI P75</div><div style={{fontWeight:700,color:"#1D4ED8"}}>{OSI_STATS.audit_p75}%</div></div>
            </div>
          </div>
          {conPend>0&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:7,marginBottom:8}}>
            <span>⚠️</span><div><div style={{fontSize:12,fontWeight:700,color:"#92400E"}}>{nFmt(conPend)} pacientes con pendientes</div>
              <div style={{fontSize:10,color:"#B45309"}}>{pct(conPend,N)}% del total</div></div>
          </div>}
          <IndexBar label="Adecuación Auditoría media" value={audit_media_pac} max={100} osi_media={OSI_STATS.audit_media} osi_p75={OSI_STATS.audit_p75} color="#0891B2"/>
        </Box>
      </div>
    </div>
  );
}

// ❾  TAB DETALLE
// ════════════════════════════════════════════════════════════════════════════
const ALL_COLS=[
  {k:"id",    label:"ID",             def:true, fixed:true},
  {k:"cic",   label:"CIC",            def:false,fixed:false},
  {k:"sexo",  label:"Sexo",           def:true, fixed:false},
  {k:"edad",  label:"Edad",           def:true, fixed:false},
  {k:"osi",   label:"OSI",            def:true, fixed:false},
  {k:"centro",label:"Centro",         def:true, fixed:false},
  {k:"cupo",  label:"Cupo",           def:false,fixed:false},
  {k:"medico",label:"Médico",         def:false,fixed:false},
  {k:"pob",   label:"Grupo Poblac.",  def:true, fixed:false},
  {k:"caracts",label:"Perfiles",      def:true, fixed:false},
  {k:"compl", label:"Complejidad",    def:true, fixed:false},
  {k:"co",    label:"Comorbilidad",   def:false,fixed:false},
  {k:"fr",    label:"Hiperfrecuent.", def:false,fixed:false},
  {k:"top_adec",label:"TOP %",        def:true, fixed:false},
  {k:"audit_adec",label:"Audit. %",   def:false,fixed:false},
];
const PAGE_SIZE=50;

function TabDetalle({pacientes,canCIC,criteriosData,loadedGrupos,onLoadGrupo}) {
  const [search,setSearch]=useState("");
  const [page,setPage]=useState(1);
  const [visCols,setVisCols]=useState(ALL_COLS.filter(c=>c.def).map(c=>c.k));
  const [colsOpen,setColsOpen]=useState(false);
  const [pat,setPat]=useState(null);

  const fil=useMemo(()=>pacientes.filter(p=>
    !search||
    String(p.id||"").includes(search)||
    String(p.cic||"").includes(search)||
    String(p.centro||"").toLowerCase().includes(search.toLowerCase())||
    String(p.medico||"").toLowerCase().includes(search.toLowerCase())
  ),[pacientes,search]);

  const totalPags=Math.max(1,Math.ceil(fil.length/PAGE_SIZE));
  const rows=fil.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  const cols=ALL_COLS.filter(c=>visCols.includes(c.k));
  const togCol=k=>{
    if(ALL_COLS.find(c=>c.k===k)?.fixed) return;
    if(visCols.includes(k)){if(visCols.length>2)setVisCols(v=>v.filter(x=>x!==k));}
    else setVisCols(v=>[...v,k]);
  };

  return (
    <>
      {pat&&<ModalPaciente pat={pat} canCIC={canCIC} criteriosData={criteriosData} loadedGrupos={loadedGrupos} onLoadGrupo={onLoadGrupo} onClose={()=>setPat(null)}/>}
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:180,maxWidth:340}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94A3B8"}}>🔍</span>
          <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="ID, CIC, centro, médico…"
            style={{width:"100%",padding:"9px 12px 9px 34px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:13,background:"white",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <button onClick={()=>setColsOpen(o=>!o)} style={{padding:"9px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${colsOpen?"#93C5FD":"#E2E8F0"}`,background:colsOpen?"#DBEAFE":"#F8FAFC",color:colsOpen?"#1D4ED8":"#475569",fontFamily:"inherit"}}>
          ⊞ Columnas {colsOpen?"▲":"▼"}
        </button>
        <button style={{padding:"9px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"1.5px solid #6EE7B7",background:"#D1FAE5",color:"#065F46",fontFamily:"inherit"}}>📊 Excel</button>
        <button style={{padding:"9px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"1.5px solid #FCA5A5",background:"#FEE2E2",color:"#991B1B",fontFamily:"inherit"}}>📄 PDF</button>
        <span style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>{nFmt(fil.length)} pacientes</span>
      </div>

      {colsOpen&&(
        <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"12px 16px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Columnas visibles</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:5}}>
            {ALL_COLS.map(c=>{
              const blocked=c.k==="cic"&&!canCIC;
              const on=visCols.includes(c.k);
              return (
                <div key={c.k} onClick={()=>!blocked&&!c.fixed&&togCol(c.k)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:7,border:`1px solid ${on&&!blocked?"#BFDBFE":"#E2E8F0"}`,cursor:blocked||c.fixed?"default":"pointer",opacity:blocked?0.4:1,fontSize:12,fontWeight:on&&!blocked?600:400,background:on&&!blocked?"#EFF6FF":"#FAFBFC",color:on&&!blocked?"#1D4ED8":"#475569",userSelect:"none"}}>
                  <span style={{minWidth:14,fontSize:11}}>{blocked?"🔒":c.fixed?"📌":on?"✓":"○"}</span>
                  {c.label}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#F8FAFC",borderBottom:"2px solid #E2E8F0"}}>
                {cols.map(c=><th key={c.k} style={{padding:"9px 12px",textAlign:"left",fontWeight:700,color:"#475569",fontSize:10,letterSpacing:.7,whiteSpace:"nowrap",textTransform:"uppercase"}}>{c.label}</th>)}
                <th style={{padding:"9px 12px",width:50}}/>
              </tr>
            </thead>
            <tbody>
              {rows.map((p,i)=>(
                <tr key={p.id} onClick={()=>setPat(p)} style={{borderBottom:"1px solid #F1F5F9",background:i%2===0?"white":"#FAFBFC",cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#EFF6FF"}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"white":"#FAFBFC"}>
                  {cols.map(c=>{
                    switch(c.k) {
                      case "id":      return <td key="id"     style={{padding:"8px 12px",fontFamily:"monospace",fontSize:11,fontWeight:700,color:"#334155"}}>{p.id}</td>;
                      case "cic":     return <td key="cic"    style={{padding:"8px 12px",fontFamily:"monospace",fontSize:11,color:canCIC?"#64748B":"#CBD5E1"}}>{canCIC?p.cic:"🔒 REST."}</td>;
                      case "sexo":    return <td key="sexo"   style={{padding:"8px 12px"}}><span style={{display:"inline-block",width:20,height:20,borderRadius:"50%",background:p.sexo==="H"?"#DBEAFE":"#FCE7F3",color:p.sexo==="H"?"#1D4ED8":"#BE185D",fontSize:10,fontWeight:700,lineHeight:"20px",textAlign:"center"}}>{p.sexo}</span></td>;
                      case "edad":    return <td key="edad"   style={{padding:"8px 12px",fontWeight:700,color:p.edad>=85?"#DC2626":"#1E293B"}}>{p.edad}{p.edad>=85&&<span style={{fontSize:8,color:"#DC2626",marginLeft:2}}>▲85</span>}</td>;
                      case "osi":     return <td key="osi"    style={{padding:"8px 12px",fontSize:11,color:"#64748B"}}>{p.osi}</td>;
                      case "centro":  return <td key="centro" style={{padding:"8px 12px",fontWeight:600,color:"#1E293B"}}>{p.centro}</td>;
                      case "cupo":    return <td key="cupo"   style={{padding:"8px 12px",fontFamily:"monospace",fontSize:11,color:"#64748B"}}>{p.cupo}</td>;
                      case "medico":  return <td key="medico" style={{padding:"8px 12px",fontSize:11,color:"#475569"}}>{p.medico}</td>;
                      case "pob":     return <td key="pob"    style={{padding:"8px 12px"}}><PobBadge pob={p.pob}/></td>;
                      case "caracts": return <td key="caracts"style={{padding:"8px 12px"}}><ProfileChips patient={p}/></td>;
                      case "compl":   return <td key="compl"  style={{padding:"8px 12px"}}><div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:36,height:5,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:Math.min(p.compl/25*100,100)+"%",background:p.compl>15?"#DC2626":p.compl>8?"#D97706":"#059669",borderRadius:3}}/></div><span style={{fontWeight:700,color:"#475569",fontSize:12}}>{p.compl}</span></div></td>;
                      case "co":      return <td key="co"     style={{padding:"8px 12px",fontWeight:700,color:p.co>4?"#DC2626":p.co>2?"#D97706":"#64748B"}}>{p.co}</td>;
                      case "fr":      return <td key="fr"     style={{padding:"8px 12px",fontWeight:700,color:p.fr>5?"#DC2626":p.fr>3?"#D97706":"#64748B"}}>{p.fr}</td>;
                      case "top_adec":return <td key="top"    style={{padding:"8px 12px",fontWeight:700,color:p.top_adec>=OSI_STATS.top_p75?"#059669":p.top_adec>=OSI_STATS.top_media?"#D97706":"#DC2626"}}>{p.top_adec}%</td>;
                      case "audit_adec":return <td key="aud"  style={{padding:"8px 12px",fontWeight:700,color:p.audit_adec>=OSI_STATS.audit_p75?"#059669":p.audit_adec>=OSI_STATS.audit_media?"#D97706":"#DC2626"}}>{p.audit_adec}%</td>;
                      default:        return <td key={c.k}/>;
                    }
                  })}
                  <td style={{padding:"8px 12px"}}>
                    <button onClick={e=>{e.stopPropagation();setPat(p);}} style={{padding:"3px 9px",background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:6,fontSize:11,cursor:"pointer",color:"#475569",fontWeight:600,fontFamily:"inherit"}}>Ver</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderTop:"1px solid #F1F5F9",background:"#FAFBFC"}}>
          <span style={{fontSize:12,color:"#94A3B8"}}>Mostrando {nFmt((page-1)*PAGE_SIZE+1)}–{nFmt(Math.min(page*PAGE_SIZE,fil.length))} de {nFmt(fil.length)}</span>
          <div style={{display:"flex",gap:3}}>
            <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{padding:"4px 10px",border:"1px solid #E2E8F0",borderRadius:6,background:"white",cursor:page===1?"default":"pointer",color:page===1?"#CBD5E1":"#475569",fontSize:12}}>←</button>
            {[...Array(Math.min(5,totalPags))].map((_,i)=>{
              const n=Math.max(1,Math.min(page-2,totalPags-4))+i;
              return <button key={n} onClick={()=>setPage(n)} style={{padding:"4px 10px",border:"1px solid",borderColor:page===n?"#3B82F6":"#E2E8F0",borderRadius:6,background:page===n?"#3B82F6":"white",color:page===n?"white":"#475569",cursor:"pointer",fontSize:12,fontWeight:page===n?700:400}}>{n}</button>;
            })}
            <button onClick={()=>setPage(p=>Math.min(totalPags,p+1))} disabled={page===totalPags} style={{padding:"4px 10px",border:"1px solid #E2E8F0",borderRadius:6,background:"white",cursor:page===totalPags?"default":"pointer",color:page===totalPags?"#CBD5E1":"#475569",fontSize:12}}>→</button>
          </div>
        </div>
      </div>
    </>
  );
}

// ❿  TAB FILTROS (versión v5 integrada)
// ════════════════════════════════════════════════════════════════════════════
function TabFiltros({filtros,setFiltros,savedFiltros,setSavedFiltros,pacientes,loadedGrupos,onLoadGrupo}) {
  const [saveName,setSaveName]=useState("");
  const [expanded,setExpanded]=useState({});
  const toggle=(k)=>setExpanded(e=>({...e,[k]:!e[k]}));
  const addFiltro=(f)=>setFiltros(prev=>[...prev,{...f,id:Date.now(),logica:"Y"}]);
  const removeFiltro=(id)=>setFiltros(prev=>prev.filter(x=>x.id!==id));
  const updateLogica=(id,l)=>setFiltros(prev=>prev.map(f=>f.id===id?{...f,logica:l}:f));
  const logicaColor={Y:"#3B82F6",O:"#D97706",NO:"#DC2626"};
  const nFiltrado=applyFiltros(pacientes,filtros).length;

  const Seccion=({k,label,badge,children})=>(
    <div style={{border:"1px solid #E2E8F0",borderRadius:8,overflow:"hidden",marginBottom:6}}>
      <div onClick={()=>toggle(k)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"#F8FAFC",cursor:"pointer",userSelect:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{label}</span>
          {badge&&<span style={{fontSize:9,background:"#DBEAFE",color:"#1D4ED8",padding:"1px 6px",borderRadius:3,fontWeight:700}}>{badge}</span>}
        </div>
        <span style={{fontSize:10,color:"#94A3B8"}}>{expanded[k]?"▲":"▼"}</span>
      </div>
      {expanded[k]&&<div style={{padding:"10px 12px"}}>{children}</div>}
    </div>
  );

  const FBool=({campo,label})=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
      <span style={{fontSize:12,color:"#475569"}}>{label}</span>
      <div style={{display:"flex",gap:4}}>
        {["Sí","No"].map(v=>(
          <button key={v} onClick={()=>addFiltro({campo,label,tipo:"bool",valor:v==="Sí"})}
            style={{padding:"3px 9px",fontSize:10,border:"1px solid #E2E8F0",borderRadius:5,background:"white",cursor:"pointer",color:"#475569"}}>
            {v}
          </button>
        ))}
      </div>
    </div>
  );

  const FSelect=({campo,label,opciones})=>(
    <div style={{marginBottom:6}}>
      <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:3}}>{label}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
        {opciones.map(o=>(
          <button key={o} onClick={()=>addFiltro({campo,label:`${label}=${o}`,tipo:"select",valor:o})}
            style={{padding:"2px 7px",fontSize:10,border:"1px solid #E2E8F0",borderRadius:4,background:"white",cursor:"pointer",color:"#475569"}}>
            {o}
          </button>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      {/* COLUMNA 1: DATOS BÁSICOS */}
      <div>
        <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",letterSpacing:1.2,marginBottom:8,textTransform:"uppercase"}}>📋 Datos Básicos <span style={{background:"#D1FAE5",color:"#065F46",padding:"1px 6px",borderRadius:3}}>✅ Carga inicial</span></div>

        <Seccion k="sexo" label="Sexo">
          <FBool campo="sexo" label="Sexo"/>
          <div style={{display:"flex",gap:4}}>
            {["H","M"].map(v=><button key={v} onClick={()=>addFiltro({campo:"sexo",label:`Sexo = ${v==="H"?"Hombre":"Mujer"}`,tipo:"select",valor:v})} style={{flex:1,padding:"5px",fontSize:11,border:"1px solid #E2E8F0",borderRadius:5,background:v==="H"?"#EFF6FF":"#FDF2F8",cursor:"pointer",color:v==="H"?"#1D4ED8":"#BE185D",fontWeight:600}}>{v==="H"?"♂ Hombre":"♀ Mujer"}</button>)}
          </div>
        </Seccion>

        <Seccion k="osi" label="OSI">
          <FSelect campo="osi" label="OSI" opciones={["01 OSID","02 OSIT","03 RESTO OSI"]}/>
        </Seccion>

        <Seccion k="centro" label="Centro de Salud">
          <FSelect campo="centro" label="Centro" opciones={CENTROS_ALL}/>
        </Seccion>

        <Seccion k="bloque" label="Bloque Ref. PCRON" badge="04-13-03-02">
          <FSelect campo="bloque" label="Bloque" opciones={BLOQUES_PCRON}/>
        </Seccion>

        <Seccion k="gip" label="Programas GIP" badge="Carga inicial">
          <FBool campo="gip_ap"     label="GIP AP (04-12-05-02)"/>
          <FBool campo="gip_hosp"   label="GIP PCRON Hosp. (04-13-09-01)"/>
          <FBool campo="gip_osarean"label="GIP OSAREAN (04-15-09-01)"/>
        </Seccion>
      </div>

      {/* COLUMNA 2: CARACTERÍSTICAS */}
      <div>
        <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",letterSpacing:1.2,marginBottom:8,textTransform:"uppercase"}}>🏷️ Características</div>

        <Seccion k="pob" label="Grupo de Población">
          <FSelect campo="pob" label="Grupo" opciones={Object.keys(POB_DEF)}/>
        </Seccion>

        <Seccion k="perfiles" label="Perfiles">
          {CARACTS_DEF.map(c=><FBool key={c.k} campo={c.k} label={c.l}/>)}
        </Seccion>

        <Seccion k="may85" label="Mayor 85">
          <FBool campo="may85" label="Mayor 85 años"/>
        </Seccion>

        <Seccion k="top" label="TOP Adecuación %">
          <div style={{fontSize:11,color:"#64748B",marginBottom:6}}>Rango de adecuación TOP</div>
          <div style={{display:"flex",gap:4"}}>
            {[["≥ 80 (Bueno)","≥80",p=>p.top_adec>=80],["60–79 (Medio)","60-79",p=>p.top_adec>=60&&p.top_adec<80],["< 60 (Bajo)","<60",p=>p.top_adec<60]].map(([l,v])=>(
              <button key={v} onClick={()=>addFiltro({campo:"top_adec",label:`TOP ${v}%`,tipo:"range",min:v.startsWith("≥")?parseInt(v.slice(1)):v.startsWith("<")?0:60,max:v.startsWith("≥")?100:v.startsWith("<")?59:79})}
                style={{flex:1,padding:"4px 6px",fontSize:10,border:"1px solid #E2E8F0",borderRadius:4,background:"white",cursor:"pointer",color:"#475569"}}>{l}</button>
            ))}
          </div>
        </Seccion>
      </div>

      {/* COLUMNA 3: CRITERIOS BAJO DEMANDA */}
      <div>
        <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",letterSpacing:1.2,marginBottom:8,textTransform:"uppercase"}}>📦 Criterios Clínicos</div>
        <div style={{padding:"8px 10px",background:"#D1FAE5",border:"1px solid #6EE7B7",borderRadius:7,marginBottom:8,fontSize:10,color:"#065F46"}}>
          ✅ Médico/Bloque PCRON y GIP ya disponibles en carga inicial
        </div>

        {GRUPOS_CRITERIOS.map(g=>{
          const loaded=loadedGrupos.includes(g.id);
          return (
            <Seccion key={g.id} k={`crit_${g.id}`} label={g.label} badge={loaded?"Cargado":"📦 No cargado"}>
              {!loaded ? (
                <div style={{textAlign:"center",padding:"12px 0"}}>
                  <div style={{fontSize:11,color:"#94A3B8",marginBottom:8}}>Este grupo de criterios no está descargado</div>
                  <button onClick={()=>onLoadGrupo(g.id, pacientes.slice(0,5000).map(p=>p.id))}
                    style={{padding:"6px 14px",background:"#1D4ED8",border:"none",borderRadius:6,color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    📦 Cargar criterios
                  </button>
                </div>
              ) : (
                g.keys.map(k=><FBool key={k} campo={k} label={k.replace("crit_","").replace(/_/g," ")}/>)
              )}
            </Seccion>
          );
        })}

        {/* FILTROS ACTIVOS */}
        {filtros.length>0&&(
          <div style={{marginTop:12,padding:"10px 12px",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:9}}>
            <div style={{fontSize:10,fontWeight:700,color:"#1D4ED8",marginBottom:6}}>FILTROS ACTIVOS ({filtros.length})</div>
            {filtros.map(f=>(
              <div key={f.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                <select value={f.logica} onChange={e=>updateLogica(f.id,e.target.value)}
                  style={{fontSize:9,fontWeight:700,padding:"1px 3px",borderRadius:3,border:"none",background:logicaColor[f.logica]+"20",color:logicaColor[f.logica],cursor:"pointer"}}>
                  {["Y","O","NO"].map(l=><option key={l} value={l}>{l}</option>)}
                </select>
                <span style={{fontSize:10,flex:1,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.label}</span>
                <button onClick={()=>removeFiltro(f.id)} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:13,padding:0}}>×</button>
              </div>
            ))}
            <div style={{borderTop:"1px solid #BFDBFE",marginTop:8,paddingTop:8,display:"flex",gap:6}}>
              <input value={saveName} onChange={e=>setSaveName(e.target.value)} placeholder="Nombre del filtro…"
                style={{flex:1,padding:"4px 8px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11,fontFamily:"inherit"}}/>
              <button onClick={()=>{if(saveName){setSavedFiltros(p=>[...p,{name:saveName,filtros:[...filtros]}]);setSaveName("");}}}
                style={{padding:"4px 10px",background:"#059669",border:"none",borderRadius:5,color:"white",fontSize:11,cursor:"pointer",fontWeight:700}}>Guardar</button>
              <button onClick={()=>setFiltros([])}
                style={{padding:"4px 10px",background:"#DC2626",border:"none",borderRadius:5,color:"white",fontSize:11,cursor:"pointer"}}>Limpiar</button>
            </div>
            <div style={{marginTop:4,fontSize:10,color:"#1D4ED8",fontWeight:700}}>→ {nFmt(nFiltrado)} pacientes cumplen los filtros</div>
          </div>
        )}

        {savedFiltros.length>0&&(
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:5}}>FILTROS GUARDADOS</div>
            {savedFiltros.map((sf,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                <button onClick={()=>setFiltros(sf.filtros)} style={{flex:1,padding:"4px 8px",background:"white",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11,cursor:"pointer",color:"#475569",textAlign:"left"}}>
                  📂 {sf.name}
                </button>
                <button onClick={()=>setSavedFiltros(p=>p.filter((_,j)=>j!==i))} style={{padding:"2px 7px",background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:4,fontSize:11,cursor:"pointer",color:"#991B1B"}}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ⓫  TAB ANÁLISIS (Simple + Complejo — versión v5)
// ════════════════════════════════════════════════════════════════════════════
function TabAnalisis({pacientes,savedAnalisis,setSavedAnalisis}) {
  const [modo,setModo]=useState("simple");
  const [campoA,setCampoA]=useState("pob");
  const [valorA,setValorA]=useState(Object.keys(POB_DEF)[0]);
  const [filtrosB,setFiltrosB]=useState([]);
  const [ejecutado,setEjecutado]=useState(false);
  const [saveName,setSaveName]=useState("");

  const campos=[
    {k:"pob",    l:"Grupo Población",  tipo:"select",opts:Object.keys(POB_DEF)},
    {k:"geron",  l:"Gerontológico",    tipo:"bool"},
    {k:"pal",    l:"Paliativo",        tipo:"bool"},
    {k:"dep",    l:"Dep. Domicilio",   tipo:"bool"},
    {k:"hfh",    l:"HF Hospitalario",  tipo:"bool"},
    {k:"comorb", l:"Comorbilidad",     tipo:"bool"},
    {k:"polimed",l:"Polimedicado",     tipo:"bool"},
    {k:"gip_ap", l:"GIP AP",          tipo:"bool"},
    {k:"gip_hosp",l:"GIP Hosp.",      tipo:"bool"},
    {k:"osi",    l:"OSI",             tipo:"select",opts:["01 OSID","02 OSIT","03 RESTO OSI"]},
    {k:"centro", l:"Centro",          tipo:"select",opts:CENTROS_ALL},
  ];

  const campoInfo=campos.find(c=>c.k===campoA)||campos[0];

  const grupoA=modo==="simple"
    ? pacientes.filter(p=>campoInfo.tipo==="bool" ? Boolean(p[campoA]) : p[campoA]===valorA)
    : applyFiltros(pacientes,[]);
  const grupoB=modo==="simple"
    ? pacientes.filter(p=>campoInfo.tipo==="bool" ? !p[campoA] : p[campoA]!==valorA)
    : applyFiltros(pacientes,filtrosB);

  const stats=(g)=>{
    if(!g.length) return {N:0,h:0,mujeres:0,edadMedia:0,compl:0,top:0,aud:0,polimed:0};
    return {
      N:g.length,
      h:g.filter(p=>p.sexo==="H").length,
      mujeres:g.filter(p=>p.sexo==="M").length,
      edadMedia:+(g.reduce((s,p)=>s+p.edad,0)/g.length).toFixed(1),
      compl:+(g.reduce((s,p)=>s+(p.compl||0),0)/g.length).toFixed(1),
      top:Math.round(g.reduce((s,p)=>s+(p.top_adec||0),0)/g.length),
      aud:Math.round(g.reduce((s,p)=>s+(p.audit_adec||0),0)/g.length),
      polimed:g.filter(p=>p.polimed).length,
    };
  };

  const sA=stats(grupoA), sB=stats(grupoB);
  const labelA=modo==="simple"?(campoInfo.tipo==="bool"?campoInfo.l+" = Sí":valorA):"Grupo A";
  const labelB=modo==="simple"?(campoInfo.tipo==="bool"?campoInfo.l+" = No":"Resto"):"Grupo B";

  const CompBar=({labelRow,nA,nB})=>{
    const total=nA+nB; if(!total) return null;
    return (
      <div style={{marginBottom:8}}>
        <div style={{fontSize:11,color:"#475569",marginBottom:3}}>{labelRow}</div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <div style={{width:nA/(total)*100+"%",maxWidth:"48%",minWidth:4,height:16,background:"#3B82F6",borderRadius:"4px 0 0 4px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:9,color:"white",fontWeight:700}}>{nFmt(nA)}</span>
          </div>
          <div style={{width:nB/(total)*100+"%",maxWidth:"48%",minWidth:4,height:16,background:"#94A3B8",borderRadius:"0 4px 4px 0",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:9,color:"white",fontWeight:700}}>{nFmt(nB)}</span>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* SELECTOR MODO */}
      <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"12px 16px"}}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["simple","📊 Simple","Un grupo vs el resto"],["complejo","📈 Complejo","Grupo A vs Grupo B independiente"]].map(([k,l,d])=>(
            <button key={k} onClick={()=>{setModo(k);setEjecutado(false);}} style={{flex:1,padding:"10px",border:`2px solid ${modo===k?"#3B82F6":"#E2E8F0"}`,borderRadius:8,background:modo===k?"#EFF6FF":"white",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style={{fontSize:13,fontWeight:700,color:modo===k?"#1D4ED8":"#1E293B"}}>{l}</div>
              <div style={{fontSize:10,color:"#94A3B8"}}>{d}</div>
            </button>
          ))}
        </div>

        {modo==="simple"&&(
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:3}}>Campo de análisis</div>
              <select value={campoA} onChange={e=>{setCampoA(e.target.value);setEjecutado(false);setValorA(campos.find(c=>c.k===e.target.value)?.opts?.[0]||"");}}
                style={{width:"100%",padding:"7px 10px",border:"1px solid #E2E8F0",borderRadius:7,fontSize:12,fontFamily:"inherit"}}>
                {campos.map(c=><option key={c.k} value={c.k}>{c.l}</option>)}
              </select>
            </div>
            {campoInfo.tipo==="select"&&(
              <div style={{flex:1}}>
                <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:3}}>Valor</div>
                <select value={valorA} onChange={e=>{setValorA(e.target.value);setEjecutado(false);}}
                  style={{width:"100%",padding:"7px 10px",border:"1px solid #E2E8F0",borderRadius:7,fontSize:12,fontFamily:"inherit"}}>
                  {(campoInfo.opts||[]).map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
            )}
            <button onClick={()=>setEjecutado(true)}
              style={{padding:"7px 20px",background:"#1D4ED8",border:"none",borderRadius:7,color:"white",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              ▶ Ejecutar
            </button>
          </div>
        )}
      </div>

      {/* RESULTADOS */}
      {ejecutado&&grupoA.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:labelA,s:sA,color:"#3B82F6"},{label:labelB,s:sB,color:"#94A3B8"}].map(({label,s,color})=>(
            <div key={label} style={{background:"white",border:`2px solid ${color}30`,borderRadius:10,padding:"14px 16px"}}>
              <div style={{fontSize:13,fontWeight:800,color,marginBottom:2}}>{label}</div>
              <div style={{fontSize:36,fontWeight:900,color,lineHeight:1}}>{nFmt(s.N)}</div>
              <div style={{fontSize:11,color:"#64748B",marginBottom:10}}>{pct(s.N,pacientes.length)}% del total</div>
              {[
                ["♂ Hombres",nFmt(s.h),pct(s.h,s.N)+"%"],
                ["♀ Mujeres",nFmt(s.mujeres),pct(s.mujeres,s.N)+"%"],
                ["Edad media",s.edadMedia+" años",""],
                ["Complejidad media",s.compl,""],
                ["TOP adecuación",s.top+"%",""],
                ["Auditoría",s.aud+"%",""],
              ].map(([l,v,sub])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #F8FAFC"}}>
                  <span style={{fontSize:11,color:"#64748B"}}>{l}</span>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{v}</span>
                    {sub&&<span style={{fontSize:10,color:"#94A3B8",marginLeft:4}}>{sub}</span>}
                  </div>
                </div>
              ))}
            </div>
          ))}

          <div style={{gridColumn:"span 2",background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#1E293B",marginBottom:10}}>Comparativa por grupo de población</div>
            {Object.entries(POB_DEF).map(([pob,c])=>{
              const nA=grupoA.filter(p=>p.pob===pob).length;
              const nB=grupoB.filter(p=>p.pob===pob).length;
              if(!nA&&!nB) return null;
              return <CompBar key={pob} labelRow={pob} nA={nA} nB={nB}/>;
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ⓬  APP PRINCIPAL — INTEGRACIÓN FINAL
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [loading,setLoading]=useState(true);
  const [progreso,setProgreso]=useState(0);
  const [error,setError]=useState(null);
  const [pacientes,setPacientes]=useState([]);
  const [tab,setTab]=useState("VISOR");
  const [role,setRole]=useState("ADM");
  const [filtros,setFiltros]=useState([]);
  const [savedFiltros,setSavedFiltros]=useState([]);
  const [savedAnalisis,setSavedAnalisis]=useState([]);
  const [loadedGrupos,setLoadedGrupos]=useState([]);
  const [criteriosData,setCriteriosData]=useState({});

  // ── CARGA INICIAL ─────────────────────────────────────────────────────────
  useEffect(()=>{
    const cargar=async()=>{
      try {
        const data=await cargarTodosPacientes(setProgreso);
        if (data.length===0) {
          // Sin datos en Supabase — carga demo de 10 pacientes de ejemplo
          console.warn("Supabase devolvió 0 registros. Usando datos DEMO.");
          setPacientes(DEMO_PACIENTES);
        } else {
          setPacientes(data);
        }
        setProgreso(100);
        setTimeout(()=>setLoading(false),400);
      } catch(e) {
        setError(e.message||"Error de conexión con Supabase");
        setPacientes(DEMO_PACIENTES);
        setLoading(false);
      }
    };
    cargar();
  },[]);

  // ── CARGA LAZY CRITERIOS ─────────────────────────────────────────────────
  const handleLoadGrupo=useCallback(async(grupoId, ids)=>{
    if(loadedGrupos.includes(grupoId)) return;
    const grupo=GRUPOS_CRITERIOS.find(g=>g.id===grupoId);
    if(!grupo) return;
    try {
      const map=await cargarCriteriosGrupo(grupo, ids);
      if(Object.keys(map).length>0) {
        setCriteriosData(prev=>{
          const next={...prev};
          grupo.keys.forEach(k=>{next[k]=next[k]||{};Object.entries(map).forEach(([id,row])=>{next[k][id]=row;});});
          return next;
        });
      }
      setLoadedGrupos(prev=>[...prev,grupoId]);
    } catch(e) {
      console.error("Error cargando criterios:",e);
    }
  },[loadedGrupos]);

  const canCIC=ROLES_DEF[role]?.cic||false;
  const pacientesFiltrados=useMemo(()=>applyFiltros(pacientes,filtros),[pacientes,filtros]);
  const pctTotal=+pct(pacientesFiltrados.length,META.totalBD);

  const TABS=[
    {k:"VISOR",       icon:"🏠"},
    {k:"FILTROS",     icon:"🎛"},
    {k:"ESTADÍSTICAS",icon:"📊"},
    {k:"DETALLE",     icon:"📋"},
    {k:"ANÁLISIS",    icon:"📈"},
    ...(ROLES_DEF[role]?.admin?[{k:"ADMINISTRACIÓN",icon:"⚙️",admin:true}]:[]),
  ];

  if(loading) return <PantallaCarga progreso={progreso} error={error} onRetry={()=>window.location.reload()}/>;

  return (
    <div style={{fontFamily:"'IBM Plex Sans',system-ui,sans-serif",background:"#F0F4F8",minHeight:"100vh"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800;900&display=swap');*{box-sizing:border-box;}input,button,select,textarea{font-family:inherit;}`}</style>

      {/* TOP BAR */}
      <div style={{background:"linear-gradient(135deg,#060E1E,#0F2444)",padding:"9px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:7,background:"linear-gradient(135deg,#3B82F6,#06B6D4)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:15}}>V</div>
          <div>
            <div style={{color:"white",fontWeight:800,fontSize:14,letterSpacing:1}}>VISOR PCRON</div>
            <div style={{color:"#64748B",fontSize:10}}>Paciente Crónico · Osakidetza · {META.version}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {pacientes.length===DEMO_PACIENTES.length&&pacientes[0]?.id===DEMO_PACIENTES[0]?.id&&(
            <div style={{background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:5,padding:"3px 10px",fontSize:10,color:"#92400E",fontWeight:700}}>
              ⚠️ MODO DEMO — Configura SUPABASE_URL
            </div>
          )}
          <select value={role} onChange={e=>setRole(e.target.value)} style={{fontSize:10,background:"rgba(255,255,255,0.1)",color:"#CBD5E1",border:"1px solid rgba(255,255,255,0.2)",borderRadius:4,padding:"3px 8px",cursor:"pointer"}}>
            {Object.entries(ROLES_DEF).map(([k,v])=><option key={k} value={k} style={{background:"#0F2444"}}>{v.label}</option>)}
          </select>
          <div style={{width:30,height:30,borderRadius:"50%",background:"#1E3A5F",border:"2px solid #3B82F6",display:"flex",alignItems:"center",justifyContent:"center",color:"#93C5FD",fontSize:14}}>👤</div>
        </div>
      </div>

      {/* HERO DARK */}
      <div style={{background:"linear-gradient(160deg,#0B1628 0%,#112240 55%,#0D3458 100%)",padding:"16px 24px 0"}}>
        {/* CONTADOR */}
        <div style={{display:"flex",gap:12,marginBottom:12}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(59,130,246,0.4)",borderRadius:12,padding:"14px 20px",display:"flex",alignItems:"center",gap:20}}>
            <div>
              <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:2}}>PACIENTES EN VISTA</div>
              <div style={{color:"white",fontSize:52,fontWeight:900,lineHeight:1,letterSpacing:-2}}>{nFmt(pacientesFiltrados.length)}</div>
              <div style={{color:"#64748B",fontSize:11,marginTop:2}}>de {nFmt(pacientes.length)} en base de datos</div>
            </div>
            <div style={{width:1,height:60,background:"rgba(255,255,255,0.1)"}}/>
            <div>
              <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:2}}>% DEL TOTAL</div>
              <div style={{color:"#38BDF8",fontSize:40,fontWeight:800,lineHeight:1}}>{pctTotal}%</div>
            </div>
            {filtros.length>0&&(
              <>
                <div style={{width:1,height:60,background:"rgba(255,255,255,0.1)"}}/>
                <div style={{flex:1}}>
                  <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:5}}>FILTROS ACTIVOS</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {filtros.map(f=>(
                      <span key={f.id} style={{fontSize:10,padding:"2px 8px",borderRadius:4,fontWeight:600,
                        background:{Y:"#1D4ED820",O:"#D9770620",NO:"#DC262620"}[f.logica],
                        color:{Y:"#93C5FD",O:"#FCD34D",NO:"#FCA5A5"}[f.logica],
                        border:`1px solid ${{Y:"rgba(59,130,246,0.3)",O:"rgba(217,119,6,0.3)",NO:"rgba(220,38,38,0.3)"}[f.logica]}`}}>
                        <span style={{fontWeight:800}}>{f.logica}</span> {f.label}
                      </span>
                    ))}
                  </div>
                </div>
              </>
            )}
          </div>

          {/* MINI HISTOGRAM */}
          <div style={{width:280,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"10px 12px"}}>
            <div style={{color:"#93C5FD",fontSize:8,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>DISTRIBUCIÓN POR GRUPO</div>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:40}}>
              {Object.entries(POB_DEF).map(([pob,c])=>{
                const n=pacientesFiltrados.filter(p=>p.pob===pob).length;
                const maxN=Math.max(...Object.keys(POB_DEF).map(k=>pacientesFiltrados.filter(p=>p.pob===k).length),1);
                return (
                  <div key={pob} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{width:"100%",height:Math.max(3,n/maxN*34)+"%",background:c.bg,borderRadius:2,transition:"height .4s"}}/>
                    <div style={{color:c.bg,fontSize:7,fontWeight:700}}>{n>0?n:""}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* TABS */}
        <div style={{display:"flex",gap:2}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{
              padding:"10px 18px",border:"none",cursor:"pointer",fontSize:12,
              fontWeight:tab===t.k?700:500,borderRadius:"8px 8px 0 0",
              borderBottom:`2px solid ${tab===t.k?(t.admin?"#DC2626":"#3B82F6"):"transparent"}`,
              background:tab===t.k?"#F0F4F8":"transparent",
              color:tab===t.k?(t.admin?"#991B1B":"#1E3A5F"):(t.admin?"#FCA5A5":"#94A3B8"),
              display:"flex",alignItems:"center",gap:5,transition:"all .15s",
            }}>
              {t.icon} {t.k}
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"16px 24px 32px"}}>
        {tab==="VISOR"&&(
          <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",padding:"20px 24px"}}>
            <div style={{fontSize:18,fontWeight:800,color:"#0F2444",marginBottom:4}}>VISOR PCRON — Paciente Crónico Osakidetza</div>
            <div style={{fontSize:13,color:"#64748B",marginBottom:16}}>Fuente: {META.fuente} · Snapshot: {META.fechaAct} · {nFmt(pacientes.length)} pacientes activos</div>
            <div style={{padding:"10px 14px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:8,fontSize:11,color:"#92400E",lineHeight:1.6}}>
              🔒 <strong>Confidencialidad CIC:</strong> ADM/DIR acceso total · CEN solo su centro · PROFESIONAL solo sus cupos. El CIC es dato personal sujeto a RGPD.
            </div>
          </div>
        )}
        {tab==="FILTROS"&&(
          <TabFiltros filtros={filtros} setFiltros={setFiltros} savedFiltros={savedFiltros} setSavedFiltros={setSavedFiltros}
            pacientes={pacientes} loadedGrupos={loadedGrupos} onLoadGrupo={handleLoadGrupo}/>
        )}
        {tab==="ESTADÍSTICAS"&&<TabEstadisticas pacientes={pacientesFiltrados}/>}
        {tab==="DETALLE"&&(
          <TabDetalle pacientes={pacientesFiltrados} canCIC={canCIC} criteriosData={criteriosData}
            loadedGrupos={loadedGrupos} onLoadGrupo={handleLoadGrupo}/>
        )}
        {tab==="ANÁLISIS"&&<TabAnalisis pacientes={pacientesFiltrados} savedAnalisis={savedAnalisis} setSavedAnalisis={setSavedAnalisis}/>}
      </div>
    </div>
  );
}
