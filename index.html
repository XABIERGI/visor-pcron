      <div style={{background:"linear-gradient(135deg,#060E1E,#0F2444)",padding:"9px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:7,background:"linear-gradient(135deg,#3B82F6,#06B6D4)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:15}}>V</div>
          <div>
            <div style={{color:"white",fontWeight:800,fontSize:14,letterSpacing:1}}>VISOR PCRON</div>
            <div style={{color:"#64748B",fontSize:10}}>Paciente Crónico · Osakidetza · {META.version}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,fontWeight:700,color:"white"}}>{authUser?.nombre}</div>
            <div style={{fontSize:9,color:"#93C5FD",fontWeight:600}}>CONSULTA · {authUser?.email}</div>
          </div>
          <button onClick={handleLogout}
            style={{padding:"5px 12px",fontSize:11,fontWeight:700,background:"rgba(220,38,38,0.15)",border:"1px solid rgba(220,38,38,0.3)",borderRadius:6,color:"#FCA5A5",cursor:"pointer"}}>
            ⏻ Salir
          </button>
        </div>
      </div>

      {/* CONTENIDO CENTRAL */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:480}}>
          {/* Título */}
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{fontSize:36,marginBottom:8}}>🔍</div>
            <div style={{color:"white",fontSize:22,fontWeight:800,marginBottom:6}}>Consulta de Paciente</div>
            <div style={{color:"#64748B",fontSize:13}}>Introduce el CIC o ID del paciente</div>
          </div>

          {/* Cajón de búsqueda */}
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input
              value={busq}
              onChange={e=>setBusq(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&buscar()}
              placeholder="CIC o ID paciente…"
              style={{flex:1,padding:"12px 16px",borderRadius:8,border:"2px solid rgba(59,130,246,0.3)",
                background:"rgba(255,255,255,0.06)",color:"white",fontSize:14,fontFamily:"monospace",
                outline:"none",boxSizing:"border-box"}}
              autoFocus
            />
            <button onClick={buscar}
              style={{padding:"12px 20px",background:"#3B82F6",border:"none",borderRadius:8,
                color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              Buscar
            </button>
          </div>

          {/* Resultado */}
          {resultado===false && (
            <div style={{padding:"16px 20px",background:"rgba(220,38,38,0.1)",border:"1px solid rgba(220,38,38,0.3)",
              borderRadius:10,textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:6}}>❌</div>
              <div style={{color:"#FCA5A5",fontWeight:700,fontSize:14}}>Paciente no encontrado</div>
              <div style={{color:"#64748B",fontSize:12,marginTop:4}}>
                El CIC o ID <strong style={{color:"#94A3B8"}}>{busq}</strong> no está en la base de datos PCRON
              </div>
            </div>
          )}

          {resultado && (
            <div style={{padding:"16px 20px",background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.3)",
              borderRadius:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div>
                  <div style={{color:"#93C5FD",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:4}}>PACIENTE ENCONTRADO</div>
                  <div style={{color:"white",fontSize:16,fontWeight:900,fontFamily:"monospace"}}>{resultado.id}</div>
                  <div style={{color:"#64748B",fontSize:12,marginTop:2}}>
                    CIC: <span style={{color:"#93C5FD",fontFamily:"monospace"}}>{resultado.cic}</span>
                    &nbsp;·&nbsp;{resultado.sexo==="H"?"♂ Hombre":"♀ Mujer"}
                    &nbsp;·&nbsp;{resultado.edad} años
                    &nbsp;·&nbsp;{resultado.centro||"—"}
                  </div>
                  {resultado.pob && (
                    <div style={{marginTop:6}}>
                      <PobBadge pob={resultado.pob}/>
                    </div>
                  )}
                </div>
                <button onClick={()=>setModal(resultado)}
                  style={{padding:"10px 18px",background:"#3B82F6",border:"none",borderRadius:8,
                    color:"white",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                  Ver detalle →
                </button>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Modal paciente */}
      {modal && (
        <ModalPaciente
          pat={modal}
          canCIC={true}
          criteriosData={{}}
          loadedGrupos={[]}
          onLoadGrupo={async()=>{}}
          onClose={()=>setModal(null)}
        />
      )}
    </div>
  );
}

function App() {
  // ── AUTH ──────────────────────────────────────────────────────────────────
  const [authState,setAuthState]   = useState("checking"); // checking|login|change_password|app
  const [authUser,setAuthUser]     = useState(null);   // {email,nombre,rol,primer_login,...}
  const [authError,setAuthError]   = useState("");
  const [authLoading,setAuthLoading]= useState(false);

  // ── APP ───────────────────────────────────────────────────────────────────
  const [loading,setLoading]=useState(true);
  const [progreso,setProgreso]=useState(0);
  const [error,setError]=useState(null);
  const [pacientes,setPacientes]=useState([]);
  const [criteriosPct,setCriteriosPct]=useState(null); // null=no iniciado, 0-99=cargando, 100=listo
  const [tab,setTab]=useState("VISOR");
  const [role,setRole]=useState("PROFESIONAL");
  const [filtros,setFiltros]=useState([]);
  const [savedFiltros,setSavedFiltros]=useState([]);
  const [savedAnalisis,setSavedAnalisis]=useState([]);
  const [loadedGrupos,setLoadedGrupos]=useState([]);
  const [criteriosData,setCriteriosData]=useState({});

  // ── VERIFICAR SESIÓN AL CARGAR (incluye tokens de invitación en URL) ───────
  useEffect(()=>{
    const checkSession=async()=>{
      try {
        const sb=await getSupabase();
        if(!sb){setAuthState("login");return;}

        // Detectar token de invitación/magic link en el hash de la URL
        const hash = window.location.hash;
        if(hash && hash.includes("access_token")) {
          // Supabase lo procesa automáticamente al llamar getSession
          // pero a veces hay que esperar un tick
          await new Promise(r=>setTimeout(r,300));
        }

        const {data:{session}, error} = await sb.auth.getSession();

        if(session){
          // Limpiar hash de la URL para que no quede visible
          if(hash && hash.includes("access_token")){
            window.history.replaceState(null,"",window.location.pathname);
          }
          await loadUserProfile(session.user, sb);
        } else if(hash && hash.includes("access_token")){
          // Intentar extraer y establecer sesión manualmente del hash
          const params = new URLSearchParams(hash.replace("#",""));
          const accessToken  = params.get("access_token");
          const refreshToken = params.get("refresh_token");
          if(accessToken && refreshToken){
            const {data, error:sErr} = await sb.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken
            });
            if(data?.session){
              window.history.replaceState(null,"",window.location.pathname);
              await loadUserProfile(data.session.user, sb);
              return;
            }
          }
          setAuthState("login");
        } else {
          setAuthState("login");
        }
      } catch(e){
        console.error("checkSession error:",e);
        setAuthState("login");
      }
    };
    checkSession();
  },[]);

  // Escuchar cambios de sesión (útil para magic links y tokens)
  useEffect(()=>{
    let unsub;
    const setup=async()=>{
      const sb=await getSupabase();
      if(!sb) return;
      const {data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
        if(event==="SIGNED_IN"&&session&&authState==="checking"){
          await loadUserProfile(session.user, sb);
        }
        if(event==="PASSWORD_RECOVERY"){
          setAuthState("change_password");
        }
      });
      unsub=subscription;
    };
    setup();
    return ()=>unsub?.unsubscribe?.();
  },[]);

  const loadUserProfile=async(sbUser, sb)=>{
    try {
      const {data,error}=await sb.from("usuarios_visor").select("*").eq("email",sbUser.email).single();
      if(error||!data){
        // Usuario no en tabla — sin acceso
        await sb.auth.signOut();
        setAuthError("Tu cuenta no tiene acceso al Visor PCRON. Contacta con el administrador.");
        setAuthState("login");
        return;
      }
      if(!data.activo){
        await sb.auth.signOut();
        setAuthError("Tu cuenta está desactivada. Contacta con el administrador.");
        setAuthState("login");
        return;
      }
      // Actualizar last_login
      await sb.from("usuarios_visor").update({last_login:new Date().toISOString()}).eq("email",sbUser.email);
      setAuthUser(data);
      setRole(data.rol);
      if(data.primer_login){
        setAuthState("change_password");
      } else {
        setAuthState("app");
        cargarDatos();
      }
    } catch(e){ setAuthState("login"); }
  };

  const handleLogin=async(email,password)=>{
    setAuthLoading(true); setAuthError("");
    try {
      const sb=await getSupabase();
      const {data,error}=await sb.auth.signInWithPassword({email,password});
      if(error) throw error;
      await loadUserProfile(data.user, sb);
    } catch(e){
      setAuthError(e.message==="Invalid login credentials"?"Email o contraseña incorrectos":e.message);
    }
    setAuthLoading(false);
  };

  const handleChangePassword=async(newPass)=>{
    setAuthLoading(true); setAuthError("");
    try {
      const sb=await getSupabase();
      const {error}=await sb.auth.updateUser({password:newPass});
      if(error) throw error;
      await sb.from("usuarios_visor").update({primer_login:false}).eq("email",authUser.email);
      setAuthUser(u=>({...u,primer_login:false}));
      setAuthState("app");
      cargarDatos();
    } catch(e){ setAuthError(e.message); }
    setAuthLoading(false);
  };

  const handleLogout=async()=>{
    const sb=await getSupabase();
    await sb.auth.signOut();
    setAuthUser(null); setAuthState("login"); setPacientes([]);
  };

  const cargarDatos=async()=>{
    setLoading(true); setProgreso(0);
    try {
      const data=await cargarTodosPacientes(setProgreso);
      const pacs=data.length===0?DEMO_PACIENTES:data;
      setPacientes(pacs);
      setProgreso(100);
      setTimeout(()=>setLoading(false),400);
      // Fase 2: cargar criterios JSONB en background
      if (pacs !== DEMO_PACIENTES) {
        // Marcar todos los grupos como "cargando" inmediatamente
        setLoadedGrupos(GRUPOS_CRITERIOS.map(g=>g.id));
        cargarCriteriosBackground(
          pacs,
          (pct) => { if(pct % 20 === 0) console.log(`Criterios: ${pct}%`); },
          (updates, isLast) => {
            Object.assign(allUpdates, updates);
            if (isLast) {
              setPacientes(prev => {
                const map = new Map(prev.map((p,i) => [p.id, i]));
                const next = [...prev];
                Object.values(allUpdates).forEach(p => {
                  const i = map.get(p.id);
                  if (i !== undefined) next[i] = p;
                });
                return next;
              });
              setLoadedGrupos(GRUPOS_CRITERIOS.map(g=>g.id));
            }
          }
        );      }
    } catch(e){
      setError(e.message||"Error de conexión con Supabase");
      setPacientes(DEMO_PACIENTES);
      setLoading(false);
    }
  };

  // ── CARGA INICIAL (solo si ya autenticado) ────────────────────────────────
  useEffect(()=>{
    if(authState!=="app") return;
  },[authState]);

  // ── CARGA LAZY CRITERIOS ─────────────────────────────────────────────────
  const handleLoadGrupo=useCallback(async(grupoId, ids)=>{
    if(loadedGrupos.includes(grupoId)) return;
    const grupo=GRUPOS_CRITERIOS.find(g=>g.id===grupoId);
    if(!grupo) return;
    try {
      const map=await cargarCriteriosGrupo(grupo, ids);
      if(Object.keys(map).length>0) {
        setCriteriosData(prev=>{
          const next={...prev,[grupoId]:map};
          return next;
        });
      }
      setLoadedGrupos(prev=>[...prev,grupoId]);
    } catch(e) {
      console.error("Error cargando criterios:",e);
    }
  },[loadedGrupos]);

  const canCIC=ROLES_DEF[role]?.cic||false;
  const pacientesFiltrados=useMemo(()=>applyFiltros(pacientes,filtros),[pacientes,filtros]);
  const pctTotal=pacientes.length>0?+pct(pacientesFiltrados.length,pacientes.length):0;

  const TABS=[
    {k:"VISOR",       icon:"🏠"},
    {k:"FILTROS",     icon:"🎛"},
    {k:"ESTADÍSTICAS",icon:"📊"},
    {k:"DETALLE",     icon:"📋"},
    {k:"ANÁLISIS",    icon:"📈"},
    {k:"HISTÓRICO",   icon:"📅"},
    ...(ROLES_DEF[role]?.admin?[{k:"ADMINISTRACIÓN",icon:"⚙️",admin:true}]:[]),
  ];

  // ── AUTH SCREENS ─────────────────────────────────────────────────────────
  if(authState==="checking") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#060E1E,#0F2444)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"white",fontSize:14,opacity:.7}}>Verificando sesión…</div>
    </div>
  );

  if(authState==="login") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#060E1E,#0F2444)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Sans',system-ui,sans-serif"}}>
      <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:"40px 48px",width:380,boxShadow:"0 24px 48px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:28,fontWeight:900,color:"white",letterSpacing:-1}}>VISOR PCRON</div>
          <div style={{fontSize:13,color:"#93C5FD",marginTop:4}}>Paciente Crónico · Osakidetza</div>
        </div>
        <LoginForm onLogin={handleLogin} loading={authLoading} error={authError}/>
      </div>
    </div>
  );

  if(authState==="change_password") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#060E1E,#0F2444)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Sans',system-ui,sans-serif"}}>
      <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:"40px 48px",width:380,boxShadow:"0 24px 48px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:22,fontWeight:900,color:"white"}}>Bienvenido/a</div>
          <div style={{fontSize:14,color:"#93C5FD",marginTop:4}}>{authUser?.nombre}</div>
          <div style={{fontSize:11,color:"#64748B",marginTop:8}}>Es tu primer acceso. Por favor establece una nueva contraseña.</div>
        </div>
        <ChangePasswordForm onSave={handleChangePassword} loading={authLoading} error={authError}/>
      </div>
    </div>
  );

  if(loading) return <PantallaCarga progreso={progreso} error={error} onRetry={()=>window.location.reload()}/>;

  // Perfil CONSULTA — pantalla exclusiva de búsqueda por CIC
  const rolDef = ROLES_DEF[authUser?.rol||"PROFESIONAL"]||{};
  if(rolDef.soloConsulta) return (
    <PantallaConsulta pacientes={pacientes} authUser={authUser} handleLogout={handleLogout}/>
  );

  return (
    <div style={{fontFamily:"'IBM Plex Sans',system-ui,sans-serif",background:"#F0F4F8",minHeight:"100vh"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800;900&display=swap');*{box-sizing:border-box;}input,button,select,textarea{font-family:inherit;}`}</style>

      {/* TOP BAR */}
      <div style={{background:"linear-gradient(135deg,#060E1E,#0F2444)",padding:"9px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:7,background:"linear-gradient(135deg,#3B82F6,#06B6D4)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:15}}>V</div>
          <div>
            <div style={{color:"white",fontWeight:800,fontSize:14,letterSpacing:1}}>VISOR PCRON</div>
            <div style={{color:"#64748B",fontSize:10}}>Paciente Crónico · Osakidetza · {META.version}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {pacientes.length===DEMO_PACIENTES.length&&pacientes[0]?.id===DEMO_PACIENTES[0]?.id&&(
            <div style={{background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:5,padding:"3px 10px",fontSize:10,color:"#92400E",fontWeight:700}}>
              ⚠️ MODO DEMO
            </div>
          )}


          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,fontWeight:700,color:"white"}}>{authUser?.nombre}</div>
            <div style={{fontSize:9,color:"#93C5FD",fontWeight:600}}>{authUser?.rol} · {authUser?.email}</div>
          </div>
          <button onClick={handleLogout}
            style={{padding:"5px 12px",fontSize:11,fontWeight:700,background:"rgba(220,38,38,0.15)",border:"1px solid rgba(220,38,38,0.3)",borderRadius:6,color:"#FCA5A5",cursor:"pointer"}}>
            ⏻ Salir
          </button>
        </div>
      </div>

      {/* HERO DARK */}
      <div style={{background:"linear-gradient(160deg,#0B1628 0%,#112240 55%,#0D3458 100%)",padding:"14px 24px 0"}}>

        <div style={{display:"flex",gap:12,marginBottom:12,alignItems:"stretch"}}>

          {/* BLOQUE IZQUIERDO — contador */}
          <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(59,130,246,0.4)",borderRadius:12,padding:"14px 22px",display:"flex",alignItems:"center",gap:20,flexShrink:0}}>
            <div>
              <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:2}}>PACIENTES EN VISTA</div>
              <div style={{color:"white",fontSize:52,fontWeight:900,lineHeight:1,letterSpacing:-2}}>{nFmt(pacientesFiltrados.length)}</div>
              <div style={{color:"#64748B",fontSize:11,marginTop:2}}>{nFmt(pacientesFiltrados.length)} de {nFmt(pacientes.length)}</div>
            </div>
            <div style={{width:1,alignSelf:"stretch",background:"rgba(255,255,255,0.1)"}}/>
            <div>
              <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:2}}>% DEL TOTAL BD</div>
              <div style={{color:"#38BDF8",fontSize:40,fontWeight:800,lineHeight:1}}>{pctTotal}%</div>
              <div style={{color:"#475569",fontSize:10,marginTop:2}}>{META.fechaAct}</div>
            </div>
          </div>

          {/* BLOQUE DERECHO — filtros activos + acciones */}
          <div style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 16px",display:"flex",flexDirection:"column",justifyContent:"space-between",minWidth:0}}>

            {/* Cabecera con acciones */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{color:"#93C5FD",fontSize:9,fontWeight:700,letterSpacing:1.4}}>
                🎛 FILTROS ACTIVOS {filtros.length>0&&<span style={{background:"#3B82F6",color:"white",borderRadius:10,padding:"1px 6px",marginLeft:4,fontSize:9}}>{filtros.length}</span>}
              </div>
              <div style={{display:"flex",gap:5}}>
                {/* Limpiar */}
                {filtros.length>0&&(
                  <button onClick={()=>setFiltros([])}
                    style={{padding:"4px 10px",fontSize:10,fontWeight:700,border:"1px solid rgba(220,38,38,0.4)",borderRadius:5,background:"rgba(220,38,38,0.1)",color:"#FCA5A5",cursor:"pointer"}}>
                    ✕ Limpiar
                  </button>
                )}
                {/* Guardar filtros */}
                {filtros.length>0&&(
                  <button onClick={()=>{
                    const name=prompt("Nombre para este filtro:");
                    if(name) setSavedFiltros(p=>[...p,{name,filtros:[...filtros],fecha:new Date().toLocaleDateString("es-ES")}]);
                  }}
                    style={{padding:"4px 10px",fontSize:10,fontWeight:700,border:"1px solid rgba(59,130,246,0.4)",borderRadius:5,background:"rgba(59,130,246,0.1)",color:"#93C5FD",cursor:"pointer"}}>
                    💾 Guardar
                  </button>
                )}
                {/* Ejecutar filtro guardado */}
                {savedFiltros.length>0&&(
                  <select onChange={e=>{
                    if(!e.target.value) return;
                    const sf=savedFiltros.find(s=>s.name===e.target.value);
                    if(sf){setFiltros(sf.filtros);setTab("DETALLE");}
                    e.target.value="";
                  }} style={{padding:"4px 8px",fontSize:10,border:"1px solid rgba(255,255,255,0.15)",borderRadius:5,background:"rgba(255,255,255,0.08)",color:"#CBD5E1",cursor:"pointer",maxWidth:160}}>
                    <option value="">▶ Ejecutar guardado…</option>
                    {savedFiltros.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}
                  </select>
                )}
                {/* Ir a filtros */}
                <button onClick={()=>setTab("FILTROS")}
                  style={{padding:"4px 10px",fontSize:10,fontWeight:700,border:"1px solid rgba(255,255,255,0.15)",borderRadius:5,background:"rgba(255,255,255,0.06)",color:"#94A3B8",cursor:"pointer"}}>
                  + Añadir filtro
                </button>
              </div>
            </div>

            {/* Chips de filtros activos */}
            {filtros.length>0 ? (
              <div style={{display:"flex",flexWrap:"wrap",gap:5,flex:1,alignContent:"flex-start"}}>
                {filtros.map(f=>(
                  <span key={f.id} style={{
                    display:"inline-flex",alignItems:"center",gap:4,
                    fontSize:10,padding:"3px 8px",borderRadius:5,fontWeight:600,
                    background:{Y:"rgba(29,78,216,0.2)",O:"rgba(217,119,6,0.2)",NO:"rgba(220,38,38,0.2)"}[f.logica]||"rgba(255,255,255,0.1)",
                    color:{Y:"#93C5FD",O:"#FCD34D",NO:"#FCA5A5"}[f.logica]||"#CBD5E1",
                    border:`1px solid ${{Y:"rgba(59,130,246,0.3)",O:"rgba(217,119,6,0.3)",NO:"rgba(220,38,38,0.3)"}[f.logica]||"rgba(255,255,255,0.1)"}`}}>
                    <span style={{fontWeight:900,fontSize:9,opacity:.8}}>{f.logica}</span>
                    {f.label}
                    <button onClick={()=>setFiltros(p=>p.filter(x=>x.id!==f.id))}
                      style={{background:"none",border:"none",color:"inherit",cursor:"pointer",padding:"0 0 0 2px",fontSize:12,lineHeight:1,opacity:.7}}>×</button>
                  </span>
                ))}
              </div>
            ) : (
              <div style={{flex:1,display:"flex",alignItems:"center"}}>
                <div style={{color:"#475569",fontSize:11,fontStyle:"italic"}}>Sin filtros — mostrando todos los pacientes</div>
              </div>
            )}
          </div>
        </div>

        {/* TABS */}
        <div style={{display:"flex",gap:2}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{
              padding:"10px 18px",border:"none",cursor:"pointer",fontSize:12,
              fontWeight:tab===t.k?700:500,borderRadius:"8px 8px 0 0",
              borderBottom:`2px solid ${tab===t.k?(t.admin?"#DC2626":"#3B82F6"):"transparent"}`,
              background:tab===t.k?"#F0F4F8":"transparent",
              color:tab===t.k?(t.admin?"#991B1B":"#1E3A5F"):(t.admin?"#FCA5A5":"#94A3B8"),
              display:"flex",alignItems:"center",gap:5,transition:"all .15s",
            }}>
              {t.icon} {t.k}
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"16px 24px 32px"}}>
        {tab==="VISOR"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>


            {/* CABECERA */}
            <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",padding:"22px 28px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:22,fontWeight:900,color:"#0F2444",letterSpacing:-.5}}>VISOR PCRON</div>
                  <div style={{fontSize:14,color:"#3B82F6",fontWeight:600,marginTop:2}}>Visor de Paciente Crónico · Osakidetza</div>
                  <div style={{fontSize:12,color:"#64748B",marginTop:6}}>
                    Fuente: <strong>{META.fuente}</strong> · Snapshot: <strong>{META.fechaAct}</strong> · {META.version}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,textAlign:"center"}}>
                  {[
                    [nFmt(pacientes.length),"pacientes activos","#3B82F6"],
                    ["206","variables totales","#7C3AED"],
                    ["8","grupos población","#059669"],
                    ["4","dimensiones auditoría","#D97706"],
                  ].map(([v,l,c])=>(
                    <div key={l} style={{padding:"8px 14px",background:c+"08",border:`1px solid ${c}20`,borderRadius:8}}>
                      <div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div>
                      <div style={{fontSize:9,color:c,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* AVISO RGPD */}
            <div style={{padding:"12px 16px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:10,fontSize:11,color:"#92400E",lineHeight:1.7}}>
              🔒 <strong>Confidencialidad CIC (Código de Identificación de Cliente):</strong> Dato personal sujeto a RGPD / LOPD-GDD.
              {" "}ADM/DIR/MAN: CIC visible en pantalla y en exportaciones.
              {" "}CEN: solo pacientes de sus centros asignados.
              {" "}PROFESIONAL: solo sus cupos. En exportaciones fuera del ámbito aparece como «RESTRINGIDO».
            </div>

            {/* GUÍA DE SECCIONES */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                {icon:"🎛",tab:"FILTROS",    desc:"3 columnas: Datos Básicos · Características · Criterios clínicos (carga bajo demanda). Lógica Y/O/NO combinable. Guarda filtros con nombre.",color:"#3B82F6"},
                {icon:"📊",tab:"ESTADÍSTICAS",desc:"Distribución por sexo, edad, OSI, centros, GIP, grupos de población y perfiles. Adecuación TOP y Auditoría vs media OSI y P75.",color:"#7C3AED"},
                {icon:"📋",tab:"DETALLE",    desc:"Tabla configurable. Modal de paciente con 4 dimensiones de auditoría y criterios por perfil. Exportación Excel y PDF funcional.",color:"#059669"},
                {icon:"📈",tab:"ANÁLISIS",   desc:"Modo Simple (un grupo vs el resto) y Modo Complejo (Grupo A vs Grupo B con filtros independientes). Delta de diferencia y análisis guardables.",color:"#D97706"},
                {icon:"⚙️",tab:"ADMIN",      desc:"Solo rol ADM: Gestión de usuarios (CRUD+roles), Recarga Drive→Supabase (ETL), Documentos del proyecto e Informes automáticos.",color:"#DC2626"},
              ].map(s=>(
                <div key={s.tab} style={{display:"flex",gap:12,padding:"12px 16px",background:"white",border:`1px solid ${s.color}20`,borderRadius:9}}>
                  <div style={{fontSize:24,flexShrink:0}}>{s.icon}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:800,color:s.color,marginBottom:3}}>{s.tab}</div>
                    <div style={{fontSize:11,color:"#64748B",lineHeight:1.5}}>{s.desc}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* GRUPOS DE POBLACIÓN */}
            <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",padding:"16px 20px"}}>
              <div style={{fontSize:13,fontWeight:800,color:"#0F2444",marginBottom:12}}>👥 Grupos de Población — Jerarquía exclusiva (1 grupo por paciente)</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {[
                  ["01 GERONTOLÓGICO","Marca OGP · Alerta Institucionalizado · Año ingreso · Centro gerontológico","#7C3AED"],
                  ["02 PALIATIVO","Episodio PAL · Alerta PAL · PIA PAL · NECPAL · FRAG VIG > 0,48","#DC2626"],
                  ["03 DEPENDIENTE DOMICILIO","Barthel < 60 · Barthel basal < 80 · Episodio Crónico Dom. · Demencia","#D97706"],
                  ["04 HF HOSPITALARIO","Reingresos · N MI > 2 · HaD > 2 · Ingreso MI > 10 días · URG > 3","#0891B2"],
                  ["05 HF AP","Frec. AP Médica > 25 · Frec. AP Enfermería > 25","#0284C7"],
                  ["06 MAYOR COMORBILIDAD","Episodio IC/EPOC/I.Renal/Hepatopatía/Anemia/Pluripatológico/Úlceras","#059669"],
                  ["07 MAYOR SANO","Edad > 85 sin criterios de grupos superiores","#65A30D"],
                  ["08/09 DEMOG./SANO","Gestión ENF/Caso · Marca OAS · Episodio PPP · Alerta Frágil/Pluri · Polimed. ≥ 7","#6B7280"],
                ].map(([g,c,col])=>(
                  <div key={g} style={{display:"flex",gap:8,padding:"8px 10px",border:`1px solid ${col}20`,borderRadius:7,background:col+"05"}}>
                    <div style={{width:10,height:10,borderRadius:2,background:col,flexShrink:0,marginTop:2}}/>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:col}}>{g}</div>
                      <div style={{fontSize:10,color:"#64748B",lineHeight:1.4}}>{c}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* CARGA DE DATOS */}
            <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",padding:"16px 20px"}}>
              <div style={{fontSize:13,fontWeight:800,color:"#0F2444",marginBottom:10}}>⚡ Estrategia de Carga de Datos</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{padding:"12px 14px",background:"#D1FAE5",border:"1px solid #6EE7B7",borderRadius:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#059669",marginBottom:5}}>✅ CARGA INICIAL — Siempre disponible</div>
                  {["Básicos: id, CIC, sexo, edad, OSI, centro, cupo","Equipo: Médico Ref. PCRON · Bloque Ref. (04-13-03-02)","GIP AP (04-12-05-02) · Hosp. (04-13-09-01) · OSAREAN (04-15-09-01)","Características calculadas: grupos · 11 perfiles · 3 índices · auditoría"].map(t=>(
                    <div key={t} style={{fontSize:10,color:"#065F46",marginBottom:2}}>• {t}</div>
                  ))}
                </div>
                <div style={{padding:"12px 14px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#D97706",marginBottom:5}}>⚡ CARGA BAJO DEMANDA — Solo al activar</div>
                  {["Criterios Barthel, Barthel basal, demencia, caídas","Reingresos hospitalarios, urgencias, HaD, IC, EPOC","Frecuentación AP médica y enfermería","NECPAL, Frágil-Vig, formularios PIA/PPP/PAM","Fármacos activos (polimedicación ≥ 7)"].map(t=>(
                    <div key={t} style={{fontSize:10,color:"#92400E",marginBottom:2}}>• {t}</div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
        {tab==="FILTROS"&&(
          <TabFiltros filtros={filtros} setFiltros={setFiltros} savedFiltros={savedFiltros} setSavedFiltros={setSavedFiltros}
            pacientes={pacientes} loadedGrupos={loadedGrupos} onLoadGrupo={handleLoadGrupo} criteriosData={criteriosData} setTab={setTab}/>
        )}
        {tab==="ESTADÍSTICAS"&&<TabEstadisticas pacientes={pacientesFiltrados}/>}
        {tab==="DETALLE"&&(
          <TabDetalle pacientes={pacientesFiltrados} setPacientes={setPacientes} canCIC={canCIC} criteriosData={criteriosData}
            loadedGrupos={loadedGrupos} onLoadGrupo={handleLoadGrupo}/>
        )}
        {tab==="ANÁLISIS"&&<TabAnalisis pacientes={pacientesFiltrados} savedAnalisis={savedAnalisis} setSavedAnalisis={setSavedAnalisis}/>}
        {tab==="HISTÓRICO"&&<TabHistorico/>}
        {tab==="ADMINISTRACIÓN"&&<TabAdministracion pacientes={pacientes}/>}
      </div>
    </div>
  );
}

// ── MONTAR APP ────────────────────────────────────────────────────────────
const _root = document.getElementById('root');
ReactDOM.createRoot(_root).render(<App/>);
document.getElementById('boot').style.display='none';
_root.style.display='block';
</script>
</body>
</html>
