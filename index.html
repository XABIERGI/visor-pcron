// ❿  TAB FILTROS v6
// ════════════════════════════════════════════════════════════════════════════
function TabFiltros({filtros,setFiltros,savedFiltros,setSavedFiltros,pacientes,loadedGrupos,onLoadGrupo,criteriosData,setTab}) {
  const [saveName,setSaveName]   = useState("");
  const [showSave,setShowSave]   = useState(false);
  const [busqTexto,setBusqTexto] = useState("");
  const [listaPacs,setListaPacs] = useState("");
  const [showLista,setShowLista] = useState(false);
  const [listaResult,setListaResult] = useState(null);
  const [centroTxt,setCentroTxt]   = useState("");
  const [expanded,setExpanded]     = useState({osi:true,centro:true,pob:true,perfiles:true});

  const toggle = k => setExpanded(e=>({...e,[k]:!e[k]}));
  const nFiltrado = applyFiltros(pacientes,filtros).length;
  const add = f => setFiltros(p=>[...p,{...f,id:Date.now()+Math.random(),logica:"Y"}]);
  const remove = id => setFiltros(p=>p.filter(x=>x.id!==id));
  const updateLogica = (id,l) => setFiltros(p=>p.map(f=>f.id===id?{...f,logica:l}:f));

  // CheckGroup local — accede a filtros/add/setFiltros por closure
  const CheckGroup = ({campo, opciones, colorFn, labelFn}) => (
    <div>
      {(opciones||[]).map(op=>{
        const val = typeof op==="object"?op.value:op;
        const lbl = labelFn?labelFn(op):(typeof op==="object"?op.label:String(op));
        const on  = filtros.some(f=>f.campo===campo&&f.valor===val);
        const col = colorFn?colorFn(op):null;
        return (
          <label key={val} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
            padding:"3px 6px",borderRadius:5,marginBottom:1,
            background:on?"#EFF6FF":"transparent",
            border:on?"1px solid #BFDBFE":"1px solid transparent"}}>
            <input type="checkbox" checked={on}
              onChange={e=>{
                if(e.target.checked) add({campo,label:`${campo} = ${lbl}`,tipo:"select",valor:val});
                else setFiltros(p=>p.filter(f=>!(f.campo===campo&&f.valor===val)));
              }} style={{cursor:"pointer",accentColor:"#3B82F6"}}/>
            <span style={{fontSize:11,color:on?"#1D4ED8":col||"#374151",fontWeight:on?700:400}}>{lbl}</span>
          </label>
        );
      })}
    </div>
  );

  // ── FILTROS ENCADENADOS: opciones disponibles según contexto actual ──
  // Para cada campo, calculamos las opciones que tienen pacientes en el
  // resultado de aplicar TODOS los filtros excepto los del propio campo
  const pacsSinCampo = useCallback((campo) =>
    applyFiltros(pacientes, filtros.filter(f=>f.campo!==campo))
  ,[pacientes,filtros]);

  const osiDisp     = useMemo(()=>[...new Set(pacsSinCampo("osi").map(p=>p.osi).filter(Boolean))].sort(),[pacsSinCampo]);
  const centrosDisp = useMemo(()=>{
    const base = pacsSinCampo("centro");
    const todos = [...new Set(base.map(p=>p.centro).filter(Boolean))].sort();
    return todos;
  },[pacsSinCampo]);
  const centrosFiltrados = centroTxt ? centrosDisp.filter(c=>c.toLowerCase().includes(centroTxt.toLowerCase())) : centrosDisp;
  const cuposDisp   = useMemo(()=>[...new Set(pacsSinCampo("cupo").map(p=>p.cupo).filter(Boolean))].sort(),[pacsSinCampo]);
  const medicosDisp = useMemo(()=>[...new Set(pacsSinCampo("medico").map(p=>p.medico).filter(Boolean))].sort(),[pacsSinCampo]);
  const bloquesDisp   = useMemo(()=>[...new Set(pacsSinCampo("bloque").map(p=>p.bloque).filter(Boolean))].sort(),[pacsSinCampo]);
  const centroGerDisp = useMemo(()=>[...new Set(pacsSinCampo("centro_ger").map(p=>p.centro_ger).filter(Boolean))].sort(),[pacsSinCampo]);

  // GIP: solo mostrar si hay pacientes con ese programa en contexto actual
  const gipCtx = useMemo(()=>({
    ap:     pacsSinCampo("gip_ap").some(p=>p.gip_ap),
    hosp:   pacsSinCampo("gip_hosp").some(p=>p.gip_hosp),
    osarean:pacsSinCampo("gip_osarean").some(p=>p.gip_osarean),
  }),[pacsSinCampo]);

  // Pendientes únicos de auditoría
  const pendientesDisp = useMemo(()=>{
    const set = new Set();
    pacientes.forEach(p=>(p.audit_pend||[]).forEach(x=>set.add(x)));
    return [...set].sort();
  },[pacientes]);

  // ── ANÁLISIS DE LISTA DE PACIENTES (Excel) ──
  const analizarExcel = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1});
        // Detectar columna ID o CIC (primera fila = cabecera)
        const header = (rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
        const colID  = header.findIndex(h=>h.includes("id") || h.includes("id_pac"));
        const colCIC = header.findIndex(h=>h.includes("cic"));
        const col    = colID>=0 ? colID : colCIC>=0 ? colCIC : 0;
        const ids    = rows.slice(1).map(r=>String(r[col]||"").trim()).filter(Boolean);
        const enBD   = ids.filter(id=>pacientes.some(p=>String(p.id)===id||String(p.cic)===id));
        const fuera  = ids.filter(id=>!pacientes.some(p=>String(p.id)===id||String(p.cic)===id));
        setListaResult({total:ids.length, enBD, fuera, col:header[col]||"col 0"});
        // Añadir filtro con los encontrados
        if (enBD.length>0) add({campo:"id",label:`Lista Excel (${enBD.length} pacientes)`,tipo:"lista",valor:enBD});
      } catch(err) {
        setListaResult({error:"Error leyendo Excel: "+err.message});
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const exportarNoIncluidos = () => {
    if (!listaResult?.fuera?.length) return;
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([["ID_NO_INCLUIDO"],...listaResult.fuera.map(x=>[x])]);
    XLSX.utils.book_append_sheet(wb, ws, "No incluidos");
    XLSX.writeFile(wb, "pacientes_no_incluidos_PCRON.xlsx");
  };

  // ── CHIPS DE FILTROS ACTIVOS (barra superior) ──
  const BarraFiltros = ()=>(
    <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 14px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:filtros.length>0?8:0}}>
        <span style={{fontSize:10,fontWeight:700,color:"#1E293B"}}>
          🎛 FILTROS ACTIVOS
          {filtros.length>0&&<span style={{marginLeft:5,background:"#3B82F6",color:"white",borderRadius:10,padding:"1px 6px",fontSize:9}}>{filtros.length}</span>}
        </span>
        <span style={{fontSize:11,color:"#3B82F6",fontWeight:700,marginLeft:4}}>→ {nFmt(nFiltrado)} pacientes</span>
        <div style={{marginLeft:"auto",display:"flex",gap:5}}>
          {filtros.length>0&&<button onClick={()=>setFiltros([])} style={{padding:"3px 10px",fontSize:10,fontWeight:700,background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:5,color:"#DC2626",cursor:"pointer"}}>✕ Limpiar todo</button>}
          {filtros.length>0&&<button onClick={()=>setShowSave(v=>!v)} style={{padding:"3px 10px",fontSize:10,fontWeight:700,background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:5,color:"#1D4ED8",cursor:"pointer"}}>💾 Guardar</button>}
          {savedFiltros.length>0&&(
            <select onChange={e=>{if(!e.target.value)return;const sf=savedFiltros.find(s=>s.name===e.target.value);if(sf)setFiltros(sf.filtros);e.target.value="";}}
              style={{fontSize:10,padding:"3px 8px",border:"1px solid #E2E8F0",borderRadius:5,background:"white",color:"#475569",cursor:"pointer"}}>
              <option value="">▶ Ejecutar guardado…</option>
              {savedFiltros.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}
            </select>
          )}
          {filtros.length>0&&<button onClick={()=>setTab("DETALLE")} style={{padding:"3px 10px",fontSize:10,fontWeight:700,background:"#1D4ED8",border:"none",borderRadius:5,color:"white",cursor:"pointer"}}>▶ Ver resultado</button>}
        </div>
      </div>
      {showSave&&(
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <input value={saveName} onChange={e=>setSaveName(e.target.value)} placeholder="Nombre del filtro guardado…"
            style={{flex:1,padding:"5px 9px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11,fontFamily:"inherit"}}/>
          <button onClick={()=>{if(saveName){setSavedFiltros(p=>[...p,{name:saveName,filtros:[...filtros],fecha:new Date().toLocaleDateString("es-ES")}]);setSaveName("");setShowSave(false);}}}
            style={{padding:"5px 12px",background:"#059669",border:"none",borderRadius:5,color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}}>Guardar</button>
        </div>
      )}
      {filtros.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {filtros.map(f=>(
            <span key={f.id} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,padding:"3px 8px",borderRadius:5,fontWeight:600,
              background:{Y:"#EFF6FF",O:"#FEF3C7",NO:"#FEF2F2"}[f.logica]||"#F8FAFC",
              border:`1px solid ${{Y:"#BFDBFE",O:"#FCD34D",NO:"#FCA5A5"}[f.logica]||"#E2E8F0"}`,
              color:{Y:"#1D4ED8",O:"#92400E",NO:"#991B1B"}[f.logica]||"#475569"}}>
              <select value={f.logica} onChange={e=>updateLogica(f.id,e.target.value)}
                style={{fontSize:10,fontWeight:800,border:"1px solid rgba(255,255,255,0.3)",
                  background:"rgba(0,0,0,0.2)",color:"inherit",cursor:"pointer",
                  padding:"1px 4px",borderRadius:3,marginRight:4,minWidth:32}}>
                {["Y","O","NO"].map(l=><option key={l} value={l} style={{background:"#1E3A5F",color:"white"}}>{l}</option>)}
              </select>
              {f.label}
              <button onClick={()=>remove(f.id)} style={{background:"none",border:"none",color:"inherit",cursor:"pointer",padding:"0 0 0 4px",fontSize:14,lineHeight:1,opacity:.7}}>×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );

  // ── BARRA BÚSQUEDA TEXTO + LISTA PACIENTES ──
  const BarraBusqueda = ()=>(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
      {/* Búsqueda texto libre */}
      <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 14px"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:6}}>🔍 BÚSQUEDA RÁPIDA — ID · CIC · Cupo · Centro</div>
        <div style={{position:"relative"}}>
          <div style={{display:"flex",gap:4}}>
            <input value={busqTexto} onChange={e=>setBusqTexto(e.target.value)}
              placeholder="ID, CIC, cupo o centro…"
              style={{flex:1,padding:"6px 10px",border:"1px solid #E2E8F0",borderRadius:6,fontSize:11,fontFamily:"inherit"}}/>
            <button onClick={()=>{
                const v=busqTexto.trim();
                if(v.length<2) return;
                const campos=["id","cic","cupo","centro"];
                const campo=campos.find(c=>pacientes.some(p=>String(p[c]||"").toLowerCase().includes(v.toLowerCase())))||"id";
                add({campo,label:`Texto: "${v}"`,tipo:"texto",valor:v});
                setBusqTexto("");
              }}
              style={{padding:"6px 12px",background:"#1D4ED8",border:"none",borderRadius:6,color:"white",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              🔍 Buscar
            </button>
          </div>
        </div>
        <div style={{fontSize:9,color:"#94A3B8",marginTop:4}}>Se añade como filtro automáticamente al escribir</div>
      </div>

      {/* Upload lista pacientes */}
      <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 14px"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:6}}>📂 LISTA DE PACIENTES — Subir Excel (col ID o CIC)</div>
        <input type="file" accept=".xlsx,.xls"
          accept=".xlsx,.xls" onChange={e=>analizarExcel(e.target.files[0])}
          style={{fontSize:10,color:"#475569",width:"100%",marginBottom:6}}/>
        {listaResult&&!listaResult.error&&(
          <div style={{fontSize:10,lineHeight:1.7}}>
            <span style={{color:"#059669",fontWeight:700}}>✓ {listaResult.enBD.length} encontrados</span>
            {" · "}
            <span style={{color:"#DC2626",fontWeight:700}}>✗ {listaResult.fuera.length} no en VISOR PCRON</span>
            {" · "}
            <span style={{color:"#94A3B8"}}>Total: {listaResult.total} · Columna: {listaResult.col}</span>
            {listaResult.fuera.length>0&&(
              <button onClick={exportarNoIncluidos}
                style={{marginLeft:8,padding:"2px 8px",fontSize:9,background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:4,cursor:"pointer",color:"#92400E",fontWeight:700}}>
                ⬇ Excel no incluidos
              </button>
            )}
          </div>
        )}
        {listaResult?.error&&<div style={{color:"#DC2626",fontSize:10}}>{listaResult.error}</div>}
      </div>
    </div>
  );

  const Seccion=({k,label,badge,badgeColor,children,defaultOpen})=>{
    if(!(k in expanded)&&defaultOpen) expanded[k]=true;
    return (
      <div style={{border:"1px solid #E2E8F0",borderRadius:8,overflow:"hidden",marginBottom:6}}>
        <div onClick={()=>toggle(k)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 11px",background:"#F8FAFC",cursor:"pointer",userSelect:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,fontWeight:700,color:"#1E293B"}}>{label}</span>
            {badge&&<span style={{fontSize:8,background:badgeColor||"#DBEAFE",color:badgeColor?"white":"#1D4ED8",padding:"1px 5px",borderRadius:3,fontWeight:700}}>{badge}</span>}
          </div>
          <span style={{fontSize:9,color:"#94A3B8"}}>{expanded[k]?"▲":"▼"}</span>
        </div>
        {expanded[k]&&<div style={{padding:"10px 11px"}}>{children}</div>}
      </div>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      <BarraFiltros/>
      <BarraBusqueda/>

      {/* 3 COLUMNAS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>

        {/* ── COLUMNA 1: DATOS BÁSICOS ── */}
        <div>
          <div style={{fontSize:9,fontWeight:800,color:"#94A3B8",letterSpacing:1.2,textTransform:"uppercase",marginBottom:8,paddingBottom:4,borderBottom:"2px solid #E2E8F0"}}>
            📋 Datos Básicos
          </div>

          {/* SEXO */}
          <Seccion k="sexo" label="Sexo">
            <div style={{display:"flex",gap:6}}>
              {[["H","♂ Hombre","#1D4ED8","#EFF6FF"],["M","♀ Mujer","#BE185D","#FDF2F8"]].map(([v,l,c,bg])=>{
                const on=filtros.some(f=>f.campo==="sexo"&&f.valor===v);
                return <button key={v} onClick={()=>on?setFiltros(p=>p.filter(f=>!(f.campo==="sexo"&&f.valor===v))):add({campo:"sexo",label:`Sexo = ${l}`,tipo:"select",valor:v})}
                  style={{flex:1,padding:"6px",fontSize:11,border:`2px solid ${on?c:"#E2E8F0"}`,borderRadius:6,background:on?bg:"white",cursor:"pointer",color:on?c:"#94A3B8",fontWeight:on?700:400}}>
                  {l}
                </button>;
              })}
            </div>
          </Seccion>

          {/* EDAD */}
          <Seccion k="edad" label="Edad">
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {[["< 65",0,64],["65–74",65,74],["75–84",75,84],["85–94",85,94],["≥ 95",95,150]].map(([l,mn,mx])=>{
                const on=filtros.some(f=>f.campo==="edad"&&f.min===mn);
                return <button key={l} onClick={()=>on?setFiltros(p=>p.filter(f=>!(f.campo==="edad"&&f.min===mn))):add({campo:"edad",label:`Edad ${l}`,tipo:"range",min:mn,max:mx})}
                  style={{padding:"3px 9px",fontSize:10,border:`1px solid ${on?"#3B82F6":"#E2E8F0"}`,borderRadius:5,background:on?"#EFF6FF":"white",color:on?"#1D4ED8":"#475569",cursor:"pointer",fontWeight:on?700:400}}>
                  {l}
                </button>;
              })}
            </div>
          </Seccion>

          {/* OSI */}
          <Seccion k="osi" label="OSI" defaultOpen>
            {osiDisp.map(o=>{
              const col=o==="01 OSID"?"#1D4ED8":o==="02 OSIT"?"#059669":"#64748B";
              const on=filtros.some(f=>f.campo==="osi"&&f.valor===o);
              return (
                <label key={o} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"3px 6px",borderRadius:5,
                  background:on?"#EFF6FF":"transparent",border:on?"1px solid #BFDBFE":"1px solid transparent"}}>
                  <input type="checkbox" checked={on}
                    onChange={e=>{
                      if(e.target.checked) add({campo:"osi",label:`OSI = ${o}`,tipo:"select",valor:o});
                      else setFiltros(p=>p.filter(f=>!(f.campo==="osi"&&f.valor===o)));
                    }} style={{cursor:"pointer",accentColor:"#3B82F6"}}/>
                  <span style={{fontSize:11,color:on?"#1D4ED8":col,fontWeight:on?700:400}}>{o}</span>
                </label>
              );
            })}
          </Seccion>

                    {/* CENTROS */}
          <Seccion k="centro" label="Centro de Salud" defaultOpen>
            <input value={centroTxt} onChange={e=>setCentroTxt(e.target.value)}
              placeholder="Buscar centro…"
              style={{width:"100%",padding:"5px 8px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:10,fontFamily:"inherit",marginBottom:6,boxSizing:"border-box"}}/>
            <div style={{maxHeight:160,overflowY:"auto"}}>
              <CheckGroup campo="centro" opciones={centrosFiltrados}/>
            </div>
            {centrosFiltrados.length===0&&<div style={{fontSize:10,color:"#94A3B8",fontStyle:"italic"}}>Sin centros disponibles</div>}
          </Seccion>

          {/* CUPOS */}
          <Seccion k="cupo" label="Código Cupo">
            <div style={{maxHeight:140,overflowY:"auto"}}>
              <CheckGroup campo="cupo" opciones={cuposDisp.slice(0,50)}/>
            </div>
            {cuposDisp.length>50&&<div style={{fontSize:9,color:"#94A3B8",marginTop:3}}>…y {cuposDisp.length-50} más. Filtra por centro para acotar.</div>}
          </Seccion>

          {/* MÉDICO REFERENCIA — pendiente de tabla en Supabase */}
          <Seccion k="medico" label="Médico Referencia PCRON">
            <div style={{padding:"8px",background:"#FEF9C3",borderRadius:6,fontSize:10,color:"#92400E"}}>
              ⚠️ Pendiente de carga — tabla de médicos no disponible aún en PACIENTES_VISTA
            </div>
          </Seccion>

          {/* BLOQUE CCEE */}
          <Seccion k="bloque" label="Bloque CCEE Referencia">
            <CheckGroup campo="bloque" opciones={bloquesDisp.length>0?bloquesDisp:BLOQUES_PCRON}/>
          </Seccion>


          {/* GIP */}
          <Seccion k="gip" label="Programas GIP">
            {[["gip_ap","GIP AP"],["gip_hosp","GIP PCRON Hosp."],["gip_osarean","GIP OSAREAN"]].map(([campo,label])=>(
              <div key={campo} style={{display:"flex",gap:4,alignItems:"center",marginBottom:5}}>
                <span style={{fontSize:11,flex:1,color:"#475569"}}>{label}</span>
                {[["Sí",true,"#059669"],["No",false,"#DC2626"]].map(([l,v,c])=>{
                  const on=filtros.some(f=>f.campo===campo&&f.valor===v);
                  return <button key={l} onClick={()=>on?setFiltros(p=>p.filter(f=>!(f.campo===campo&&f.valor===v))):add({campo,label:`${label} = ${l}`,tipo:"bool",valor:v})}
                    style={{padding:"2px 8px",fontSize:10,border:`1px solid ${on?c:"#E2E8F0"}`,borderRadius:4,background:on?c+"15":"white",color:on?c:"#94A3B8",cursor:"pointer",fontWeight:on?700:400}}>
                    {l}
                  </button>;
                })}
              </div>
            ))}
          </Seccion>

          {/* CENTRO GERONTOLÓGICO */}
          <Seccion k="centro_ger" label="Centro Gerontológico">
            <div style={{maxHeight:140,overflowY:"auto"}}>
              {centroGerDisp.map(cg=>{
                const on=filtros.some(f=>f.campo==="centro_ger"&&f.valor===cg);
                return (
                  <label key={cg} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                    padding:"3px 6px",borderRadius:5,marginBottom:1,
                    background:on?"#EFF6FF":"transparent",border:on?"1px solid #BFDBFE":"1px solid transparent"}}>
                    <input type="checkbox" checked={on}
                      onChange={e=>{
                        if(e.target.checked) add({campo:"centro_ger",label:`Centro Ger = ${cg}`,tipo:"select",valor:cg});
                        else setFiltros(p=>p.filter(f=>!(f.campo==="centro_ger"&&f.valor===cg)));
                      }} style={{cursor:"pointer",accentColor:"#3B82F6"}}/>
                    <span style={{fontSize:11,color:on?"#1D4ED8":"#374151",fontWeight:on?700:400}}>{cg}</span>
                  </label>
                );
              })}
            </div>
          </Seccion>

        </div>

        {/* ── COLUMNA 2: CARACTERÍSTICAS ── */}
        <div>
          <div style={{fontSize:9,fontWeight:800,color:"#94A3B8",letterSpacing:1.2,textTransform:"uppercase",marginBottom:8,paddingBottom:4,borderBottom:"2px solid #E2E8F0"}}>
            🏷️ Características · Calidad
          </div>

          {/* POBLACIÓN */}
          <Seccion k="pob" label="Grupo de Población" defaultOpen>
            <CheckGroup campo="pob" opciones={Object.keys(POB_DEF)} colorFn={o=>POB_DEF[o]?.bg||"#475569"}/>
          </Seccion>

          {/* CARACTERÍSTICAS / PERFILES */}
          <Seccion k="perfiles" label="Características / Perfiles" defaultOpen>
            {CARACTS_DEF.map(c=>{
              const on=filtros.some(f=>f.campo===c.k&&f.valor===true);
              return (
                <label key={c.k} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"3px 6px",borderRadius:5,marginBottom:2,
                  background:on?c.c+"10":"transparent",border:on?`1px solid ${c.c}30`:"1px solid transparent"}}>
                  <input type="checkbox" checked={on}
                    onChange={e=>{
                      if(e.target.checked) add({campo:c.k,label:`Perfil: ${c.l}`,tipo:"bool",valor:true});
                      else setFiltros(p=>p.filter(f=>!(f.campo===c.k&&f.valor===true)));
                    }} style={{cursor:"pointer",accentColor:c.c}}/>
                  <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:c.c,flexShrink:0}}/>
                  <span style={{fontSize:11,color:on?c.c:"#475569",fontWeight:on?700:400}}>{c.l}</span>
                </label>
              );
            })}
          </Seccion>

          {/* ÍNDICES */}
          <Seccion k="indices" label="Índices de Complejidad">
            {[
              ["compl","Complejidad", 20,OSI_STATS.top_media/5,OSI_STATS.top_p75/5],
              ["co",   "Comorbilidad",10,3,6],
              ["fr",   "Frecuentación",10,3,6],
            ].map(([campo,lbl,max,media,p75])=>(
              <div key={campo} style={{marginBottom:8}}>
                <div style={{fontSize:10,fontWeight:700,color:"#475569",marginBottom:3}}>{lbl}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {[
                    [`> P75 (>${p75.toFixed(0)})`, {min:p75,max:999},"#059669"],
                    [`> Media (>${media.toFixed(0)})`,{min:media,max:999},"#D97706"],
                    [`< Media (<${media.toFixed(0)})`,{min:0,max:media},"#3B82F6"],
                  ].map(([l,rng,c])=>{
                    const on=filtros.some(f=>f.campo===campo&&f.min===rng.min);
                    return <button key={l} onClick={()=>on?setFiltros(p=>p.filter(f=>!(f.campo===campo&&f.min===rng.min))):add({campo,label:`${lbl} ${l}`,tipo:"range",...rng})}
                      style={{padding:"2px 8px",fontSize:9,border:`1px solid ${on?c:"#E2E8F0"}`,borderRadius:4,background:on?c+"15":"white",color:on?c:"#64748B",cursor:"pointer",fontWeight:on?700:400}}>
                      {l}
                    </button>;
                  })}
                </div>
              </div>
            ))}
          </Seccion>

          {/* AUDITORÍA */}
          <Seccion k="audit" label="Auditoría de Calidad">
            <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:5}}>Por color global</div>
            <div style={{display:"flex",gap:5,marginBottom:10}}>
              {[["VERDE","#059669","#D1FAE5"],["AMARILLO","#D97706","#FEF3C7"],["NARANJA","#EA580C","#FFF7ED"],["ROJO","#DC2626","#FEE2E2"]].map(([col,c,bg])=>{
                const on=filtros.some(f=>f.campo==="audit_color"&&f.valor===col);
                return <button key={col} onClick={()=>on?setFiltros(p=>p.filter(f=>!(f.campo==="audit_color"&&f.valor===col))):add({campo:"audit_color",label:`Auditoría ${col}`,tipo:"select",valor:col})}
                  style={{flex:1,padding:"5px 4px",fontSize:9,fontWeight:700,border:`2px solid ${on?c:"#E2E8F0"}`,borderRadius:5,background:on?bg:"white",color:on?c:"#94A3B8",cursor:"pointer"}}>
                  {col}
                </button>;
              })}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:5}}>Con pendientes</div>
            {[["Con pendientes","conPend",true],["Sin pendientes","conPend",false]].map(([l,campo,v])=>{
              const on=filtros.some(f=>f.campo===campo&&f.valor===v);
              return <button key={l} onClick={()=>on?setFiltros(p=>p.filter(f=>!(f.campo===campo&&f.valor===v))):add({campo,label:l,tipo:"bool_pend",valor:v})}
                style={{display:"block",width:"100%",marginBottom:4,padding:"4px 9px",fontSize:10,border:`1px solid ${on?"#D97706":"#E2E8F0"}`,borderRadius:5,background:on?"#FEF3C7":"white",color:on?"#92400E":"#475569",cursor:"pointer",fontWeight:on?700:400,textAlign:"left"}}>
                {on?"✓ ":""}{l}
              </button>;
            })}
          </Seccion>

          {/* PENDIENTES ESPECÍFICOS */}
          <Seccion k="pend" label="Elementos Pendientes (auditoría)">
            {pendientesDisp.length===0
              ? <div style={{fontSize:10,color:"#94A3B8",fontStyle:"italic"}}>No hay pendientes en la población cargada</div>
              : <div style={{maxHeight:160,overflowY:"auto"}}>
                  {pendientesDisp.map(p=>{
                    const on=filtros.some(f=>f.campo==="audit_pend_item"&&f.valor===p);
                    return (
                      <label key={p} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"3px 5px",borderRadius:4,marginBottom:2,
                        background:on?"#FEF3C7":"transparent",border:on?"1px solid #FCD34D":"1px solid transparent"}}>
                        <input type="checkbox" checked={on}
                          onChange={e=>{
                            if(e.target.checked) add({campo:"audit_pend_item",label:`Pendiente: ${p}`,tipo:"pend_item",valor:p});
                            else setFiltros(x=>x.filter(f=>!(f.campo==="audit_pend_item"&&f.valor===p)));
                          }} style={{cursor:"pointer",accentColor:"#D97706"}}/>
                        <span style={{fontSize:10,color:on?"#92400E":"#475569",fontWeight:on?700:400}}>{p}</span>
                      </label>
                    );
                  })}
                </div>
            }
          </Seccion>
        </div>

        {/* ── COLUMNA 3: CRITERIOS CLÍNICOS ── */}
        <div>
          <div style={{fontSize:9,fontWeight:800,color:"#94A3B8",letterSpacing:1.2,textTransform:"uppercase",marginBottom:8,paddingBottom:4,borderBottom:"2px solid #E2E8F0"}}>
            📦 Criterios Clínicos
          </div>

          {GRUPOS_CRITERIOS.map(g=>{
            const loaded=criteriosData&&criteriosData[g.id]&&Object.keys(criteriosData[g.id]).length>0;
            return (
              <Seccion key={g.id} k={`crit_${g.id}`} label={g.label}
                badge={loaded?"✓ Cargado":"⏳ Cargando…"}
                badgeColor={loaded?"#059669":"#F59E0B"}>
                {!loaded ? (
                  <div style={{textAlign:"center",padding:"10px 0"}}>
                    <div style={{fontSize:10,color:"#F59E0B",marginBottom:4}}>⏳ Cargando criterios…</div>
                    <div style={{fontSize:9,color:"#94A3B8"}}>Los datos se cargan automáticamente en segundo plano</div>
                  </div>
                ) : (
                  (g.items||[]).map(({k,l:itemLabel,tipo=undefined})=>{
                    const activoBool = filtros.some(f=>f.campo===k&&f.tipo==="crit_bool");
                    const activoVal  = filtros.find(f=>f.campo===k&&f.tipo==="crit_val");
                    const activo = activoBool || !!activoVal;
                    return (
                      <div key={k} style={{marginBottom:3,padding:"2px 5px",borderRadius:4,
                        background:activo?"#EFF6FF":"transparent",
                        border:activo?"1px solid #BFDBFE":"1px solid transparent"}}>
                        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                          <input type="checkbox" checked={activoBool}
                            onChange={e=>{
                              if(e.target.checked) add({campo:k,label:itemLabel+" = Sí",tipo:"crit_bool",valor:true});
                              else setFiltros(p=>p.filter(f=>!(f.campo===k&&f.tipo==="crit_bool")));
                            }} style={{cursor:"pointer",accentColor:"#3B82F6",flexShrink:0}}/>
                          <span style={{fontSize:10,color:activo?"#1D4ED8":"#475569",fontWeight:activo?700:400}}>{itemLabel}</span>
                          {tipo&&<span style={{fontSize:8,color:"#94A3B8",marginLeft:"auto"}}>{tipo==="num"?"#":"T"}</span>}
                        </label>
                        {activoVal&&<div style={{fontSize:9,color:"#3B82F6",paddingLeft:20}}>= {activoVal.valor}</div>}
                      </div>
                    );
                  }).map(({k,l})=>{
                    // Detectar si es campo numérico/año por el label
                    const esNumerico = /año|n|num|frec|dias|meses|veces|valor|edad|score|indice|índice/i.test(l);
                    // Obtener valores únicos del campo para este criterio
                    const valoresUnicos = esNumerico ? [...new Set(
                      pacientes.map(p=>{
                        const v = p._criterios && (p._criterios[k] || Object.entries(p._criterios||{}).find(([ck])=>ck.startsWith(k))?.[1]);
                        return v && v!=='No' && v!=='NO' && v!='' ? v : null;
                      }).filter(Boolean)
                    )].sort((a,b)=>isNaN(a)?a.localeCompare(b):Number(a)-Number(b)).slice(0,20) : [];

                    const activosBool = filtros.some(f=>f.campo===k&&f.valor===true);
                    const activoVal = filtros.find(f=>f.campo===k&&f.tipo==="crit_val");

                    return (
                      <div key={k} style={{marginBottom:4,padding:"3px 5px",borderRadius:4,
                        background:activosBool||activoVal?"#EFF6FF":"transparent",
                        border:(activosBool||activoVal)?"1px solid #BFDBFE":"1px solid transparent"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <input type="checkbox" checked={activosBool}
                            onChange={e=>{
                              if(e.target.checked) add({campo:k,label:label+" = Sí",tipo:"crit_bool",valor:true});
                              else setFiltros(p=>p.filter(f=>!(f.campo===k&&f.tipo==="crit_bool")));
                            }} style={{cursor:"pointer",accentColor:"#3B82F6"}}/>
                          <span style={{fontSize:10,color:(activosBool||activoVal)?"#1D4ED8":"#475569",fontWeight:(activosBool||activoVal)?700:400,flex:1}}>{l}</span>
                        </div>
                        {esNumerico && valoresUnicos.length>0 && (
                          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:3,paddingLeft:18}}>
                            {valoresUnicos.map(v=>{
                              const activo=activoVal&&activoVal.valor===v;
                              return <button key={v} onClick={()=>activo
                                  ? setFiltros(p=>p.filter(f=>!(f.campo===k&&f.tipo==="crit_val")))
                                  : add({campo:k,label:`${l} = ${v}`,tipo:"crit_val",valor:v})}
                                style={{padding:"1px 6px",fontSize:9,border:`1px solid ${activo?"#3B82F6":"#E2E8F0"}`,
                                  borderRadius:3,background:activo?"#3B82F6":"white",color:activo?"white":"#475569",cursor:"pointer"}}>
                                {v}
                              </button>;
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </Seccion>
            );
          })}

          {/* Filtros guardados */}
          {savedFiltros.length>0&&(
            <div style={{marginTop:10,border:"1px solid #E2E8F0",borderRadius:8,overflow:"hidden"}}>
              <div style={{padding:"7px 11px",background:"#F8FAFC",fontSize:11,fontWeight:700,color:"#1E293B"}}>📂 Filtros Guardados</div>
              <div style={{padding:"8px 10px"}}>
                {savedFiltros.map((sf,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                    <button onClick={()=>setFiltros(sf.filtros)}
                      style={{flex:1,padding:"4px 9px",background:"white",border:"1px solid #E2E8F0",borderRadius:5,fontSize:10,cursor:"pointer",color:"#475569",textAlign:"left",fontFamily:"inherit"}}>
                      ▶ {sf.name} <span style={{color:"#94A3B8",fontSize:9}}>({sf.filtros.length} filtros · {sf.fecha||""})</span>
                    </button>
                    <button onClick={()=>setSavedFiltros(p=>p.filter((_,j)=>j!==i))}
                      style={{padding:"3px 7px",background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:4,fontSize:11,cursor:"pointer",color:"#991B1B"}}>×</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ⓫  TAB ANÁLISIS — Simple + Complejo (completo)
// ════════════════════════════════════════════════════════════════════════════
function TabAnalisis({pacientes,savedAnalisis,setSavedAnalisis}) {
  const [modo,setModo]=useState("simple");
  const [campoA,setCampoA]=useState("pob");
  const [valorA,setValorA]=useState(Object.keys(POB_DEF)[0]);
  const [filtrosB,setFiltrosB]=useState([]);
  const [filtrosAComp,setFiltrosAComp]=useState([]);
  const [ejecutado,setEjecutado]=useState(false);
  const [saveName,setSaveName]=useState("");

  const campos=[
    {k:"pob",    l:"Grupo Población",  tipo:"select",opts:Object.keys(POB_DEF)},
    {k:"geron",  l:"Gerontológico",    tipo:"bool"},
    {k:"pal",    l:"Paliativo",        tipo:"bool"},
    {k:"dep",    l:"Dep. Domicilio",   tipo:"bool"},
    {k:"hfh",    l:"HF Hospitalario",  tipo:"bool"},
    {k:"hfap",   l:"HF AP",           tipo:"bool"},
    {k:"comorb", l:"Comorbilidad",     tipo:"bool"},
    {k:"sano",   l:"Mayor Sano",       tipo:"bool"},
    {k:"may85",  l:"Mayor 85",         tipo:"bool"},
    {k:"polimed",l:"Polimedicado",     tipo:"bool"},
    {k:"social", l:"Carga Social",     tipo:"range", min:0, max:10},
    {k:"gip_ap", l:"GIP AP",          tipo:"bool"},
    {k:"gip_hosp",l:"GIP Hosp.",      tipo:"bool"},
    {k:"gip_osarean",l:"GIP OSAREAN", tipo:"bool"},
    {k:"osi",    l:"OSI",             tipo:"select",opts:["01 OSID","02 OSIT","03 RESTO OSI"]},
    {k:"centro", l:"Centro",          tipo:"select",opts:CENTROS_ALL},
    {k:"sexo",   l:"Sexo",            tipo:"select",opts:["H","M"]},
  ];

  const campoInfo=campos.find(c=>c.k===campoA)||campos[0];

  const grupoA=modo==="simple"
    ? pacientes.filter(p=>campoInfo.tipo==="bool" ? Boolean(p[campoA]) : p[campoA]===valorA)
    : applyFiltros(pacientes, filtrosAComp);
  const grupoB=modo==="simple"
    ? pacientes.filter(p=>campoInfo.tipo==="bool" ? !p[campoA] : p[campoA]!==valorA)
    : applyFiltros(pacientes, filtrosB);

  const stats=(g)=>{
    if(!g.length) return {N:0,h:0,mujeres:0,edadMedia:0,compl:0,top:0,aud:0,polimed:0,conPend:0};
    return {
      N:g.length,
      h:g.filter(p=>p.sexo==="H").length,
      mujeres:g.filter(p=>p.sexo==="M").length,
      edadMedia:+(g.reduce((s,p)=>s+p.edad,0)/g.length).toFixed(1),
      compl:+(g.reduce((s,p)=>s+(p.compl||0),0)/g.length).toFixed(1),
      top:Math.round(g.reduce((s,p)=>s+(p.top_adec||0),0)/g.length),
      aud:Math.round(g.reduce((s,p)=>s+(p.audit_adec||0),0)/g.length),
      polimed:g.filter(p=>p.polimed).length,
      conPend:g.filter(p=>(p.audit_pend||[]).length>0).length,
    };
  };

  const sA=stats(grupoA), sB=stats(grupoB);
  const labelA=modo==="simple"?(campoInfo.tipo==="bool"?campoInfo.l+" = Sí":valorA):"Grupo A (filtros)";
  const labelB=modo==="simple"?(campoInfo.tipo==="bool"?campoInfo.l+" = No":"Resto"):"Grupo B (filtros)";

  const CompBar=({labelRow,nA,nB,isPercent})=>{
    const total=nA+nB; if(!total) return null;
    return (
      <div style={{marginBottom:6}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
          <span style={{fontSize:11,color:"#475569"}}>{labelRow}</span>
          <span style={{fontSize:10,color:"#94A3B8"}}>{isPercent?`${nA}% vs ${nB}%`:`${nFmt(nA)} vs ${nFmt(nB)}`}</span>
        </div>
        <div style={{display:"flex",height:16,borderRadius:4,overflow:"hidden"}}>
          <div style={{flex:nA||0.1,background:"#3B82F6",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:9,color:"white",fontWeight:700}}>{isPercent?nA+"%":nFmt(nA)}</span>
          </div>
          <div style={{flex:nB||0.1,background:"#94A3B8",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:9,color:"white",fontWeight:700}}>{isPercent?nB+"%":nFmt(nB)}</span>
          </div>
        </div>
      </div>
    );
  };

  // Constructor de filtros inline para Modo Complejo
  const FiltroBuilder=({filtros,setFiltros,label,color})=>{
    const addF=(campo,tipo,valor,min,max,lbl)=>setFiltros(p=>[...p,{id:Date.now(),campo,tipo,valor,min,max,label:lbl||campo,logica:"Y"}]);
    const delF=(id)=>setFiltros(p=>p.filter(f=>f.id!==id));
    return (
      <div style={{border:`2px solid ${color}30`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:color+"15",borderBottom:`1px solid ${color}25`,fontWeight:700,fontSize:12,color,display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
          {label}
          <span style={{marginLeft:"auto",fontSize:10,color:"#64748B",fontWeight:400}}>{nFmt(applyFiltros(pacientes,filtros).length)} pacientes</span>
        </div>
        <div style={{padding:"10px 12px"}}>
          {/* Filtros rápidos por perfiles */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:.6}}>Perfiles / Características</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {CARACTS_DEF.map(c=>(
                <button key={c.k} onClick={()=>addF(c.k,"bool",true,null,null,c.l)}
                  style={{padding:"3px 8px",fontSize:10,border:`1px solid ${c.c}40`,borderRadius:4,
                    background:c.c+"10",color:c.c,cursor:"pointer",fontWeight:600}}>
                  +{c.l.split(" ")[0]}
                </button>
              ))}
            </div>
          </div>
          {/* Filtros rápidos por grupos */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:.6}}>Grupo de Población</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {Object.entries(POB_DEF).map(([pob,c])=>(
                <button key={pob} onClick={()=>addF("pob","select",pob,null,null,c.short)}
                  style={{padding:"2px 7px",fontSize:9,border:`1px solid ${c.bg}40`,borderRadius:3,
                    background:c.lt,color:c.bg,cursor:"pointer",fontWeight:700}}>
                  {c.short}
                </button>
              ))}
            </div>
          </div>
          {/* Filtro OSI/Centro rápido */}
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <select onChange={e=>e.target.value&&addF("osi","select",e.target.value,null,null,"OSI="+e.target.value)}
              style={{flex:1,padding:"5px 8px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11,color:"#475569"}}>
              <option value="">+ OSI…</option>
              {["01 OSID","02 OSIT","03 RESTO OSI"].map(o=><option key={o} value={o}>{o}</option>)}
            </select>
            <select onChange={e=>e.target.value&&addF("sexo","select",e.target.value,null,null,"Sexo="+e.target.value)}
              style={{flex:1,padding:"5px 8px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11,color:"#475569"}}>
              <option value="">+ Sexo…</option>
              <option value="H">Hombre</option>
              <option value="M">Mujer</option>
            </select>
            <button onClick={()=>addF("may85","bool",true,null,null,"Mayor 85")}
              style={{padding:"5px 10px",fontSize:10,border:"1px solid #EA580C40",borderRadius:5,background:"#FFF7ED",color:"#EA580C",cursor:"pointer",fontWeight:700}}>
              +85
            </button>
          </div>
          {/* Filtros activos */}
          {filtros.length>0&&(
            <div style={{borderTop:"1px solid #F1F5F9",paddingTop:8,marginTop:4}}>
              <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:4}}>FILTROS ACTIVOS</div>
              {filtros.map(f=>(
                <div key={f.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,padding:"3px 8px",background:"#F8FAFC",borderRadius:4,border:"1px solid #E2E8F0"}}>
                  <span style={{fontSize:10,flex:1,color:"#475569"}}>{f.label}</span>
                  <button onClick={()=>delF(f.id)} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}}>×</button>
                </div>
              ))}
              <button onClick={()=>setFiltros([])} style={{fontSize:10,color:"#DC2626",background:"none",border:"none",cursor:"pointer",padding:"2px 0"}}>
                Limpiar todos
              </button>
            </div>
          )}
        </div>
      </div>
    );
  };

  const guardarAnalisis=()=>{
    if(!saveName) return;
    setSavedAnalisis(p=>[...p,{
      name:saveName,
      fecha:new Date().toLocaleString("es-ES"),
      labelA, labelB,
      sA, sB,
      nTotal:pacientes.length,
    }]);
    setSaveName("");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* SELECTOR MODO */}
      <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["simple","📊 Modo Simple","Un grupo vs el resto automático"],["complejo","📈 Modo Complejo","Define Grupo A y Grupo B con filtros independientes"]].map(([k,l,d])=>(
            <button key={k} onClick={()=>{setModo(k);setEjecutado(false);}} style={{flex:1,padding:"10px",border:`2px solid ${modo===k?"#3B82F6":"#E2E8F0"}`,borderRadius:8,background:modo===k?"#EFF6FF":"white",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style={{fontSize:13,fontWeight:700,color:modo===k?"#1D4ED8":"#1E293B"}}>{l}</div>
              <div style={{fontSize:10,color:"#94A3B8"}}>{d}</div>
            </button>
          ))}
        </div>

        {modo==="simple"&&(
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:3}}>Campo de análisis</div>
              <select value={campoA} onChange={e=>{setCampoA(e.target.value);setEjecutado(false);setValorA(campos.find(c=>c.k===e.target.value)?.opts?.[0]||"");}}
                style={{width:"100%",padding:"7px 10px",border:"1px solid #E2E8F0",borderRadius:7,fontSize:12,fontFamily:"inherit"}}>
                {campos.map(c=><option key={c.k} value={c.k}>{c.l}</option>)}
              </select>
            </div>
            {campoInfo.tipo==="select"&&(
              <div style={{flex:1}}>
                <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:3}}>Valor grupo A</div>
                <select value={valorA} onChange={e=>{setValorA(e.target.value);setEjecutado(false);}}
                  style={{width:"100%",padding:"7px 10px",border:"1px solid #E2E8F0",borderRadius:7,fontSize:12,fontFamily:"inherit"}}>
                  {(campoInfo.opts||[]).map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
            )}
            <button onClick={()=>setEjecutado(true)}
              style={{padding:"7px 20px",background:"#1D4ED8",border:"none",borderRadius:7,color:"white",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              ▶ Ejecutar
            </button>
          </div>
        )}

        {modo==="complejo"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FiltroBuilder filtros={filtrosAComp} setFiltros={setFiltrosAComp} label="🔵 Grupo A" color="#3B82F6"/>
              <FiltroBuilder filtros={filtrosB} setFiltros={setFiltrosB} label="⚫ Grupo B" color="#64748B"/>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>setEjecutado(true)}
                style={{padding:"8px 24px",background:"#1D4ED8",border:"none",borderRadius:7,color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                ▶ Ejecutar comparativa
              </button>
            </div>
          </div>
        )}
      </div>

      {/* RESULTADOS */}
      {ejecutado&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* TARJETAS PRINCIPALES */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[{label:labelA,s:sA,color:"#3B82F6"},{label:labelB,s:sB,color:"#64748B"}].map(({label,s,color})=>(
              <div key={label} style={{background:"white",border:`2px solid ${color}30`,borderRadius:10,padding:"16px 18px"}}>
                <div style={{fontSize:12,fontWeight:800,color,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
                <div style={{fontSize:40,fontWeight:900,color,lineHeight:1}}>{nFmt(s.N)}</div>
                <div style={{fontSize:11,color:"#64748B",marginBottom:10}}>{pct(s.N,pacientes.length)}% del total · {s.N>0?pct(s.N,pacientes.length)+"%":"sin datos"}</div>
                {[
                  ["♂ Hombres",    nFmt(s.h),      s.N>0?pct(s.h,s.N)+"%":""],
                  ["♀ Mujeres",    nFmt(s.mujeres),s.N>0?pct(s.mujeres,s.N)+"%":""],
                  ["Edad media",   s.edadMedia+" años",""],
                  ["Complejidad",  s.compl,""],
                  ["TOP adecuación",s.top+"%",""],
                  ["Auditoría",    s.aud+"%",""],
                  ["Polimedicados",nFmt(s.polimed), s.N>0?pct(s.polimed,s.N)+"%":""],
                  ["Con pendientes",nFmt(s.conPend),s.N>0?pct(s.conPend,s.N)+"%":""],
                ].map(([l,v,sub])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #F8FAFC"}}>
                    <span style={{fontSize:11,color:"#64748B"}}>{l}</span>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{v}</span>
                      {sub&&<span style={{fontSize:10,color:"#94A3B8",marginLeft:4}}>{sub}</span>}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* COMPARATIVA VISUAL CON DELTA */}
          {sA.N>0&&sB.N>0&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1E293B",marginBottom:10}}>Comparativa por grupo de población</div>
                {Object.entries(POB_DEF).map(([pob,c])=>{
                  const nA=grupoA.filter(p=>p.pob===pob).length;
                  const nB=grupoB.filter(p=>p.pob===pob).length;
                  if(!nA&&!nB) return null;
                  return (
                    <div key={pob} style={{marginBottom:5}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:10,color:c.bg,fontWeight:700}}>{c.short}</span>
                        <span style={{fontSize:9,color:"#94A3B8"}}>{nFmt(nA)} vs {nFmt(nB)}</span>
                      </div>
                      <div style={{display:"flex",height:12,borderRadius:3,overflow:"hidden",background:"#F1F5F9"}}>
                        {nA>0&&<div style={{flex:nA,background:"#3B82F6",opacity:.8}}/>}
                        {nB>0&&<div style={{flex:nB,background:"#94A3B8",opacity:.8}}/>}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1E293B",marginBottom:10}}>Δ Delta de diferencia</div>
                {[
                  ["Edad media",    sA.edadMedia, sB.edadMedia, "años"],
                  ["Complejidad",   sA.compl,     sB.compl,     "pts"],
                  ["TOP adecuación",sA.top,        sB.top,       "%"],
                  ["Auditoría",     sA.aud,        sB.aud,       "%"],
                  ["% Polimedicados",+(sA.N>0?(sA.polimed/sA.N*100).toFixed(1):0), +(sB.N>0?(sB.polimed/sB.N*100).toFixed(1):0), "%"],
                  ["% Con pendientes",+(sA.N>0?(sA.conPend/sA.N*100).toFixed(1):0), +(sB.N>0?(sB.conPend/sB.N*100).toFixed(1):0), "%"],
                ].map(([l,va,vb,u])=>{
                  const delta=+(va-vb).toFixed(1);
                  const pos=delta>0;
                  const col=delta===0?"#64748B":pos?"#059669":"#DC2626";
                  return (
                    <div key={l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #F8FAFC"}}>
                      <span style={{fontSize:11,color:"#475569"}}>{l}</span>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:10,color:"#94A3B8"}}>{va}{u} / {vb}{u}</span>
                        <span style={{fontSize:12,fontWeight:700,color:col,minWidth:52,textAlign:"right"}}>
                          {delta===0?"=":(pos?"+":"")+delta}{u}
                        </span>
                      </div>
                    </div>
                  );
                })}

                {/* GUARDAR ANÁLISIS */}
                <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #E2E8F0"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#64748B",marginBottom:5}}>GUARDAR ANÁLISIS</div>
                  <div style={{display:"flex",gap:5}}>
                    <input value={saveName} onChange={e=>setSaveName(e.target.value)} placeholder="Nombre del análisis…"
                      style={{flex:1,padding:"5px 8px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11,fontFamily:"inherit"}}/>
                    <button onClick={guardarAnalisis}
                      style={{padding:"5px 12px",background:"#059669",border:"none",borderRadius:5,color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      💾 Guardar
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ANÁLISIS GUARDADOS */}
          {savedAnalisis.length>0&&(
            <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1E293B",marginBottom:10}}>📂 Análisis Guardados ({savedAnalisis.length})</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
                {savedAnalisis.map((a,i)=>(
                  <div key={i} style={{border:"1px solid #E2E8F0",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontWeight:700,fontSize:12,color:"#1E293B",marginBottom:2}}>{a.name}</div>
                    <div style={{fontSize:10,color:"#94A3B8",marginBottom:6}}>{a.fecha}</div>
                    <div style={{display:"flex",gap:4}}>
                      <div style={{flex:1,padding:"4px 8px",background:"#EFF6FF",borderRadius:4,fontSize:10,color:"#1D4ED8"}}>
                        <div style={{fontWeight:700}}>{a.labelA}</div>
                        <div>N={nFmt(a.sA.N)} · TOP {a.sA.top}%</div>
                      </div>
                      <div style={{flex:1,padding:"4px 8px",background:"#F8FAFC",borderRadius:4,fontSize:10,color:"#475569"}}>
                        <div style={{fontWeight:700}}>{a.labelB}</div>
                        <div>N={nFmt(a.sB.N)} · TOP {a.sB.top}%</div>
                      </div>
                    </div>
                    <button onClick={()=>setSavedAnalisis(p=>p.filter((_,j)=>j!==i))}
                      style={{marginTop:6,fontSize:10,color:"#DC2626",background:"none",border:"none",cursor:"pointer",padding:0}}>
                      × Eliminar
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {!ejecutado&&(
        <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"32px",textAlign:"center",color:"#94A3B8"}}>
          <div style={{fontSize:32,marginBottom:8}}>📈</div>
          <div style={{fontSize:14,fontWeight:600}}>Configura los grupos y pulsa ▶ Ejecutar</div>
          <div style={{fontSize:12,marginTop:4}}>{modo==="simple"?"Selecciona un campo y valor para comparar ese grupo con el resto":"Define los filtros de cada grupo independientemente"}</div>
        </div>
      )}
    </div>
  );
}

// ⓬  TAB ADMINISTRACIÓN — Solo rol ADM (4 sub-secciones completas)

// ════════════════════════════════════════════════════════════════════════════
// 📅  TAB HISTÓRICO
// ════════════════════════════════════════════════════════════════════════════
function TabHistorico() {
  const [meses,     setMeses]     = React.useState([]);
  const [mesA,      setMesA]      = React.useState(null); // mes actual (más reciente)
  const [mesB,      setMesB]      = React.useState(null); // mes anterior
  const [loading,   setLoading]   = React.useState(true);
  const [dataA,     setDataA]     = React.useState([]);
  const [dataB,     setDataB]     = React.useState([]);
  const [subTab,    setSubTab]    = React.useState("resumen");
  const [filtPob,   setFiltPob]   = React.useState("");
  const [filtCambio,setFiltCambio]= React.useState("todos"); // todos|sube|baja
  const [filtGrado, setFiltGrado] = React.useState(0);

  // Cargar lista de meses disponibles
  React.useEffect(()=>{
    (async()=>{
      const sb = await getSupabase();
      if(!sb) return;
      const {data} = await sb.from("HISTORICO").select("fecha_mes").order("fecha_mes",{ascending:false});
      if(!data) return;
      const unicos = [...new Set(data.map(r=>r.fecha_mes))].sort((a,b)=>b.localeCompare(a));
      setMeses(unicos);
      if(unicos.length>0) setMesA(unicos[0]);
      if(unicos.length>1) setMesB(unicos[1]);
    })();
  },[]);

  // Cargar datos del mes seleccionado
  React.useEffect(()=>{
    if(!mesA) return;
    (async()=>{
      setLoading(true);
      const sb = await getSupabase();
      if(!sb){setLoading(false);return;}
      const {data:dA} = await sb.from("HISTORICO")
        .select("id_paciente,edad,comarca_osi,centro,codigo_cupo,poblacion_diana,poblacion_grupo,caract_geron,caract_pal,caract_dep,caract_hfh,caract_hfap,caract_mayor_comorb,caract_mayor_sano,caract_demograficos,idx_complejidad")
        .eq("fecha_mes", mesA);
      setDataA(dA||[]);
      if(mesB){
        const {data:dB} = await sb.from("HISTORICO")
          .select("id_paciente,poblacion_grupo,idx_complejidad")
          .eq("fecha_mes", mesB);
        setDataB(dB||[]);
      }
      setLoading(false);
    })();
  },[mesA,mesB]);

  const fmtMes = m => m ? new Date(m+"T00:00:00").toLocaleDateString("es-ES",{month:"long",year:"numeric"}) : "—";
  const nFmt   = n => n?.toLocaleString("es-ES")||"0";
  const hayDos = meses.length>=2 && mesB && dataB.length>0;

  // Calcular comparativas
  const idsA = React.useMemo(()=>new Set(dataA.map(p=>p.id_paciente)),[dataA]);
  const idsB = React.useMemo(()=>new Set(dataB.map(p=>p.id_paciente)),[dataB]);
  const mapB  = React.useMemo(()=>{const m={}; dataB.forEach(p=>{m[p.id_paciente]=p;}); return m;},[dataB]);

  const nuevos      = React.useMemo(()=>hayDos?dataA.filter(p=>!idsB.has(p.id_paciente)):[], [dataA,idsB,hayDos]);
  const desaparec   = React.useMemo(()=>hayDos?dataB.filter(p=>!idsA.has(p.id_paciente)):[], [dataB,idsA,hayDos]);
  const cambiados   = React.useMemo(()=>{
    if(!hayDos) return [];
    return dataA.filter(p=>{
      const prev = mapB[p.id_paciente];
      if(!prev) return false;
      return prev.poblacion_grupo !== p.poblacion_grupo || (Math.abs((p.idx_complejidad||0)-(prev.idx_complejidad||0))>0.5);
    }).map(p=>({
      ...p,
      pob_prev:    mapB[p.id_paciente]?.poblacion_grupo||"—",
      idx_prev:    mapB[p.id_paciente]?.idx_complejidad||0,
      delta_idx:   (p.idx_complejidad||0)-(mapB[p.id_paciente]?.idx_complejidad||0),
    }));
  },[dataA,mapB,hayDos]);

  // Agrupación por campo
  const agrupar = (arr, campo) => {
    const map = {};
    arr.forEach(p=>{
      const k = p[campo]||"Sin dato";
      map[k] = (map[k]||0)+1;
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  };

  // Exportar Excel
  const exportar = (arr, nombre) => {
    if(!arr.length) return;
    const cols = ["id_paciente","edad","comarca_osi","centro","codigo_cupo","poblacion_grupo","pob_prev","delta_idx"];
    const rows = arr.map(p=>cols.map(c=>p[c]??"")); 
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([cols,...rows]);
    XLSX.utils.book_append_sheet(wb, ws, nombre.slice(0,31));
    XLSX.writeFile(wb, `${nombre}_${mesA}.xlsx`);
  };

  const camFiltrados = React.useMemo(()=>{
    let r = cambiados;
    if(filtPob)  r = r.filter(p=>p.poblacion_grupo===filtPob||p.pob_prev===filtPob);
    if(filtCambio==="sube") r = r.filter(p=>p.delta_idx>filtGrado);
    if(filtCambio==="baja") r = r.filter(p=>p.delta_idx<-filtGrado);
    return r;
  },[cambiados,filtPob,filtCambio,filtGrado]);

  const STY = {
    card:  {background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px",marginBottom:12},
    h2:    {fontSize:13,fontWeight:800,color:"#0F2444",marginBottom:10,display:"flex",alignItems:"center",gap:6},
    badge: (c)=>({fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,background:c+"15",color:c,border:`1px solid ${c}30`}),
    subBtn:(on)=>({padding:"6px 14px",fontSize:11,fontWeight:on?700:500,border:"none",borderRadius:6,
      background:on?"#1D4ED8":"transparent",color:on?"white":"#64748B",cursor:"pointer"}),
    expBtn:{padding:"5px 12px",fontSize:10,fontWeight:700,background:"#059669",border:"none",borderRadius:5,color:"white",cursor:"pointer"},
    noData:{padding:"32px",textAlign:"center",color:"#94A3B8",fontSize:12,fontStyle:"italic"},
  };

  const GrupoTable = ({arr,titulo,color}) => {
    if(!arr.length) return <div style={STY.noData}>Sin datos</div>;
    return (
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[["comarca_osi","OSI"],["centro","Centro"],["codigo_cupo","Cupo"],["poblacion_grupo","Grupo Población"]].map(([campo,lbl])=>(
          <div key={campo}>
            <div style={{fontSize:9,fontWeight:700,color:"#94A3B8",letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>{lbl}</div>
            <div style={{maxHeight:140,overflowY:"auto"}}>
              {agrupar(arr,campo).slice(0,15).map(([k,n])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #F1F5F9",fontSize:11}}>
                  <span style={{color:"#374151",truncate:true}}>{k}</span>
                  <span style={{fontWeight:700,color}}>{nFmt(n)}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    );
  };

  if(loading) return <div style={{padding:40,textAlign:"center",color:"#94A3B8"}}>⏳ Cargando histórico…</div>;

  return (
    <div style={{padding:"16px 20px",maxWidth:960,margin:"0 auto"}}>

      {/* Selector de meses */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,padding:"12px 16px",background:"white",borderRadius:10,border:"1px solid #E2E8F0"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#0F2444"}}>📅 Histórico PCRON</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#64748B"}}>Mes actual:</span>
          <select value={mesA||""} onChange={e=>setMesA(e.target.value)}
            style={{fontSize:11,border:"1px solid #E2E8F0",borderRadius:5,padding:"3px 8px",background:"white"}}>
            {meses.map(m=><option key={m} value={m}>{fmtMes(m)} ({m})</option>)}
          </select>
        </div>
        {meses.length>1 && (
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:"#64748B"}}>Comparar con:</span>
            <select value={mesB||""} onChange={e=>setMesB(e.target.value)}
              style={{fontSize:11,border:"1px solid #E2E8F0",borderRadius:5,padding:"3px 8px",background:"white"}}>
              <option value="">— ninguno —</option>
              {meses.filter(m=>m!==mesA).map(m=><option key={m} value={m}>{fmtMes(m)} ({m})</option>)}
            </select>
          </div>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          {["resumen","nuevos","desaparecidos","cambios"].map(t=>(
            <button key={t} onClick={()=>setSubTab(t)} style={STY.subBtn(subTab===t)}>
              {{resumen:"📊 Resumen",nuevos:"🆕 Nuevos",desaparecidos:"👋 Desaparecidos",cambios:"🔄 Cambios"}[t]}
            </button>
          ))}
        </div>
      </div>

      {/* RESUMEN */}
      {subTab==="resumen" && (
        <div>
          <div style={STY.card}>
            <div style={STY.h2}>
              📊 Snapshot — {fmtMes(mesA)}
              <span style={STY.badge("#3B82F6")}>{nFmt(dataA.length)} pacientes</span>
              <button onClick={()=>exportar(dataA,"resumen")} style={{...STY.expBtn,marginLeft:"auto"}}>⬇ Exportar</button>
            </div>
            <GrupoTable arr={dataA} color="#3B82F6"/>
          </div>
        </div>
      )}

      {/* NUEVOS */}
      {subTab==="nuevos" && (
        <div style={STY.card}>
          <div style={STY.h2}>
            🆕 Pacientes Nuevos
            {hayDos ? <span style={STY.badge("#059669")}>{nFmt(nuevos.length)} nuevos vs {fmtMes(mesB)}</span>
              : <span style={STY.badge("#94A3B8")}>Requiere 2 meses</span>}
            {hayDos && <button onClick={()=>exportar(nuevos,"nuevos")} style={{...STY.expBtn,marginLeft:"auto"}}>⬇ Exportar</button>}
          </div>
          {!hayDos
            ? <div style={STY.noData}>Disponible cuando haya al menos 2 meses de datos en el histórico.</div>
            : <GrupoTable arr={nuevos} color="#059669"/>}
        </div>
      )}

      {/* DESAPARECIDOS */}
      {subTab==="desaparecidos" && (
        <div style={STY.card}>
          <div style={STY.h2}>
            👋 Pacientes Desaparecidos
            {hayDos ? <span style={STY.badge("#DC2626")}>{nFmt(desaparec.length)} vs {fmtMes(mesB)}</span>
              : <span style={STY.badge("#94A3B8")}>Requiere 2 meses</span>}
            {hayDos && <button onClick={()=>exportar(desaparec,"desaparecidos")} style={{...STY.expBtn,background:"#DC2626",marginLeft:"auto"}}>⬇ Exportar</button>}
          </div>
          {!hayDos
            ? <div style={STY.noData}>Disponible cuando haya al menos 2 meses de datos en el histórico.</div>
            : <GrupoTable arr={desaparec} color="#DC2626"/>}
        </div>
      )}

      {/* CAMBIOS */}
      {subTab==="cambios" && (
        <div style={STY.card}>
          <div style={STY.h2}>
            🔄 Cambios de Población / Complejidad
            {hayDos ? <span style={STY.badge("#D97706")}>{nFmt(camFiltrados.length)} pacientes</span>
              : <span style={STY.badge("#94A3B8")}>Requiere 2 meses</span>}
            {hayDos && <button onClick={()=>exportar(camFiltrados,"cambios")} style={{...STY.expBtn,background:"#D97706",marginLeft:"auto"}}>⬇ Exportar</button>}
          </div>
          {!hayDos
            ? <div style={STY.noData}>Disponible cuando haya al menos 2 meses de datos en el histórico.</div>
            : <>
              {/* Filtros */}
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                <select value={filtPob} onChange={e=>setFiltPob(e.target.value)}
                  style={{fontSize:11,border:"1px solid #E2E8F0",borderRadius:5,padding:"3px 8px"}}>
                  <option value="">Todos los grupos</option>
                  {[...new Set(cambiados.map(p=>p.poblacion_grupo).filter(Boolean))].sort().map(p=>(
                    <option key={p} value={p}>{p}</option>
                  ))}
                </select>
                <select value={filtCambio} onChange={e=>setFiltCambio(e.target.value)}
                  style={{fontSize:11,border:"1px solid #E2E8F0",borderRadius:5,padding:"3px 8px"}}>
                  <option value="todos">Todos los cambios</option>
                  <option value="sube">↑ Aumenta complejidad</option>
                  <option value="baja">↓ Disminuye complejidad</option>
                </select>
                {filtCambio!=="todos" && (
                  <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                    <span style={{color:"#64748B"}}>Grado mínimo:</span>
                    <input type="number" min={0} max={20} step={0.5} value={filtGrado}
                      onChange={e=>setFiltGrado(parseFloat(e.target.value)||0)}
                      style={{width:60,padding:"3px 6px",border:"1px solid #E2E8F0",borderRadius:5,fontSize:11}}/>
                  </div>
                )}
              </div>
              {/* Tabla */}
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{background:"#F8FAFC"}}>
                      {["ID Paciente","OSI","Centro","Cupo","Grupo Actual","Grupo Anterior","Idx Actual","Idx Anterior","Δ Idx"].map(h=>(
                        <th key={h} style={{padding:"6px 8px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #E2E8F0",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {camFiltrados.slice(0,200).map((p,i)=>{
                      const delta = p.delta_idx||0;
                      const dc = delta>0?"#059669":delta<0?"#DC2626":"#94A3B8";
                      return (
                        <tr key={p.id_paciente} style={{background:i%2===0?"white":"#F8FAFC"}}>
                          <td style={{padding:"4px 8px",fontFamily:"monospace",color:"#1E293B"}}>{p.id_paciente}</td>
                          <td style={{padding:"4px 8px",color:"#374151"}}>{p.comarca_osi||"—"}</td>
                          <td style={{padding:"4px 8px",color:"#374151"}}>{p.centro||"—"}</td>
                          <td style={{padding:"4px 8px",color:"#374151"}}>{p.codigo_cupo||"—"}</td>
                          <td style={{padding:"4px 8px"}}><span style={STY.badge("#3B82F6")}>{p.poblacion_grupo||"—"}</span></td>
                          <td style={{padding:"4px 8px"}}><span style={STY.badge("#64748B")}>{p.pob_prev||"—"}</span></td>
                          <td style={{padding:"4px 8px",fontWeight:700,color:"#374151"}}>{(p.idx_complejidad||0).toFixed(1)}</td>
                          <td style={{padding:"4px 8px",color:"#94A3B8"}}>{(p.idx_prev||0).toFixed(1)}</td>
                          <td style={{padding:"4px 8px",fontWeight:700,color:dc}}>{delta>0?"+":""}{delta.toFixed(1)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {camFiltrados.length>200&&<div style={{padding:"8px",textAlign:"center",fontSize:10,color:"#94A3B8"}}>Mostrando 200 de {nFmt(camFiltrados.length)} — exporta para ver todos</div>}
              </div>
            </>
          }
        </div>
      )}
    </div>
  );
}

function TabAdministracion({pacientes}) {
  const [subTab,setSubTab]=useState("usuarios");

  // ── USUARIOS — conectado a Supabase ──────────────────────────────────────
  const [usuarios,setUsuarios]   = useState([]);
  const [usuLoading,setUsuLoading]= useState(true);
  const [usuError,setUsuError]   = useState("");
  const [editUser,setEditUser]   = useState(null);
  const [showNewUser,setShowNewUser]=useState(false);
  const [newUser,setNewUser]     = useState({nombre:"",email:"",rol:"PROFESIONAL",centros:[],cupos:[],activo:true});
  const [invitando,setInvitando] = useState(false);
  const [invMsg,setInvMsg]       = useState("");

  // Cargar usuarios desde Supabase
  useEffect(()=>{
    const load=async()=>{
      setUsuLoading(true); setUsuError("");
      try {
        const sb=await getSupabase();
        if(!sb) throw new Error("No se pudo conectar con Supabase");
        // Timeout de 10s para no quedarse colgado
        const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error("Tiempo de espera agotado (10s)")),10000));
        const query   = sb.from("usuarios_visor").select("*").order("created_at");
        const {data,error} = await Promise.race([query, timeout]);
        if(error) throw error;
        setUsuarios(data||[]);
      } catch(e){ setUsuError(e.message||"Error desconocido"); }
      setUsuLoading(false);
    };
    load();
  },[]);

  // Guardar cambios de un usuario
  const guardarUsuario=async(u)=>{
    try {
      const sb=await getSupabase();
      const {error}=await sb.from("usuarios_visor").update({
        nombre:u.nombre, rol:u.rol, centros:u.centros||[], cupos:u.cupos||[], activo:u.activo
      }).eq("id",u.id);
      if(error) throw error;
      setUsuarios(prev=>prev.map(x=>x.id===u.id?u:x));
      setEditUser(null);
    } catch(e){ alert("Error guardando: "+e.message); }
  };

  // Crear nuevo usuario (invitar por email)
  const invitarUsuario=async()=>{
    if(!newUser.nombre||!newUser.email){setInvMsg("❌ Nombre y email son obligatorios");return;}
    setInvitando(true); setInvMsg("");
    try {
      const sb=await getSupabase();
      const {error}=await sb.from("usuarios_visor").insert({
        email:newUser.email.toLowerCase().trim(),
        nombre:newUser.nombre.trim(), rol:newUser.rol,
        centros:newUser.centros||[], cupos:newUser.cupos||[], activo:true, primer_login:true
      });
      if(error) {
        if(error.code==="23505") setInvMsg("❌ Ya existe un usuario con ese email.");
        else setInvMsg("❌ "+error.message);
        setInvitando(false);
        return;
      }
      const {data}=await sb.from("usuarios_visor").select("*").order("created_at");
      setUsuarios(data||[]);
      setShowNewUser(false);
      setNewUser({nombre:"",email:"",rol:"PROFESIONAL",centros:[],cupos:[],activo:true});
      setInvMsg("✅ Usuario creado. Debe usar su email en el visor y 'Olvidé mi contraseña' para acceder.");
    } catch(e){
      setInvMsg("❌ "+(e.message||"Error desconocido"));
    } finally {
      setInvitando(false);
    }
  };

  // Activar / desactivar usuario
  const toggleActivo=async(u)=>{
    try {
      const sb=await getSupabase();
      await sb.from("usuarios_visor").update({activo:!u.activo}).eq("id",u.id);
      setUsuarios(prev=>prev.map(x=>x.id===u.id?{...x,activo:!x.activo}:x));
    } catch(e){ alert(e.message); }
  };

  // Eliminar usuario
  const eliminarUsuario=async(u)=>{
    if(!confirm(`¿Eliminar a ${u.nombre}? Esta acción no se puede deshacer.`)) return;
    try {
      const sb=await getSupabase();
      await sb.from("usuarios_visor").delete().eq("id",u.id);
      setUsuarios(prev=>prev.filter(x=>x.id!==u.id));
    } catch(e){ alert(e.message); }
  };

  const [etlLog,setEtlLog]=useState([
    {fecha:"03/03/2026 08:14",estado:"OK",  nuevos:312, eliminados:18, modificados:1204, duracion:"4m 32s"},
    {fecha:"01/02/2026 08:21",estado:"OK",  nuevos:287, eliminados:24, modificados:986,  duracion:"4m 18s"},

                    </div>

              <strong>8 secciones disponibles:</strong> Portada · Estadísticas · Gráficos · Auditoría · Ranking centros · Detalle TOP 50 · Detalle completo · Pendientes
            </div>

            {informes.map(inf=>(
              <div key={inf.id} style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:inf.activo?"white":"#FAFBFC"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:700,color:inf.activo?"#1E293B":"#94A3B8"}}>{inf.nombre}</span>
                      <span style={{padding:"2px 7px",fontSize:9,fontWeight:700,borderRadius:4,
                        background:inf.periodicidad==="Mensual"?"#DBEAFE":inf.periodicidad==="Trimestral"?"#EDE9FE":"#F0FDF4",
                        color:inf.periodicidad==="Mensual"?"#1D4ED8":inf.periodicidad==="Trimestral"?"#7C3AED":"#15803D"}}>

                      {!inf.activo&&<span style={{padding:"2px 6px",fontSize:9,background:"#F1F5F9",color:"#94A3B8",borderRadius:4,fontWeight:700}}>INACTIVO</span>}
                    </div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {inf.secciones.map(s=>(
                        <span key={s} style={{fontSize:9,padding:"1px 6px",background:"#F1F5F9",color:"#64748B",borderRadius:3}}>{s}</span>
                      ))}
                    </div>
                    <div style={{fontSize:10,color:"#94A3B8",marginTop:3}}>Última ejecución: {inf.ultimaEjec}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {genProgress[inf.id]!=null ? (
                      <div style={{width:100,textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#1D4ED8",marginBottom:3}}>Generando… {genProgress[inf.id]}%</div>
                        <div style={{height:5,background:"#DBEAFE",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:genProgress[inf.id]+"%",background:"#3B82F6",transition:"width .2s"}}/>
                        </div>
                      </div>
                    ) : (
                      <button onClick={()=>generarInforme(inf.id)} disabled={!inf.activo}
                        style={{padding:"6px 14px",fontSize:11,border:"none",borderRadius:6,cursor:inf.activo?"pointer":"not-allowed",
                          background:inf.activo?"#1D4ED8":"#E2E8F0",color:inf.activo?"white":"#94A3B8",fontWeight:700}}>
                        📄 Generar PDF
                      </button>
                    )}
                    <button onClick={()=>setInformes(p=>p.map(x=>x.id===inf.id?{...x,activo:!x.activo}:x))}
                      style={{padding:"6px 12px",fontSize:11,border:`1px solid ${inf.activo?"#FCA5A5":"#6EE7B7"}`,borderRadius:6,cursor:"pointer",
                        background:inf.activo?"#FEF2F2":"#D1FAE5",color:inf.activo?"#DC2626":"#059669",fontWeight:600}}>
                      {inf.activo?"Desactivar":"Activar"}
                    </button>
                    <button onClick={()=>setInformes(p=>p.filter(x=>x.id!==inf.id))}
                      style={{padding:"6px 10px",fontSize:11,border:"1px solid #FCA5A5",borderRadius:6,background:"#FEF2F2",color:"#DC2626",cursor:"pointer"}}>🗑</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// 🔍  PANTALLA CONSULTA — búsqueda rápida por CIC / ID
// ════════════════════════════════════════════════════════════════════════════
function PantallaConsulta({pacientes, authUser, handleLogout}) {
  const [busq, setBusq]         = React.useState("");
  const [resultado, setResultado] = React.useState(null); // null=sin buscar, false=no encontrado, obj=encontrado
  const [modal, setModal]       = React.useState(null);

  const buscar = () => {
    const q = busq.trim().toUpperCase();
    if (!q) return;
    const found = pacientes.find(p =>
      String(p.cic||"").toUpperCase() === q ||
      String(p.id||"").toUpperCase()  === q
    );
    setResultado(found || false);
    setModal(null);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0B1628,#112240)",display:"flex",flexDirection:"column"}}>
