let _supabaseClient = null;

async function ensureSupabaseCDN() {
  if (typeof window === "undefined") return false;
  if (window.supabase && window.supabase.createClient) return true;
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
    s.onload  = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

async function getSupabase() {
  if (_supabaseClient) return _supabaseClient;
  const ok = await ensureSupabaseCDN();
  if (ok && window.supabase && window.supabase.createClient) {
    _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      db: { schema: "public" },
      auth: { persistSession: false },
    });
  }
  return _supabaseClient;
}

function applyFiltros(pacs, filtros) {
  return pacs.filter(p => {
    const results = filtros.map(f => {
      let match = false;
      if (f.tipo==="bool")        match = f.valor ? Boolean(p[f.campo]) : !p[f.campo];
      else if (f.tipo==="select") {
        if (f.campo==="bloque") {
          // Bloque filter: match by bloque field OR by centro belonging to bloque
          const centrosBloque = (BLOQUE_CENTROS[f.valor]||[]).map(c=>c.toUpperCase());
          match = p.bloque===f.valor || centrosBloque.includes((p.centro||"").toUpperCase());
        } else {
          match = p[f.campo]===f.valor;
        }
      }
      else if (f.tipo==="range")    match = (p[f.campo]||0)>=f.min && (p[f.campo]||0)<=f.max;
      else if (f.tipo==="texto")    match = String(p[f.campo]||"").toLowerCase().includes(f.valor.toLowerCase());
      else if (f.tipo==="lista")    match = Array.isArray(f.valor) && f.valor.includes(String(p[f.campo]||""));
      else if (f.tipo==="bool_pend") match = f.valor ? (p.audit_pend||[]).length>0 : (p.audit_pend||[]).length===0;
      else if (f.tipo==="pend_item") match = (p.audit_pend||[]).includes(f.valor);
      else if (f.tipo==="crit_bool") match = f.valor ? Boolean(getC(p._criterios||{},f.campo)) : !getC(p._criterios||{},f.campo);
      return f.logica==="NO" ? !match : match;
    });
    // Y = todos, O = alguno
    const yFiltros = filtros.filter((_,i)=>filtros[i].logica!=="O");
    const oFiltros = filtros.filter((_,i)=>filtros[i].logica==="O");
    const yOk = yFiltros.every((_,i)=>results[filtros.indexOf(yFiltros[i])]);
    const oOk = oFiltros.length===0 || oFiltros.some((_,i)=>results[filtros.indexOf(oFiltros[i])]);
    return yOk && oOk;
  });
}

async function cargarTodosPacientes(onProgress) {
  const sb = await getSupabase();
  if (!sb) return [];
  const batchSize = 1000; // Supabase max por request
  let all = [], offset = 0;
  // Usa PACIENTES_VISTA — campos clave extraídos del JSONB server-side
  while (true) {
    const {data, error, count} = await sb
      .from("PACIENTES_VISTA")
      .select("*", {count:"exact"})
      .range(offset, offset + batchSize - 1);
    if (error) { console.error("Error carga:", error); break; }
    if (!data || data.length === 0) break;
    if (offset === 0) {
      console.log("COLUMNAS VISTA:", Object.keys(data[0]));
      console.log("TOTAL en BD:", count);
    }
    all = [...all, ...data.map(r => mapearPacienteVista(r))];
    offset += data.length;
    const total = count || META.totalBD;
    onProgress(Math.min(98, Math.round(offset / total * 100)));
    if (data.length < batchSize) break; // último batch
  }
  return all;
}

// Fase 2: carga criterios JSONB en background, actualiza pacientes progresivamente

async function cargarCriteriosBackground(pacientes, onProgress, onBatch) {
  const sb = await getSupabase();
  if (!sb) return;
  const batchSize = 200; // Supabase .in() tiene límite de URL — máx ~200 IDs
  let offset = 0, total = pacientes.length;
  // Mapa id→índice para updates rápidos
  const idxMap = {};
  pacientes.forEach((p,i) => { idxMap[p.id] = i; });

  while (offset < total) {
    const ids = pacientes.slice(offset, offset + batchSize).map(p => p.id);
    const {data, error} = await sb
      .from("PACIENTES")
      .select("id_paciente,criterios")
      .in("id_paciente", ids);
    if (error || !data) { offset += batchSize; continue; }

    // Fase 2: SOLO añadir _criterios — todos los demás campos ya vienen
    // correctos de PACIENTES_VISTA (fase 1). No tocar nada mas.
    const updates = {};
    data.forEach(row => {
      const idx = idxMap[row.id_paciente];
      if (idx === undefined) return;
      updates[idx] = { ...pacientes[idx], _criterios: row.criterios || {} };
    });
    offset += batchSize;
    const isLast = offset >= total;
    // Acumular updates, llamar onBatch cada 1000 pacientes o al final
    if (isLast || Object.keys(updates).length >= 200) {
      onBatch(updates, isLast);
    }
    onProgress(Math.round(offset / total * 100));
    await new Promise(r => setTimeout(r, 5));
  }
  onProgress(100);
}

// ── MAPEO columnas Supabase → claves internas ──────────────────────────────
// Estructura: columnas directas + todo dentro de criterios (JSONB)

function esSi(v) {
  if (v === null || v === undefined) return false;
  if (v === true  || v === 1) return true;
  if (v === false || v === 0) return false;
  const s = String(v).trim().toUpperCase();
  return s === 'SI' || s === 'SÍ' || s === '1' || s === 'TRUE' || s === 'YES' || s === 'S';
}

function getC(crit, key) {
  if (!crit) return undefined;
  // Búsqueda exacta
  if (crit[key] !== undefined) return crit[key];
  // Búsqueda por código (primeros 11 chars XX-XX-XX-XX)
  const codigo = key.substring(0, 11);
  for (const k of Object.keys(crit)) {
    if (k.substring(0, 11) === codigo) return crit[k];
  }
  return undefined;
}

}


// Mapeo desde PACIENTES_VISTA (campos planos, sin JSONB)
// Normaliza valores de pob de Supabase → claves de POB_DEF
// Valores reales confirmados por SQL en PACIENTES_VISTA
const POB_MAP = {
  "08 DEMOGRAFICOS":             "08 DEMOGRÁFICOS",
  "06 MAYOR COMORBILIDAD":       "06 MAYOR COMORBILIDAD",
  "03 DEPENDIENTE EN DOMICILIO": "03 DEPENDIENTE DOMICILIO",
  "07 MAYOR SANO":               "07 MAYOR SANO",
  "01 GERONTOLOGICO":            "01 GERONTOLÓGICO",
  "05 HF AP":                    "05 HF AP",
  "02 PALIATIVO":                "02 PALIATIVO",
  "04 HF HOSPITALARIO":          "04 HF HOSPITALARIO",
};
function normalizarPob(v) {
  if (!v) return '';
  const s = String(v).trim().toUpperCase();
  return POB_MAP[s] || v;
}

let _debugLogged = false;
function mapearPacienteVista(r) {
  if (!_debugLogged) {
    _debugLogged = true;
    const sample = {};
    Object.keys(r).forEach(k => { try { sample[k] = r[k]; } catch(e) {} });
    console.log("🔍 PRIMERA FILA CAMPOS:", Object.keys(r));

    console.log("🔍 medico:", r.medico, "bloque:", r.bloque, "codigo_cupo:", r.codigo_cupo);
  }
  const audit = r.auditoria || {};

  let osi = r.comarca_osi || '';
  if (osi.toUpperCase().includes('DONOSTIALDEA')) osi = '01 OSID';
  else if (osi.toUpperCase().includes('TOLOSALDEA')) osi = '02 OSIT';
  else if (osi && !osi.startsWith('0')) osi = '03 RESTO OSI';

  let sexo = r.sexo || '';
  if (sexo === 'Hombre' || sexo === 'HOMBRE') sexo = 'H';
  if (sexo === 'Mujer'  || sexo === 'MUJER')  sexo = 'M';

  const aud_estrat = audit['estratificacion'] || {};
  const aud_equipo = audit['equipo_ref']      || {};

  const aud_seg    = audit['seguimiento']     || {};

  const dimsPct = [aud_estrat,aud_equipo,aud_form,aud_seg]
    .filter(d=>d.total>0).map(d=>d.pct||0);
  const audit_global = dimsPct.length
    ? Math.round(dimsPct.reduce((a,b)=>a+b,0)/dimsPct.length) : 0;
  const audit_pend = [
    ...(aud_estrat.falta||[]),...(aud_equipo.falta||[]),
    ...(aud_form.falta||[]),...(aud_seg.falta||[]),

  const color_global = colores.length
    ? colores.reduce((w,c)=>(colorOrder[c]??99)<(colorOrder[w]??99)?c:w)
    : 'ROJO';

  return {
    id:     r.id_paciente,
    cic:    r.cic,
    sexo,
    edad:   parseInt(r.edad) || 0,
    osi,
    centro: r.centro,

    bloque:      r.bloque      || '',
    centro_ger:  r.centro_ger  || '',

    sano:    esSi(r.caract_sano),

    polimed: esSi(r.caract_polimed),

    fr:    parseFloat(r.fr)    || 0,

    audit_form:   aud_form,
    audit_seg:    aud_seg,
    top_adec:   parseFloat(r.compl) || 0,
    audit_adec: audit_global,
    _criterios: {},  // vacío — se carga bajo demanda en modal
  };
}


function mapearPaciente(r) {
  const crit = r.criterios || {};
  const audit = crit['AUDITORIA'] || {};

  // Normalizar OSI
  let osi = r.comarca_osi || '';
  if (osi.toUpperCase().includes('DONOSTIALDEA')) osi = '01 OSID';
  else if (osi.toUpperCase().includes('TOLOSALDEA')) osi = '02 OSIT';
  else if (osi && !osi.startsWith('0')) osi = '03 RESTO OSI';

  // Normalizar sexo
  let sexo = r.sexo || '';
  if (sexo === 'Hombre' || sexo === 'HOMBRE') sexo = 'H';
  if (sexo === 'Mujer'  || sexo === 'MUJER')  sexo = 'M';

  // Auditoría — 4 dimensiones
  const aud_estrat  = audit['estratificacion'] || {};
  const aud_equipo  = audit['equipo_ref']      || {};
  const aud_form    = audit['formularios']      || {};
  const aud_seg     = audit['seguimiento']      || {};

  // Score global de auditoría = media de las dimensiones disponibles
  const dimsPct = [aud_estrat,aud_equipo,aud_form,aud_seg]
    .filter(d=>d.total>0)
    .map(d=>d.pct||0);
  const audit_global = dimsPct.length ? Math.round(dimsPct.reduce((a,b)=>a+b,0)/dimsPct.length) : 0;

  // Pendientes = todos los "falta" de todas las dimensiones
  const audit_pend = [
    ...(aud_estrat.falta||[]),
    ...(aud_equipo.falta||[]),
    ...(aud_form.falta||[]),
    ...(aud_seg.falta||[]),
  ];

  // Color global auditoría (el peor de las dimensiones)
  const colorOrder = {ROJO:0,NARANJA:1,AMARILLO:2,VERDE:3};
  const colores = [aud_estrat,aud_equipo,aud_form,aud_seg].filter(d=>d.color).map(d=>d.color);
  const color_global = colores.length ? colores.reduce((worst,c)=>
    (colorOrder[c]??99)<(colorOrder[worst]??99)?c:worst
  ) : 'ROJO';

  return {
    // ── IDENTIFICACIÓN (columnas directas) ──
    id:     r.id_paciente,
    cic:    r.cic,
    sexo,
    edad:   parseInt(r.edad) || 0,
    osi,
    centro: r.centro,
    cupo:   r.codigo_cupo,

    // ── EQUIPO REFERENCIA (en criterios por código) ──
    medico:      getC(crit,'04-13-03-03') || '',
    bloque:      getC(crit,'04-13-03-02') || '',
    centro_ger:  getC(crit,'02-02-16-02') || '',
    gip_ap:      esSi(getC(crit,'04-12-05-02')),
    gip_hosp:    esSi(getC(crit,'04-13-09-01')),
    gip_osarean: esSi(getC(crit,'04-15-09-01')),

    // ── GRUPO DE POBLACIÓN ──
    pob: crit['05-17-00-02 CLAS POBLACION APP_POBLACION DIANA grupos'] || '',

    // ── CARACTERÍSTICAS / PERFILES ──
    geron:   esSi(crit['CARACT_GERONTOLOGICO']),
    pal:     esSi(crit['CARACT_PALIATIVO']),
    dep:     esSi(crit['CARACT_DEPENDIENTE_DOMICILIO']),
    hfh:     esSi(crit['CARACT_HF_HOSPITALARIO']),
    hfap:    esSi(crit['CARACT_HF_AP']),
    comorb:  esSi(crit['CARACT_MAYOR_COMORBILIDAD']),
    sano:    esSi(crit['CARACT_MAYOR_SANO']),
    demog:   esSi(crit['CARACT_DEMOGRAFICOS']),
    polimed: esSi(crit['CARACT_POLIMEDICADO']),
    may85:   esSi(crit['CARACT_>85']),
    social:  parseFloat(crit['05-18-00-13 CLAS CARACT APP_11 CARGA SOCIAL']) || 0,

    // ── 3 ÍNDICES (numéricos) ──
    co:    parseFloat(crit['05-19-00-13 CLAS INDICE APP_COMORBILIDAD'])  || 0,
    fr:    parseFloat(crit['05-19-00-14 CLAS INDICE APP_FRECUENTACION']) || 0,
    compl: parseFloat(crit['05-19-00-15 CLAS INDICE APP_COMPLEJIDAD'])   || 0,

    // ── AUDITORÍA (4 dimensiones) ──
    audit_global,           // % medio global
    audit_color: color_global,
    audit_pend,             // array de elementos pendientes
    audit_estrat:  aud_estrat,   // {pct,color,falta,total,cumplidos}
    audit_equipo:  aud_equipo,
    audit_form:    aud_form,
    audit_seg:     aud_seg,

    // Para compatibilidad con código existente
    top_adec:   parseFloat(crit['05-19-00-15 CLAS INDICE APP_COMPLEJIDAD']) || 0,
    audit_adec: audit_global,

    // Raw por si se necesita
    _criterios: crit,
  };
}

async function cargarCriteriosGrupo(grupo, ids) {
  const sb = await getSupabase();
  if (!sb) return {};
  // grupo.items = [{k,l}] — solo necesitamos cargar criterios de esos pacientes
  const {data, error} = await sb
    .from("PACIENTES")
    .select("id_paciente,criterios")
    .in("id_paciente", ids.slice(0,1000));
  if (error || !data) { console.error("cargarCriteriosGrupo error:", error); return {}; }
  const map = {};
  data.forEach(row => {
    map[row.id_paciente] = row.criterios || {};
  });
  return map;
}

function textoHistoria(pat, canCIC, ac, criteriosData) {
  const cic = canCIC ? pat.cic : "RESTRINGIDO";
  const gip = [pat.gip_ap?"GIP AP":"",pat.gip_hosp?"GIP Hosp.":"",pat.gip_osarean?"GIP OSAREAN":""].filter(Boolean).join(", ")||"Sin programa";
  const lines = [
    "═══ PACIENTE CRÓNICO PCRON ═══",
    `ID: ${pat.id}  ·  CIC: ${cic}`,
    `Sexo: ${pat.sexo==="H"?"Hombre":"Mujer"}  ·  Edad: ${pat.edad} años`,
    `OSI: ${pat.osi}  ·  Centro: ${pat.centro}  ·  Cupo: ${pat.cupo}`,
    `Médico Ref.: ${pat.medico||"—"}  ·  Bloque: ${pat.bloque||"—"}`,
    `Programas GIP: ${gip}`,
    "",
    `GRUPO DE POBLACIÓN: ${pat.pob}`,
    "",
    `PERFILES ACTIVOS: ${ac.length ? ac.map(c=>c.l).join(", ") : "Ninguno"}`,
    "",
  ];
  ac.forEach(c => {
    const crits = CRITERIOS_PERFIL[c.k]||[];
    if (!crits.length) return;
    lines.push(`[${c.l.toUpperCase()}]`);
    crits.forEach(cr => {
      if (!criteriosData || !criteriosData[cr.k]) {
        lines.push(`  ○ ${cr.l} — No descargado`);
      } else {
        const val = criteriosData[cr.k][pat.id];
        const activo = val && val[cr.k];
        lines.push(`  ${activo?"✓":"○"} ${cr.l}`);
      }
    });
    lines.push("");
  });
  lines.push(
    `ÍNDICES: Complejidad=${pat.compl}  ·  Comorbilidad=${pat.co}  ·  Hiperfrecuent.=${pat.fr}`,
    `TOP adecuación: ${pat.top_adec}% (Media OSI: ${OSI_STATS.top_media}%  ·  P75: ${OSI_STATS.top_p75}%)`,
    `Auditoría: ${pat.audit_adec}% (Media OSI: ${OSI_STATS.audit_media}%  ·  P75: ${OSI_STATS.audit_p75}%)`,
    `Pendientes auditoría: ${(pat.audit_pend||[]).length>0 ? (pat.audit_pend||[]).join(", ") : "Ninguno"}`,
    "",
    `Generado: ${new Date().toLocaleString("es-ES")} · VISOR PCRON ${META.version}`,
  );
  return lines.join("\n");
}

                may85: [{l:"Edad > 85", k:"_edad"}],
                polimed:[{l:"Polimedicación ≥7", k:"02-01-17-05"}],
                social:[
                  {l:"CNP a UGS",           k:"02-09-01-01"},
                  {l:"IC a UGS",            k:"02-09-02-02"},
                  {l:"Osanaia Cuidados",    k:"02-09-11-01"},
                  {l:"Nivel Socioeconómico",k:"02-09-16-01"},
                ],
              };
              return ac.map(caract => {
                const crits = CRIT_PERFIL[caract.k] || [];
                const positivos = crits.filter(cr => {
                  if(cr.k==="_edad") return pat.edad>85;
                  const v = getC(raw, cr.k);
                  return v && v!=="0" && v!==0 && v!=="No" && v!=="NO";
                });
                if(!positivos.length && !crits.length) return null;
                return (
                  <div key={caract.k} style={{marginBottom:6,borderRadius:7,overflow:"hidden",border:`1px solid ${caract.c}20`}}>
                    <div style={{padding:"4px 10px",background:caract.c+"10",fontSize:9,fontWeight:800,color:caract.c,textTransform:"uppercase",letterSpacing:.5}}>
                      {caract.l} — criterios positivos
                    </div>
                    <div style={{padding:"6px 10px",display:"flex",flexWrap:"wrap",gap:3}}>
                      {positivos.length>0 ? positivos.map((cr,i)=>(
                        <span key={i} style={{fontSize:10,padding:"2px 7px",background:"#D1FAE5",border:"1px solid #6EE7B7",borderRadius:4,color:"#065F46",fontWeight:600}}>✓ {cr.l}</span>
                      )) : (
                        <span style={{fontSize:10,color:"#94A3B8",fontStyle:"italic"}}>Criterios pendientes de cargar</span>
                      )}
                    </div>
                  </div>
                );
              });
            })()}
          </div>

          {/* ══════════════════════════════════════════
              ③ ÍNDICES DE COMPLEJIDAD
          ══════════════════════════════════════════ */}
          <div>
            <div style={{fontSize:9,fontWeight:700,color:"#64748B",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
              📊 Índices de Complejidad
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                ["Comorbilidad",  pat.co,    10, "#0891B2"],
                ["Frecuentación", pat.fr,    10, "#D97706"],
                ["Complejidad",   pat.compl, 20, "#6366F1"],
              ].map(([lbl,val,max,color])=>{
                const pct2=Math.min((val||0)/max*100,100);
                const nivel=pct2>60?"Alto":pct2>35?"Moderado":"Bajo";
                const nc=pct2>60?"#DC2626":pct2>35?"#D97706":"#059669";
                return (
                  <div key={lbl} style={{background:color+"08",border:`1px solid ${color}20`,borderRadius:9,padding:"10px 12px"}}>
                    <div style={{fontSize:9,fontWeight:800,color,letterSpacing:.5,textTransform:"uppercase",marginBottom:4}}>{lbl}</div>
                    <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:6}}>
                      <span style={{fontSize:22,fontWeight:900,color,lineHeight:1}}>{val||0}</span>
                      <span style={{fontSize:9,fontWeight:700,color:nc,background:nc+"20",padding:"1px 6px",borderRadius:4}}>{nivel}</span>
                    </div>
                    <div style={{height:5,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:pct2+"%",background:color,borderRadius:3,transition:"width .4s"}}/>
                    </div>
                    <div style={{fontSize:8,color:"#94A3B8",marginTop:3}}>max ref: {max}</div>
                  </div>
                );
              })}
            </div>
          </div>
          {/* ══════════════════════════════════════════
              ④ AUDITORÍA DE CALIDAD — 4 dimensiones
              Requisitos de atención por perfil: qué cumple y qué falta
          ══════════════════════════════════════════ */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:9,fontWeight:700,color:"#64748B",letterSpacing:1,textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
              🔍 Auditoría de Calidad — Requisitos por Perfil
              {pat.audit_pend?.length>0 && (
                <span style={{fontSize:9,fontWeight:700,color:"#DC2626",background:"#FEE2E2",padding:"1px 8px",borderRadius:10,textTransform:"none"}}>
                  ⚠️ {pat.audit_pend.length} pendiente{pat.audit_pend.length!==1?"s":""}
                </span>
              )}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[
                [pat.audit_estrat, "1 · Estratificación",  "06-18-00-01"],
                [pat.audit_equipo, "2 · Equipo Referencia","06-18-00-02"],
                [pat.audit_form,   "3 · Formularios",      "06-18-00-03"],
                [pat.audit_seg,    "4 · Seguimiento",      "06-18-00-04"],
              ].map(([dim,label])=>{
                const colMap={VERDE:"#059669",AMARILLO:"#D97706",NARANJA:"#EA580C",ROJO:"#DC2626"};
                const bgMap ={VERDE:"#D1FAE5",AMARILLO:"#FEF3C7",NARANJA:"#FFF7ED",ROJO:"#FEE2E2"};
                if(!dim||!dim.total) return (
                  <div key={label} style={{padding:"10px 12px",background:"#F8FAFC",borderRadius:8,border:"1px solid #E2E8F0"}}>
                    <div style={{fontSize:9,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",marginBottom:4}}>{label}</div>
                    <div style={{fontSize:11,color:"#CBD5E1",fontStyle:"italic"}}>Sin datos</div>
                  </div>
                );
                const c  = colMap[dim.color]||"#94A3B8";
                const bg = bgMap[dim.color]||"#F8FAFC";
                return (
                  <div key={label} style={{padding:"10px 12px",background:bg,borderRadius:8,border:`1px solid ${c}30`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{fontSize:9,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
                      <span style={{fontSize:9,fontWeight:800,padding:"1px 7px",borderRadius:10,background:c+"25",color:c}}>{dim.color}</span>
                    </div>
                    <div style={{fontSize:20,fontWeight:900,color:c,lineHeight:1,marginBottom:6}}>
                      {dim.pct}%
                      <span style={{fontSize:10,fontWeight:400,color:"#94A3B8",marginLeft:5}}>{dim.cumplidos}/{dim.total}</span>
                    </div>
                    {/* Requisitos cumplidos */}
                    {dim.ok?.length>0 && (
                      <div style={{marginBottom:4,display:"flex",flexWrap:"wrap",gap:2}}>
                        {dim.ok.map((f,i)=>(
                          <span key={i} style={{fontSize:9,padding:"2px 6px",background:"#D1FAE5",border:"1px solid #6EE7B7",borderRadius:3,color:"#065F46"}}>✓ {f}</span>
                        ))}
                      </div>
                    )}
                    {/* Requisitos pendientes */}
                    {dim.falta?.length>0 && (
                      <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
                        {dim.falta.map((f,i)=>(
                          <span key={i} style={{fontSize:9,padding:"2px 6px",background:"rgba(0,0,0,0.06)",border:"1px solid #FECACA",borderRadius:3,color:"#991B1B"}}>✗ {f}</span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {/* Resumen pendientes globales */}
            <div style={{marginTop:8}}>
              {pat.audit_pend?.length>0 ? (
                <div style={{padding:"10px 14px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#92400E",marginBottom:6}}>⚠️ PENDIENTES GLOBALES</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {pat.audit_pend.map((e,i)=>(
                      <span key={i} style={{fontSize:10,padding:"3px 8px",background:"white",border:"1px solid #FCD34D",borderRadius:5,color:"#92400E",fontWeight:500}}>● {e}</span>
                    ))}
                  </div>
                </div>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:"#D1FAE5",border:"1px solid #6EE7B7",borderRadius:8}}>
                  <span style={{fontSize:16}}>✅</span>
                  <span style={{fontSize:12,color:"#065F46",fontWeight:600}}>Auditoría completa — Sin elementos pendientes</span>
                </div>
              )}
            </div>
          </div>


        </div>
      </div>
    </div>
  );
}

// ❽  TAB ESTADÍSTICAS

function TabEstadisticas({pacientes}) {
  const N=pacientes.length;
  if (!N) return <div style={{textAlign:"center",padding:40,color:"#94A3B8"}}>Sin datos</div>;
  const hombres=pacientes.filter(p=>p.sexo==="H").length;
  const mujeres=N-hombres;
  const rangosEdad=[
    {label:"< 65",  n:pacientes.filter(p=>p.edad<65).length},
    {label:"65–74", n:pacientes.filter(p=>p.edad>=65&&p.edad<=74).length},
    {label:"75–84", n:pacientes.filter(p=>p.edad>=75&&p.edad<=84).length},
    {label:"85–94", n:pacientes.filter(p=>p.edad>=85&&p.edad<=94).length},
    {label:"≥ 95",  n:pacientes.filter(p=>p.edad>=95).length},
  ];
  const top_media_pac=Math.round(pacientes.reduce((s,p)=>s+(p.top_adec||0),0)/N);
  const audit_media_pac=Math.round(pacientes.reduce((s,p)=>s+(p.audit_adec||0),0)/N);
  const conPend=pacientes.filter(p=>(p.audit_pend||[]).length>0).length;
  const Box=({children,style={}})=>(
    <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",...style}}>{children}</div>
  );
  const ST=({icon,title,sub})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:8,borderBottom:"2px solid #E2E8F0"}}>
      <span style={{fontSize:18}}>{icon}</span>
      <div>
        <div style={{fontSize:14,fontWeight:800,color:"#1E293B"}}>{title}</div>
        {sub&&<div style={{fontSize:11,color:"#94A3B8"}}>{sub}</div>}
      </div>
    </div>
  );
  const unique=(arr,k)=>[...new Set(arr.map(p=>p[k]))].sort();

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Box>
        <ST icon="📊" title="Básicos" sub={`N=${nFmt(N)} pacientes`}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Sexo</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {[{l:"Hombres",n:hombres,c:"#3B82F6"},{l:"Mujeres",n:mujeres,c:"#EC4899"}].map(s=>(
                <div key={s.l} style={{flex:1,padding:"10px",background:s.c+"10",border:`1px solid ${s.c}30`,borderRadius:8,textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:800,color:s.c}}>{nFmt(s.n)}</div>
                  <div style={{fontSize:10,color:s.c,fontWeight:700}}>{pct(s.n,N)}%</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex"}}>
              <div style={{flex:hombres,background:"#3B82F6"}}/><div style={{flex:mujeres,background:"#EC4899"}}/>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Edad (rangos)</div>
            {rangosEdad.map(r=><BarRow key={r.label} label={r.label} n={r.n} total={N} color="#6366F1"/>)}
          </div>
        </div>
      </Box>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <Box>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>OSI</div>
          {unique(pacientes,"osi").map(osi=><BarRow key={osi} label={osi} n={pacientes.filter(p=>p.osi===osi).length} total={N} color="#0891B2"/>)}
        </Box>
        <Box>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Centros</div>
          {unique(pacientes,"centro").map(c=><BarRow key={c} label={c} n={pacientes.filter(p=>p.centro===c).length} total={N} color="#0284C7"/>)}
        </Box>
        <Box>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Médico Referencia</div>
          {unique(pacientes,"medico").filter(Boolean).slice(0,8).map(m=><BarRow key={m} label={m} n={pacientes.filter(p=>p.medico===m).length} total={N} color="#7C3AED"/>)}
        </Box>
      </div>

      <Box>
        <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Programas de Seguimiento (GIP)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
          {[
            {l:"GIP AP",    n:pacientes.filter(p=>p.gip_ap).length,  c:"#0891B2"},
            {l:"GIP Hosp.", n:pacientes.filter(p=>p.gip_hosp).length, c:"#7C3AED"},
            {l:"GIP OSAREAN",n:pacientes.filter(p=>p.gip_osarean).length,c:"#059669"},
            {l:"Sin programa",n:pacientes.filter(p=>!p.gip_ap&&!p.gip_hosp&&!p.gip_osarean).length,c:"#94A3B8"},
          ].map(g=>(
            <div key={g.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:g.c+"10",border:`1px solid ${g.c}30`,borderRadius:8}}>
              <span style={{fontSize:12,color:g.c,fontWeight:600}}>{g.l}</span>
              <div style={{textAlign:"right"}}>
                <span style={{fontWeight:700,color:"#1E293B",fontSize:14,marginRight:4}}>{nFmt(g.n)}</span>
                <span style={{color:"#94A3B8",fontSize:10}}>{pct(g.n,N)}%</span>
              </div>
            </div>
          ))}
        </div>
      </Box>

      <Box>
        <ST icon="👥" title="Grupos de Población" sub="N y % por grupo"/>
        {Object.entries(POB_DEF).map(([pob,c])=>{
          const n=pacientes.filter(p=>p.pob===pob).length;
          return (
            <div key={pob} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{width:160,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:10,height:10,borderRadius:2,background:c.bg,flexShrink:0}}/>
                <span style={{fontSize:11,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pob}</span>
              </div>
              <div style={{flex:1,height:14,background:"#F1F5F9",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct(n,N)+"%",background:c.bg,borderRadius:4,transition:"width .4s"}}/>
              </div>
              <div style={{width:40,fontWeight:700,color:"#1E293B",fontSize:13,textAlign:"right"}}>{nFmt(n)}</div>
              <div style={{width:44,color:"#94A3B8",fontSize:11,textAlign:"right"}}>{pct(n,N)}%</div>
            </div>
          );
        })}
      </Box>

      <Box>
        <ST icon="🏷️" title="Características / Perfiles"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6}}>
          {CARACTS_DEF.map(c=>{
            const n=pacientes.filter(p=>p[c.k]).length;
            return (
              <div key={c.k} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:c.c+"08",border:`1px solid ${c.c}25`,borderRadius:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:c.c}}/>
                <span style={{fontSize:12,color:c.c,fontWeight:600,flex:1}}>{c.l}</span>
                <span style={{fontWeight:800,color:"#1E293B",fontSize:13}}>{nFmt(n)}</span>
                <span style={{color:"#94A3B8",fontSize:10}}>{pct(n,N)}%</span>
              </div>
            );
          })}
        </div>
      </Box>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Box>
          <ST icon="⭐" title="TOP" sub="% adecuación vs OSI"/>
          <div style={{padding:"8px 12px",background:"#F8FAFC",borderRadius:8,marginBottom:10,display:"flex",gap:16,alignItems:"center"}}>
            <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:700}}>MEDIA PACIENTES</div>
              <div style={{fontSize:22,fontWeight:800,color:"#1E293B"}}>{top_media_pac}%</div></div>
            <div style={{width:1,height:40,background:"#E2E8F0"}}/>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI MEDIA</div><div style={{fontWeight:700,color:"#64748B"}}>{OSI_STATS.top_media}%</div></div>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI P75</div><div style={{fontWeight:700,color:"#1D4ED8"}}>{OSI_STATS.top_p75}%</div></div>
            </div>
          </div>
          <IndexBar label="Adecuación TOP media" value={top_media_pac} max={100} osi_media={OSI_STATS.top_media} osi_p75={OSI_STATS.top_p75} color="#6366F1"/>
        </Box>
        <Box>
          <ST icon="🔍" title="Auditoría" sub="% adecuación y pendientes"/>
          <div style={{padding:"8px 12px",background:"#F8FAFC",borderRadius:8,marginBottom:8,display:"flex",gap:16,alignItems:"center"}}>
            <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:700}}>MEDIA PACIENTES</div>
              <div style={{fontSize:22,fontWeight:800,color:"#1E293B"}}>{audit_media_pac}%</div></div>
            <div style={{width:1,height:40,background:"#E2E8F0"}}/>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI MEDIA</div><div style={{fontWeight:700,color:"#64748B"}}>{OSI_STATS.audit_media}%</div></div>
              <div><div style={{fontSize:9,color:"#94A3B8"}}>OSI P75</div><div style={{fontWeight:700,color:"#1D4ED8"}}>{OSI_STATS.audit_p75}%</div></div>
            </div>
          </div>
          {conPend>0&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:7,marginBottom:8}}>
            <span>⚠️</span><div><div style={{fontSize:12,fontWeight:700,color:"#92400E"}}>{nFmt(conPend)} pacientes con pendientes</div>
              <div style={{fontSize:10,color:"#B45309"}}>{pct(conPend,N)}% del total</div></div>
          </div>}
          <IndexBar label="Adecuación Auditoría media" value={audit_media_pac} max={100} osi_media={OSI_STATS.audit_media} osi_p75={OSI_STATS.audit_p75} color="#0891B2"/>
        </Box>
      </div>
    </div>
  );
}

// ❾  TAB DETALLE
// ════════════════════════════════════════════════════════════════════════════
const ALL_COLS=[
  {k:"id",    label:"ID",             def:true, fixed:true},
  {k:"cic",   label:"CIC",            def:false,fixed:false},
  {k:"sexo",  label:"Sexo",           def:true, fixed:false},
  {k:"edad",  label:"Edad",           def:true, fixed:false},
  {k:"osi",   label:"OSI",            def:true, fixed:false},
  {k:"centro",label:"Centro",         def:true, fixed:false},
  {k:"cupo",  label:"Cupo",           def:false,fixed:false},
  {k:"medico",label:"Médico",         def:false,fixed:false},
  {k:"pob",   label:"Grupo Poblac.",  def:true, fixed:false},
  {k:"caracts",label:"Perfiles",      def:true, fixed:false},
  {k:"compl", label:"Complejidad",    def:true, fixed:false},
  {k:"co",    label:"Comorbilidad",   def:false,fixed:false},
  {k:"fr",    label:"Hiperfrecuent.", def:false,fixed:false},
  {k:"top_adec",label:"TOP %",        def:true, fixed:false},
  {k:"audit_adec",label:"Audit. %",   def:false,fixed:false},
];
const PAGE_SIZE=50;

function TabDetalle({pacientes,setPacientes,canCIC,criteriosData,loadedGrupos,onLoadGrupo}) {
  const [search,setSearch]=useState("");
  const [page,setPage]=useState(1);
  const [visCols,setVisCols]=useState(ALL_COLS.filter(c=>c.def).map(c=>c.k));
  const [colsOpen,setColsOpen]=useState(false);
  const [pat,setPat]=useState(null);

  const fil=useMemo(()=>pacientes.filter(p=>
    !search||
    String(p.id||"").includes(search)||
    String(p.cic||"").includes(search)||
    String(p.centro||"").toLowerCase().includes(search.toLowerCase())||
    String(p.medico||"").toLowerCase().includes(search.toLowerCase())
  ),[pacientes,search]);

  const totalPags=Math.max(1,Math.ceil(fil.length/PAGE_SIZE));
  const rows=fil.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  const cols=ALL_COLS.filter(c=>visCols.includes(c.k));
  const togCol=k=>{
    if(ALL_COLS.find(c=>c.k===k)?.fixed) return;
    if(visCols.includes(k)){if(visCols.length>2)setVisCols(v=>v.filter(x=>x!==k));}
    else setVisCols(v=>[...v,k]);
  };

  return (
    <>
      {pat&&<ModalPaciente pat={pat} canCIC={canCIC} criteriosData={criteriosData} loadedGrupos={loadedGrupos} onLoadGrupo={onLoadGrupo} onClose={()=>setPat(null)}/>}
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:180,maxWidth:340}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94A3B8"}}>🔍</span>
          <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="ID, CIC, centro, médico…"
            style={{width:"100%",padding:"9px 12px 9px 34px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:13,background:"white",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <button onClick={()=>setColsOpen(o=>!o)} style={{padding:"9px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${colsOpen?"#93C5FD":"#E2E8F0"}`,background:colsOpen?"#DBEAFE":"#F8FAFC",color:colsOpen?"#1D4ED8":"#475569",fontFamily:"inherit"}}>
          ⊞ Columnas {colsOpen?"▲":"▼"}
        </button>
        <button onClick={()=>{
          // Export Excel con SheetJS
          const script=document.createElement('script');
          script.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
          script.onload=()=>{
            const rows=fil.map(p=>({
              'ID':p.id,'CIC':canCIC?p.cic:'RESTRINGIDO','Sexo':p.sexo==="H"?"Hombre":"Mujer",
              'Edad':p.edad,'OSI':p.osi,'Centro':p.centro,'Cupo':p.cupo,'Médico':p.medico||"",
              'Grupo Población':p.pob,'Complejidad':p.compl,'Comorbilidad':p.co,'Hiperfrecuent.':p.fr,
              'TOP %':p.top_adec,'Auditoría %':p.audit_adec,
              'Pendientes':(p.audit_pend||[]).join("; "),
              'GIP AP':p.gip_ap?"Sí":"No",'GIP Hosp':p.gip_hosp?"Sí":"No",
              ...CARACTS_DEF.reduce((o,c)=>({...o,[c.l]:p[c.k]?"Sí":"No"}),{}),
            }));
            const ws=XLSX.utils.json_to_sheet(rows);
            const wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,"PACIENTES PCRON");
            XLSX.writeFile(wb,`PCRON_export_${new Date().toISOString().slice(0,10)}.xlsx`);
          };
          document.head.appendChild(script);
        }} style={{padding:"9px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"1.5px solid #6EE7B7",background:"#D1FAE5",color:"#065F46",fontFamily:"inherit"}}>📊 Excel ({nFmt(fil.length)})</button>
        <button onClick={()=>{
          const rows=fil.map(p=>([p.id,canCIC?p.cic:'REST.',p.sexo,p.edad,p.osi,p.centro,p.pob,p.compl,p.top_adec+"%",p.audit_adec+"%",(p.audit_pend||[]).join("; ")]));
          const hdrs=["ID","CIC","Sexo","Edad","OSI","Centro","Grupo Pob.","Compl.","TOP","Audit.","Pendientes"];
          const trs=rows.map(r=>`<tr>${r.map(c=>`<td style="border:1px solid #ddd;padding:4px 7px;font-size:11px">${c??""}</td>`).join("")}</tr>`).join("");
          const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>PCRON</title><style>body{font-family:Arial;font-size:11px}th{background:#0F2444;color:white;padding:5px 8px;font-size:10px}h2{color:#0F2444}@media print{button{display:none}}</style></head><body><h2>VISOR PCRON · ${new Date().toLocaleString("es-ES")} · ${nFmt(fil.length)} pacientes</h2><button onclick="window.print()">🖨 Imprimir / PDF</button><table style="border-collapse:collapse;width:100%;margin-top:10px"><thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${trs}</tbody></table></body></html>`;
          const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();}
        }} style={{padding:"9px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"1.5px solid #FCA5A5",background:"#FEE2E2",color:"#991B1B",fontFamily:"inherit"}}>📄 PDF ({nFmt(fil.length)})</button>
        <span style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>{nFmt(fil.length)} pacientes</span>
      </div>

      {colsOpen&&(
        <div style={{background:"white",border:"1px solid #E2E8F0",borderRadius:10,padding:"12px 16px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.6}}>Columnas visibles</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:5}}>
            {ALL_COLS.map(c=>{
              const blocked=c.k==="cic"&&!canCIC;
              const on=visCols.includes(c.k);
              return (
                <div key={c.k} onClick={()=>!blocked&&!c.fixed&&togCol(c.k)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:7,border:`1px solid ${on&&!blocked?"#BFDBFE":"#E2E8F0"}`,cursor:blocked||c.fixed?"default":"pointer",opacity:blocked?0.4:1,fontSize:12,fontWeight:on&&!blocked?600:400,background:on&&!blocked?"#EFF6FF":"#FAFBFC",color:on&&!blocked?"#1D4ED8":"#475569",userSelect:"none"}}>
                  <span style={{minWidth:14,fontSize:11}}>{blocked?"🔒":c.fixed?"📌":on?"✓":"○"}</span>
                  {c.label}
                </div>
              );

          </div>
        </div>
      )}

      <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#F8FAFC",borderBottom:"2px solid #E2E8F0"}}>
                {cols.map(c=><th key={c.k} style={{padding:"9px 12px",textAlign:"left",fontWeight:700,color:"#475569",fontSize:10,letterSpacing:.7,whiteSpace:"nowrap",textTransform:"uppercase"}}>{c.label}</th>)}
                <th style={{padding:"9px 12px",width:50}}/>
              </tr>
            </thead>
            <tbody>
              {rows.map((p,i)=>(
                <tr key={p.id} onClick={async()=>{
                  if(!p._criterios || Object.keys(p._criterios).length===0) {
                    const sb=await getSupabase();
                    if(sb){
                      const {data}=await sb.from("PACIENTES").select("criterios").eq("id_paciente",p.id).single();
                      if(data?.criterios) {
                        const mapped=mapearPaciente({...p,id_paciente:p.id,comarca_osi:p.osi,codigo_cupo:p.cupo,criterios:data.criterios});
                        setPacientes(prev=>prev.map(x=>x.id===p.id?{...mapped,pob:p.pob,osi:p.osi,centro:p.centro,cupo:p.cupo,gip_ap:p.gip_ap,gip_hosp:p.gip_hosp,gip_osarean:p.gip_osarean}:x));
                        setPat({...mapped,pob:p.pob,osi:p.osi,centro:p.centro,cupo:p.cupo,gip_ap:p.gip_ap,gip_hosp:p.gip_hosp,gip_osarean:p.gip_osarean});
                        return;
                      }
                    }
                  }
                  setPat(p);
                }} style={{borderBottom:"1px solid #F1F5F9",background:i%2===0?"white":"#FAFBFC",cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#EFF6FF"}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"white":"#FAFBFC"}>
                  {cols.map(c=>{
                    switch(c.k) {
                      case "id":      return <td key="id"     style={{padding:"8px 12px",fontFamily:"monospace",fontSize:11,fontWeight:700,color:"#334155"}}>{p.id}</td>;
                      case "cic":     return <td key="cic"    style={{padding:"8px 12px",fontFamily:"monospace",fontSize:11,color:canCIC?"#64748B":"#CBD5E1"}}>{canCIC?p.cic:"🔒 REST."}</td>;
                      case "sexo":    return <td key="sexo"   style={{padding:"8px 12px"}}><span style={{display:"inline-block",width:20,height:20,borderRadius:"50%",background:p.sexo==="H"?"#DBEAFE":"#FCE7F3",color:p.sexo==="H"?"#1D4ED8":"#BE185D",fontSize:10,fontWeight:700,lineHeight:"20px",textAlign:"center"}}>{p.sexo}</span></td>;
                      case "edad":    return <td key="edad"   style={{padding:"8px 12px",fontWeight:700,color:p.edad>=85?"#DC2626":"#1E293B"}}>{p.edad}{p.edad>=85&&<span style={{fontSize:8,color:"#DC2626",marginLeft:2}}>▲85</span>}</td>;
                      case "osi":     return <td key="osi"    style={{padding:"8px 12px",fontSize:11,color:"#64748B"}}>{p.osi}</td>;
                      case "centro":  return <td key="centro" style={{padding:"8px 12px",fontWeight:600,color:"#1E293B"}}>{p.centro}</td>;
                      case "cupo":    return <td key="cupo"   style={{padding:"8px 12px",fontFamily:"monospace",fontSize:11,color:"#64748B"}}>{p.cupo}</td>;
                      case "medico":  return <td key="medico" style={{padding:"8px 12px",fontSize:11,color:"#475569"}}>{p.medico}</td>;
                      case "pob":     return <td key="pob"    style={{padding:"8px 12px"}}><PobBadge pob={p.pob}/></td>;
                      case "caracts": return <td key="caracts"style={{padding:"8px 12px"}}><ProfileChips patient={p}/></td>;
                      case "compl":   return <td key="compl"  style={{padding:"8px 12px"}}><div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:36,height:5,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:Math.min(p.compl/25*100,100)+"%",background:p.compl>15?"#DC2626":p.compl>8?"#D97706":"#059669",borderRadius:3}}/></div><span style={{fontWeight:700,color:"#475569",fontSize:12}}>{p.compl}</span></div></td>;
                      case "co":      return <td key="co"     style={{padding:"8px 12px",fontWeight:700,color:p.co>4?"#DC2626":p.co>2?"#D97706":"#64748B"}}>{p.co}</td>;
                      case "fr":      return <td key="fr"     style={{padding:"8px 12px",fontWeight:700,color:p.fr>5?"#DC2626":p.fr>3?"#D97706":"#64748B"}}>{p.fr}</td>;
                      case "top_adec":return <td key="top"    style={{padding:"8px 12px",fontWeight:700,color:p.top_adec>=OSI_STATS.top_p75?"#059669":p.top_adec>=OSI_STATS.top_media?"#D97706":"#DC2626"}}>{p.top_adec}%</td>;
                      case "audit_adec":return <td key="aud"  style={{padding:"8px 12px",fontWeight:700,color:p.audit_adec>=OSI_STATS.audit_p75?"#059669":p.audit_adec>=OSI_STATS.audit_media?"#D97706":"#DC2626"}}>{p.audit_adec}%</td>;
                      default:        return <td key={c.k}/>;
                    }
                  })}
                  <td style={{padding:"8px 12px"}}>
                    <button onClick={async e=>{e.stopPropagation();
                     if(!p._criterios||Object.keys(p._criterios).length===0){
                       const sb=await getSupabase();
                       if(sb){const {data}=await sb.from("PACIENTES").select("criterios").eq("id_paciente",p.id).single();
                         if(data?.criterios){const mapped=mapearPaciente({...p,id_paciente:p.id,comarca_osi:p.osi,codigo_cupo:p.cupo,criterios:data.criterios});
                           const safe={...mapped,pob:p.pob,osi:p.osi,centro:p.centro,cupo:p.cupo,gip_ap:p.gip_ap,gip_hosp:p.gip_hosp,gip_osarean:p.gip_osarean};
                           setPacientes(prev=>prev.map(x=>x.id===p.id?safe:x));setPat(safe);return;}}
                     }
                     setPat(p);
                   }} style={{padding:"3px 9px",background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:6,fontSize:11,cursor:"pointer",color:"#475569",fontWeight:600,fontFamily:"inherit"}}>Ver</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderTop:"1px solid #F1F5F9",background:"#FAFBFC"}}>
          <span style={{fontSize:12,color:"#94A3B8"}}>Mostrando {nFmt((page-1)*PAGE_SIZE+1)}–{nFmt(Math.min(page*PAGE_SIZE,fil.length))} de {nFmt(fil.length)}</span>
          <div style={{display:"flex",gap:3}}>
            <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{padding:"4px 10px",border:"1px solid #E2E8F0",borderRadius:6,background:"white",cursor:page===1?"default":"pointer",color:page===1?"#CBD5E1":"#475569",fontSize:12}}>←</button>
            {[...Array(Math.min(5,totalPags))].map((_,i)=>{
              const n=Math.max(1,Math.min(page-2,totalPags-4))+i;
              return <button key={n} onClick={()=>setPage(n)} style={{padding:"4px 10px",border:"1px solid",borderColor:page===n?"#3B82F6":"#E2E8F0",borderRadius:6,background:page===n?"#3B82F6":"white",color:page===n?"white":"#475569",cursor:"pointer",fontSize:12,fontWeight:page===n?700:400}}>{n}</button>;
            })}
            <button onClick={()=>setPage(p=>Math.min(totalPags,p+1))} disabled={page===totalPags} style={{padding:"4px 10px",border:"1px solid #E2E8F0",borderRadius:6,background:"white",cursor:page===totalPags?"default":"pointer",color:page===totalPags?"#CBD5E1":"#475569",fontSize:12}}>→</button>
          </div>
        </div>
      </div>
    </>
  );
}
